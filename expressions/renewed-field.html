&lt;script&gt;
(() =&gt; {
  const root = document.getElementById(&#x27;renewed-field-v2&#x27;);
  if (!root) return;

  const canvas = root.querySelector(&#x27;#rfv2-canvas&#x27;);
  const ctx = canvas.getContext(&#x27;2d&#x27;, { alpha: false });
  const depthInput = root.querySelector(&#x27;#rfv2-depth&#x27;);
  const depthValue = root.querySelector(&#x27;#rfv2-depth-value&#x27;);
  const actionButton = root.querySelector(&#x27;#rfv2-action&#x27;);
  const shadowInput = root.querySelector(&#x27;#rfv2-shadow&#x27;);
  const ambientInput = root.querySelector(&#x27;#rfv2-ambient&#x27;);
  const tonesInput = root.querySelector(&#x27;#rfv2-tones&#x27;);
  const statusNode = root.querySelector(&#x27;#rfv2-status&#x27;);
  const orientationNode = root.querySelector(&#x27;#rfv2-orientation&#x27;);
  const reducedMotion = window.matchMedia(&#x27;(prefers-reduced-motion: reduce)&#x27;).matches;

  const TAU = Math.PI * 2;
  const PHI = 1.61803398875;
  const clamp = (v, a, b) =&gt; Math.max(a, Math.min(b, v));
  const lerp = (a, b, t) =&gt; a + (b - a) * t;
  const smooth = t =&gt; t * t * (3 - 2 * t);
  const easeInOut = t =&gt; 0.5 - 0.5 * Math.cos(Math.PI * clamp(t, 0, 1));

  let W = 736;
  let H = 520;
  let dpr = 1;
  let frame = 0;
  let lastTime = performance.now();
  let clock = 0;
  let palette = null;
  let darkField = true;
  let state = &#x27;field&#x27;;
  let resonance = 0.08;
  let generation = 0;
  let returnProgress = -1;
  let shadowTarget = 0;
  let shadowMix = 0;
  let shadowVelocity = 0;
  let attention = 0;
  let depthTarget = Number(depthInput.value);
  let statusClock = 0;
  let pressedAt = null;
  let dragged = false;
  let currentSeam = null;
  const ripples = [];
  const seams = [];
  const layerPresence = Array.from({ length: 9 }, () =&gt; 0);
  const curves = Array.from({ length: 9 }, () =&gt; []);
  const pointer = { x: 0.58, y: 0.47, tx: 0.58, ty: 0.47, inside: false, down: false, vx: 0, vy: 0 };

  const colorProbe = document.createElement(&#x27;canvas&#x27;);
  colorProbe.width = colorProbe.height = 1;
  const probeCtx = colorProbe.getContext(&#x27;2d&#x27;, { willReadFrequently: true });

  function resolveCssColor(token, fallback) {
    const css = getComputedStyle(root).getPropertyValue(token).trim() || fallback;
    probeCtx.clearRect(0, 0, 1, 1);
    probeCtx.fillStyle = fallback;
    probeCtx.fillStyle = css;
    probeCtx.fillRect(0, 0, 1, 1);
    return Array.from(probeCtx.getImageData(0, 0, 1, 1).data);
  }

  function rgba(c, a = 1) {
    return `rgba(${c[0]},${c[1]},${c[2]},${clamp(a, 0, 1)})`;
  }

  function mixColor(a, b, t) {
    return [
      Math.round(lerp(a[0], b[0], t)),
      Math.round(lerp(a[1], b[1], t)),
      Math.round(lerp(a[2], b[2], t)),
      255
    ];
  }

  function luminance(c) {
    return (c[0] * 0.2126 + c[1] * 0.7152 + c[2] * 0.0722) / 255;
  }

  function intensify(c, amount = 1.35) {
    const light = luminance(c) * 255;
    return [
      Math.round(clamp(light + (c[0] - light) * amount, 0, 255)),
      Math.round(clamp(light + (c[1] - light) * amount, 0, 255)),
      Math.round(clamp(light + (c[2] - light) * amount, 0, 255)),
      255
    ];
  }

  function refreshPalette() {
    const bg = resolveCssColor(&#x27;--card&#x27;, &#x27;#111319&#x27;);
    const page = resolveCssColor(&#x27;--background&#x27;, &#x27;#0a0b0f&#x27;);
    palette = {
      bg: mixColor(bg, page, 0.34),
      page,
      fg: resolveCssColor(&#x27;--card-foreground&#x27;, &#x27;#f3efe8&#x27;),
      muted: resolveCssColor(&#x27;--muted-foreground&#x27;, &#x27;#9a9aa5&#x27;),
      series: [
        resolveCssColor(&#x27;--viz-series-1&#x27;, &#x27;#ff5f9e&#x27;),
        resolveCssColor(&#x27;--viz-series-2&#x27;, &#x27;#50d6ff&#x27;),
        resolveCssColor(&#x27;--viz-series-3&#x27;, &#x27;#f6c85f&#x27;),
        resolveCssColor(&#x27;--viz-series-4&#x27;, &#x27;#8be28b&#x27;),
        resolveCssColor(&#x27;--viz-series-5&#x27;, &#x27;#ad8cff&#x27;),
        resolveCssColor(&#x27;--viz-series-6&#x27;, &#x27;#ff8c5a&#x27;)
      ].map(color =&gt; intensify(color, 1.48))
    };
    darkField = luminance(palette.bg) &lt; 0.48;
  }

  function resize() {
    const rect = canvas.getBoundingClientRect();
    dpr = Math.min(window.devicePixelRatio || 1, 1.75);
    W = Math.max(280, Math.round(rect.width));
    H = Math.max(340, Math.round(rect.height));
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    refreshPalette();
  }

  function hash(n) {
    return ((Math.sin(n * 127.1 + generation * 19.19) * 43758.5453) % 1 + 1) % 1;
  }

  function layerColor(i, offset = 0) {
    const shift = (generation + offset) % palette.series.length;
    return palette.series[(i * 2 + shift + palette.series.length) % palette.series.length];
  }

  function aperture(t = clock) {
    const turning = smooth(shadowMix);
    return {
      x: lerp(0.315, 0.435, turning) + Math.sin(t * 0.21) * 0.012,
      y: lerp(0.455, 0.49, turning) + Math.cos(t * 0.17) * 0.018,
      rx: W * lerp(0.061, 0.043, turning),
      ry: H * lerp(0.142, 0.19, turning)
    };
  }

  function rippleDisplacement(x, y, layer) {
    let displacement = 0;
    for (const r of ripples) {
      const dx = x - r.x;
      const dy = (y - r.y) * (H / W);
      const distance = Math.sqrt(dx * dx + dy * dy);
      const life = clamp(1 - r.age / r.life, 0, 1);
      const wave = Math.sin(distance * 72 - r.age * 7.2 - layer * 0.38);
      displacement += wave * Math.exp(-distance * 7.5) * life * r.strength;
    }
    return displacement;
  }

  function buildCurve(i) {
    const points = curves[i];
    points.length = 0;
    const count = 108;
    const mid = 4;
    const z = (i - mid) / mid;
    const coherence = state === &#x27;locked&#x27; ? 0.76 : state === &#x27;candidate&#x27; ? 0.38 : 0;
    const phaseSpread = (1 - coherence) * i * 0.39;
    const movement = reducedMotion ? clock * 0.12 : clock;
    const directionalTime = movement * lerp(1, -0.52, smooth(shadowMix));
    const a = aperture();
    const foldCenter = lerp(0.63, 0.54, shadowMix);
    const rebirth = returnProgress &gt;= 0 ? Math.sin(Math.PI * returnProgress) : 0;

    for (let j = 0; j &lt; count; j++) {
      const u = j / (count - 1);
      const nx = lerp(-0.10, 1.10, u);
      const fold = Math.exp(-Math.pow((nx - foldCenter) / 0.23, 2));
      const secondaryFold = Math.exp(-Math.pow((nx - 0.78) / 0.18, 2));
      let y = 0.51;
      y += Math.sin(nx * TAU * 0.86 + directionalTime * 0.24 + phaseSpread) * (0.094 + 0.018 * Math.sin(i));
      y += Math.sin(nx * TAU * 2.13 - directionalTime * 0.17 + i * 0.67) * 0.032;
      y += Math.cos(nx * TAU * 3.7 + directionalTime * 0.11 - i * 0.53) * 0.013;
      y += z * (0.205 - fold * 0.116 - secondaryFold * 0.048);

      const apertureDx = (nx - a.x) / Math.max(a.rx / W, 0.001);
      const nearAperture = Math.exp(-apertureDx * apertureDx * 0.68);
      const apertureSide = i &lt; mid ? -1 : i &gt; mid ? 1 : Math.sin(i + directionalTime) &gt; 0 ? 1 : -1;
      y += apertureSide * nearAperture * (a.ry / H) * lerp(0.72, 0.48, shadowMix);

      const capture = Math.exp(-Math.pow((nx - 0.53) / 0.28, 2));
      y += (a.y - y) * capture * shadowMix * 0.29;
      y += Math.sin((nx - a.x) * 18 + i * 0.8 - directionalTime * 0.5) * capture * shadowMix * 0.018;

      const pointerPull = Math.exp(-Math.pow((nx - pointer.x) / 0.17, 2));
      const gravity = pointer.inside ? 0.11 + attention * 0.08 : 0.025;
      y += (pointer.y - y) * pointerPull * gravity * (0.56 + (i + 1) / 18);

      if (pointer.down) {
        const peelSide = i &lt; mid ? -1 : 1;
        y += peelSide * pointerPull * 0.038 * attention;
      }

      y += rippleDisplacement(nx, y, i) * (0.020 + Math.abs(z) * 0.006);

      let x = nx + (pointer.x - 0.5) * z * 0.015 * (pointer.inside ? 1 : 0);
      x += Math.sin(nx * TAU + i) * fold * 0.008;
      x += Math.sin((nx - foldCenter) * 17 + i * 0.84 - directionalTime * 0.09)
        * fold * (0.013 + (1 - Math.abs(z)) * 0.022) * (i % 2 ? 1 : -1);
      if (rebirth &gt; 0) {
        const gatheringPoint = lerp(0.72, 0.83, returnProgress);
        x = lerp(x, gatheringPoint, rebirth * (0.48 + Math.abs(z) * 0.1));
        y = lerp(y, 0.5 + z * 0.018, rebirth * 0.57);
      }

      const thicknessWave = 1 + Math.sin(nx * TAU * PHI + i * 0.61 - directionalTime * 0.2) * 0.22;
      const thickness = H * (0.034 + fold * 0.026 + secondaryFold * 0.012) * thicknessWave * lerp(1, 0.72, shadowMix);
      points.push({ x: x * W, y: y * H, thickness, nx, ny: y });
    }

    for (let j = 0; j &lt; points.length; j++) {
      const prev = points[Math.max(0, j - 1)];
      const next = points[Math.min(points.length - 1, j + 1)];
      const dx = next.x - prev.x;
      const dy = next.y - prev.y;
      const length = Math.hypot(dx, dy) || 1;
      points[j].tx = dx / length;
      points[j].ty = dy / length;
      points[j].normalX = -dy / length;
      points[j].normalY = dx / length;
    }
  }

  function traceOffset(points, offset, reverse = false) {
    const start = reverse ? points.length - 1 : 0;
    const end = reverse ? -1 : points.length;
    const step = reverse ? -1 : 1;
    for (let j = start; j !== end; j += step) {
      const p = points[j];
      const x = p.x + p.normalX * p.thickness * offset;
      const y = p.y + p.normalY * p.thickness * offset;
      if (j === start) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
  }

  function drawBackdrop() {
    const bg = palette.bg;
    const first = layerColor(0, 1);
    const second = layerColor(3, 2);
    const third = layerColor(5, 3);
    const base = ctx.createLinearGradient(0, 0, W, H);
    base.addColorStop(0, rgba(mixColor(bg, first, darkField ? 0.08 : 0.025), 1));
    base.addColorStop(0.46, rgba(bg, 1));
    base.addColorStop(1, rgba(mixColor(bg, second, darkField ? 0.07 : 0.02), 1));
    ctx.fillStyle = base;
    ctx.fillRect(0, 0, W, H);

    const blooms = [
      [0.18, 0.26, 0.48, first, 0.23],
      [0.64, 0.48, 0.57, second, 0.20],
      [0.86, 0.72, 0.42, third, 0.18]
    ];
    for (const [x, y, radius, color, alpha] of blooms) {
      const gradient = ctx.createRadialGradient(x * W, y * H, 0, x * W, y * H, radius * Math.max(W, H));
      gradient.addColorStop(0, rgba(color, alpha * lerp(1, 0.72, shadowMix)));
      gradient.addColorStop(1, rgba(color, 0));
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, W, H);
    }

    ctx.save();
    ctx.globalCompositeOperation = darkField ? &#x27;screen&#x27; : &#x27;multiply&#x27;;
    ctx.lineWidth = 0.7;
    for (let k = 0; k &lt; 18; k++) {
      const y0 = H * (0.08 + k / 20);
      ctx.beginPath();
      for (let j = 0; j &lt;= 48; j++) {
        const x = (j / 48) * W;
        const y = y0 + Math.sin(j * 0.23 + k * 0.71 + clock * 0.05) * H * 0.014 + (pointer.y - 0.5) * H * 0.01 * (k / 18);
        if (j === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = rgba(layerColor(k % 9, 1), 0.025 + (k % 4 === 0 ? 0.018 : 0));
      ctx.stroke();
    }
    ctx.restore();

    ctx.save();
    ctx.globalAlpha = darkField ? 0.22 : 0.11;
    for (let i = 0; i &lt; 105; i++) {
      const x = hash(i * 3.1) * W;
      const y = hash(i * 7.7 + 4) * H;
      const length = 1 + hash(i + 2) * 4;
      ctx.strokeStyle = rgba(i % 3 ? palette.muted : layerColor(i % 9), 0.26);
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + length, y + Math.sin(i) * 0.7);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawLayer(i) {
    const presence = layerPresence[i];
    if (presence &lt; 0.01) return;
    const points = curves[i];
    const colorA = layerColor(i);
    const colorB = layerColor(i + 2, 1);
    const colorC = layerColor(i + 4, 2);
    const composite = darkField ? &#x27;screen&#x27; : &#x27;multiply&#x27;;
    const depth = 1 - Math.abs(i - 4) / 7;

    ctx.save();
    ctx.globalCompositeOperation = composite;
    const path = new Path2D();
    const oldCtx = ctx;
    ctx.beginPath();
    traceOffset(points, 1, false);
    traceOffset(points, -1, true);
    ctx.closePath();
    const gradient = ctx.createLinearGradient(0, H * 0.3, W, H * 0.7);
    gradient.addColorStop(0, rgba(colorA, 0.86));
    gradient.addColorStop(0.42, rgba(colorB, 0.92));
    gradient.addColorStop(0.73, rgba(colorC, 0.78));
    gradient.addColorStop(1, rgba(colorA, 0.62));
    ctx.fillStyle = gradient;
    ctx.globalAlpha = presence * (darkField ? 0.17 + depth * 0.065 : 0.095 + depth * 0.045);
    ctx.fill();

    ctx.globalAlpha = presence * (0.26 + depth * 0.13);
    ctx.lineWidth = 0.65 + depth * 0.55;
    ctx.strokeStyle = rgba(mixColor(colorA, palette.fg, darkField ? 0.22 : 0.08), 0.9);
    ctx.stroke();

    const offsets = [-0.72, -0.36, 0, 0.36, 0.72];
    for (let q = 0; q &lt; offsets.length; q++) {
      ctx.beginPath();
      traceOffset(points, offsets[q], false);
      ctx.globalAlpha = presence * (q === 2 ? 0.20 : 0.10) * lerp(1, 1.3, shadowMix);
      ctx.lineWidth = q === 2 ? 0.85 : 0.55;
      ctx.strokeStyle = rgba(q % 2 ? colorB : colorC, 0.9);
      ctx.stroke();
    }

    const cellCount = 5;
    for (let c = 0; c &lt; cellCount; c++) {
      const u = clamp(0.16 + c * 0.17 + Math.sin(i * 1.7 + c) * 0.018, 0.08, 0.94);
      const index = Math.round(u * (points.length - 1));
      const p = points[index];
      const scale = 0.55 + hash(i * 17 + c) * 0.42;
      drawLens(p, p.thickness * scale, colorB, colorC, presence * (0.12 + depth * 0.05), i + c);
    }
    ctx.restore();
  }

  function drawLens(p, size, colorA, colorB, alpha, seed) {
    const length = size * (2.4 + hash(seed * 9.3));
    const width = size * (0.48 + hash(seed * 4.2) * 0.42);
    const cx = p.x + p.normalX * size * (hash(seed) - 0.5) * 0.8;
    const cy = p.y + p.normalY * size * (hash(seed) - 0.5) * 0.8;
    const tx = p.tx * length;
    const ty = p.ty * length;
    const nx = p.normalX * width;
    const ny = p.normalY * width;
    ctx.beginPath();
    ctx.moveTo(cx - tx, cy - ty);
    ctx.bezierCurveTo(cx - tx * 0.28 + nx, cy - ty * 0.28 + ny, cx + tx * 0.3 + nx, cy + ty * 0.3 + ny, cx + tx, cy + ty);
    ctx.bezierCurveTo(cx + tx * 0.28 - nx, cy + ty * 0.28 - ny, cx - tx * 0.3 - nx, cy - ty * 0.3 - ny, cx - tx, cy - ty);
    ctx.closePath();
    const grad = ctx.createLinearGradient(cx - tx, cy - ty, cx + tx, cy + ty);
    grad.addColorStop(0, rgba(colorA, 0));
    grad.addColorStop(0.5, rgba(colorB, 0.82));
    grad.addColorStop(1, rgba(colorA, 0));
    ctx.globalAlpha = alpha;
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.globalAlpha = alpha * 1.55;
    ctx.strokeStyle = rgba(mixColor(colorA, colorB, 0.5), 0.9);
    ctx.lineWidth = 0.65;
    ctx.stroke();
  }

  function drawFoldSkins() {
    const specs = [
      { layer: 3, a: 0.34, b: 0.62, lift: -0.34, belly: 0.12, color: 1 },
      { layer: 5, a: 0.43, b: 0.79, lift: 0.31, belly: -0.15, color: 4 },
      { layer: 4, a: 0.55, b: 0.91, lift: -0.25, belly: 0.22, color: 2 },
      { layer: 6, a: 0.18, b: 0.52, lift: 0.22, belly: -0.12, color: 5 }
    ];
    ctx.save();
    ctx.globalCompositeOperation = darkField ? &#x27;screen&#x27; : &#x27;multiply&#x27;;
    for (let s = 0; s &lt; specs.length; s++) {
      const spec = specs[s];
      const points = curves[spec.layer];
      const a = sampleCurve(points, spec.a);
      const b = sampleCurve(points, spec.b);
      const cx = (a.x + b.x) * 0.5;
      const cy = (a.y + b.y) * 0.5;
      const lift = H * spec.lift * lerp(1, 0.68, shadowMix);
      const belly = H * spec.belly * lerp(1, 1.24, shadowMix);
      const pulse = 1 + Math.sin(clock * 0.13 + s * 1.8) * 0.028;
      const colorA = layerColor(spec.color + s, s);
      const colorB = layerColor(spec.color + s + 2, s + 1);
      for (let echo = 0; echo &lt; 6; echo++) {
        const scale = 1 - echo * 0.105;
        const ax = lerp(cx, a.x, scale);
        const ay = lerp(cy, a.y, scale);
        const bx = lerp(cx, b.x, scale);
        const by = lerp(cy, b.y, scale);
        const dx = bx - ax;
        const twist = Math.sin(s * 2.1 + echo * 0.7 + clock * 0.05) * H * 0.018;
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.bezierCurveTo(
          ax + dx * 0.16,
          ay + lift * pulse * scale,
          cx - dx * 0.17,
          cy + lift * 1.15 * pulse * scale + twist,
          cx + dx * 0.06,
          cy + lift * 0.84 * scale
        );
        ctx.bezierCurveTo(
          cx + dx * 0.34,
          cy + lift * 0.57 * scale,
          bx - dx * 0.11,
          by + lift * 0.17 * scale,
          bx,
          by
        );
        ctx.bezierCurveTo(
          bx - dx * 0.18,
          by + belly * pulse * scale,
          cx + dx * 0.28,
          cy + belly * 1.1 * pulse * scale - twist,
          cx - dx * 0.08,
          cy + belly * 0.78 * scale
        );
        ctx.bezierCurveTo(
          cx - dx * 0.32,
          cy + belly * 0.52 * scale,
          ax + dx * 0.12,
          ay + belly * 0.13 * scale,
          ax,
          ay
        );
        ctx.closePath();

        if (echo === 0) {
          const gradient = ctx.createLinearGradient(ax, ay + lift, bx, by + belly);
          gradient.addColorStop(0, rgba(colorA, 0.08));
          gradient.addColorStop(0.48, rgba(colorB, 0.34));
          gradient.addColorStop(1, rgba(colorA, 0.04));
          ctx.fillStyle = gradient;
          ctx.globalAlpha = 0.48;
          ctx.fill();
        }
        ctx.strokeStyle = rgba(echo % 2 ? colorA : colorB, 0.9);
        ctx.globalAlpha = 0.16 - echo * 0.018;
        ctx.lineWidth = echo === 0 ? 1.1 : 0.58;
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  function irregularLoop(cx, cy, rx, ry, seed, turn, openAmount = 0) {
    const count = 90;
    ctx.beginPath();
    for (let j = 0; j &lt;= count; j++) {
      const a = (j / count) * TAU;
      const wobble = 1 + Math.sin(a * 3 + seed * 0.7 + clock * 0.08) * 0.065 + Math.sin(a * 7 - seed) * 0.025;
      const pinch = 1 - shadowMix * 0.26 * Math.pow(Math.max(0, Math.cos(a - 0.2)), 3);
      const drift = openAmount * Math.sin(a) * Math.sin(a * 0.5);
      const x = cx + Math.cos(a + turn) * rx * wobble * pinch + drift * rx;
      const y = cy + Math.sin(a) * ry * (1 + Math.cos(a * 4 + seed) * 0.045) + Math.sin(a + turn) * rx * 0.12;
      if (j === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
  }

  function drawPalimpsest() {
    ctx.save();
    ctx.globalCompositeOperation = darkField ? &#x27;screen&#x27; : &#x27;multiply&#x27;;
    const centers = [
      [0.49, 0.31, 0.083, 0.18, -0.18],
      [0.61, 0.54, 0.112, 0.21, 0.28],
      [0.74, 0.69, 0.088, 0.17, -0.42]
    ];
    centers.forEach((center, c) =&gt; {
      const [nx, ny, nrx, nry, turn] = center;
      const pull = pointer.inside ? Math.exp(-Math.pow((pointer.x - nx) / 0.22, 2)) : 0;
      const cx = (nx + (pointer.x - nx) * pull * 0.045) * W;
      const cy = (ny + (pointer.y - ny) * pull * 0.035) * H;
      for (let k = 0; k &lt; 11; k++) {
        const q = k / 10;
        const pulse = 1 + Math.sin(clock * 0.16 + k * 0.9 + c) * 0.018;
        irregularLoop(
          cx,
          cy,
          W * (nrx + q * 0.045) * pulse,
          H * (nry + q * 0.047) * pulse,
          c * 11 + k,
          turn + q * 0.22 * (c - 1),
          shadowMix * (c === 1 ? 0.32 : 0.15)
        );
        ctx.strokeStyle = rgba(layerColor(k + c * 2, c), 0.72);
        ctx.globalAlpha = 0.065 + (1 - q) * 0.105 + (state === &#x27;candidate&#x27; ? 0.035 : 0);
        ctx.lineWidth = k % 4 === 0 ? 1.05 : 0.56;
        ctx.stroke();
      }
    });

    for (let k = 0; k &lt; 14; k++) {
      const yBase = H * (0.22 + k * 0.041);
      ctx.beginPath();
      for (let j = 0; j &lt;= 80; j++) {
        const u = j / 80;
        const x = u * W;
        const fold1 = Math.exp(-Math.pow((u - 0.59) / 0.17, 2));
        const fold2 = Math.exp(-Math.pow((u - 0.74) / 0.12, 2));
        const y = yBase
          + Math.sin(u * TAU * 1.2 + k * 0.54 + clock * 0.06) * H * 0.028
          + Math.sin(u * TAU * 4.2 - k) * H * 0.006
          + (k - 6.5) * fold1 * Math.sin(u * 21 + clock * 0.08) * 1.2
          - (k - 6.5) * fold2 * 0.7;
        if (j === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = rgba(layerColor(k, 2), 0.62);
      ctx.globalAlpha = 0.052 + (k % 3 === 0 ? 0.052 : 0);
      ctx.lineWidth = k % 3 === 0 ? 0.8 : 0.45;
      ctx.stroke();
    }
    ctx.restore();
  }

  function aperturePath(a, scale = 1, phase = 0) {
    const count = 72;
    ctx.beginPath();
    for (let j = 0; j &lt;= count; j++) {
      const angle = (j / count) * TAU;
      const wobble = 1 + Math.sin(angle * 3 + clock * 0.16 + phase) * 0.09 + Math.cos(angle * 7 - phase) * 0.032;
      const x = a.x * W + Math.cos(angle) * a.rx * scale * wobble;
      const y = a.y * H + Math.sin(angle) * a.ry * scale * (1 + Math.sin(angle * 5 + phase) * 0.04);
      if (j === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
  }

  function drawApertureMask() {
    const a = aperture();
    ctx.save();
    aperturePath(a, 1, 0);
    const voidGradient = ctx.createRadialGradient(a.x * W, a.y * H, 0, a.x * W, a.y * H, Math.max(a.rx, a.ry));
    const deep = mixColor(palette.bg, palette.page, darkField ? 0.62 : 0.28);
    voidGradient.addColorStop(0, rgba(deep, lerp(0.9, 0.96, shadowMix)));
    voidGradient.addColorStop(0.64, rgba(mixColor(deep, layerColor(5), 0.05), 0.88));
    voidGradient.addColorStop(1, rgba(palette.bg, 0.54));
    ctx.fillStyle = voidGradient;
    ctx.fill();

    ctx.clip();
    ctx.globalCompositeOperation = darkField ? &#x27;screen&#x27; : &#x27;multiply&#x27;;
    for (let k = 0; k &lt; 10; k++) {
      const y = a.y * H + (k - 4.5) * a.ry * 0.22;
      ctx.beginPath();
      for (let j = 0; j &lt;= 36; j++) {
        const u = j / 36;
        const x = (a.x * W - a.rx * 1.15) + u * a.rx * 2.3;
        const yy = y + Math.sin(u * TAU * 1.5 + k + clock * 0.04) * a.ry * 0.08;
        if (j === 0) ctx.moveTo(x, yy);
        else ctx.lineTo(x, yy);
      }
      ctx.strokeStyle = rgba(layerColor(k, 3), 0.16);
      ctx.lineWidth = 0.55;
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawApertureRim() {
    const a = aperture();
    ctx.save();
    ctx.globalCompositeOperation = darkField ? &#x27;screen&#x27; : &#x27;multiply&#x27;;
    for (let k = 0; k &lt; 7; k++) {
      const q = 0.86 + k * 0.075;
      aperturePath(a, q, k * 0.73);
      ctx.strokeStyle = rgba(layerColor(k + 1, k % 2), 0.78);
      ctx.globalAlpha = 0.045 + (k === 3 ? 0.14 : 0.035) + shadowMix * (k % 2 ? 0.05 : 0);
      ctx.lineWidth = k === 3 ? 1.4 : 0.65;
      ctx.stroke();
    }
    ctx.restore();
  }

  function sampleCurve(points, u) {
    const raw = clamp(u, 0, 1) * (points.length - 1);
    const a = Math.floor(raw);
    const b = Math.min(points.length - 1, a + 1);
    const t = raw - a;
    const p = points[a];
    const q = points[b];
    return {
      x: lerp(p.x, q.x, t),
      y: lerp(p.y, q.y, t),
      tx: lerp(p.tx, q.tx, t),
      ty: lerp(p.ty, q.ty, t)
    };
  }

  function drawFlow() {
    ctx.save();
    ctx.globalCompositeOperation = darkField ? &#x27;screen&#x27; : &#x27;multiply&#x27;;
    const direction = lerp(1, -0.72, smooth(shadowMix));
    for (let i = 0; i &lt; 9; i++) {
      const presence = layerPresence[i];
      if (presence &lt; 0.08) continue;
      const points = curves[i];
      for (let p = 0; p &lt; 7; p++) {
        const seed = hash(i * 31 + p * 7);
        const u = ((seed + direction * clock * (0.012 + hash(p + i) * 0.009)) % 1 + 1) % 1;
        const point = sampleCurve(points, u);
        const length = 3 + 10 * (0.5 + resonance) * hash(p * 4 + i);
        ctx.beginPath();
        ctx.moveTo(point.x - point.tx * length, point.y - point.ty * length);
        ctx.lineTo(point.x + point.tx * length, point.y + point.ty * length);
        ctx.strokeStyle = rgba(mixColor(layerColor(i), palette.fg, darkField ? 0.34 : 0.08), 0.9);
        ctx.globalAlpha = presence * (0.15 + resonance * 0.2) * (0.55 + hash(p + i));
        ctx.lineWidth = 0.7 + hash(p * i + 1) * 1.1;
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  function drawRipples() {
    ctx.save();
    ctx.globalCompositeOperation = darkField ? &#x27;screen&#x27; : &#x27;multiply&#x27;;
    for (const r of ripples) {
      const life = clamp(1 - r.age / r.life, 0, 1);
      for (let k = 0; k &lt; 5; k++) {
        const radius = W * (0.018 + r.age * 0.011 + k * 0.012);
        ctx.beginPath();
        const count = 56;
        for (let j = 0; j &lt;= count; j++) {
          const a = (j / count) * TAU;
          const deformation = 1 + Math.sin(a * 4 + r.seed + k) * 0.08;
          const x = r.x * W + Math.cos(a) * radius * deformation;
          const y = r.y * H + Math.sin(a) * radius * (H / W) * 1.65 * deformation;
          if (j === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = rgba(layerColor(k + r.seed, k), 0.75);
        ctx.globalAlpha = life * (0.12 - k * 0.014);
        ctx.lineWidth = 0.65;
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  function drawSeams() {
    ctx.save();
    ctx.globalCompositeOperation = darkField ? &#x27;screen&#x27; : &#x27;multiply&#x27;;
    for (const seam of seams) {
      if (seam.points.length &lt; 2) continue;
      const life = clamp(seam.life, 0, 1);
      for (let echo = 0; echo &lt; 5; echo++) {
        ctx.beginPath();
        seam.points.forEach((p, index) =&gt; {
          const offset = (echo - 2) * (2.5 + echo * 0.7);
          const x = p.x * W + Math.sin(index * 0.4 + echo) * offset;
          const y = p.y * H + Math.cos(index * 0.31 + echo) * offset;
          if (index === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.strokeStyle = rgba(layerColor(echo + generation, echo), 0.82);
        ctx.globalAlpha = life * (echo === 2 ? 0.32 : 0.1);
        ctx.lineWidth = echo === 2 ? 1.4 : 0.62;
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  function drawLatentShadow() {
    const edgeInstability = 0.018 + shadowMix * 0.11;
    ctx.save();
    ctx.globalCompositeOperation = darkField ? &#x27;screen&#x27; : &#x27;multiply&#x27;;
    for (let side = 0; side &lt; 2; side++) {
      ctx.beginPath();
      for (let j = 0; j &lt;= 44; j++) {
        const u = j / 44;
        const x = side ? W - u * W * 0.19 : u * W * 0.19;
        const y = H * (0.12 + u * 0.76) + Math.sin(u * 18 + clock * 0.13 + side) * H * edgeInstability;
        if (j === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = rgba(layerColor(side ? 2 : 7, 4), 0.82);
      ctx.globalAlpha = 0.055 + shadowMix * 0.09;
      ctx.lineWidth = 0.7;
      ctx.stroke();
    }
    ctx.restore();
  }

  function draw() {
    drawBackdrop();
    for (let i = 0; i &lt; 4; i++) drawLayer(i);
    drawFoldSkins();
    drawPalimpsest();
    drawApertureMask();
    for (let i = 4; i &lt; 9; i++) drawLayer(i);
    drawFlow();
    drawApertureRim();
    drawRipples();
    drawSeams();
    drawLatentShadow();
  }

  function addRipple(x, y, strength = 1) {
    ripples.push({ x, y, age: 0, life: 8.5, strength, seed: Math.floor(Math.random() * 12) });
    if (ripples.length &gt; 8) ripples.shift();
  }

  function setStatus() {
    let status = &#x27;The field is learning the shape of your attention.&#x27;;
    if (state === &#x27;candidate&#x27;) status = &#x27;Convergence has appeared. It will not name itself.&#x27;;
    if (state === &#x27;locked&#x27;) status = &#x27;The map holds—without closing the horizon.&#x27;;
    if (state === &#x27;returning&#x27;) status = &#x27;Complexity is folding toward a renewed simplicity.&#x27;;
    if (shadowTarget &gt; 0.5 &amp;&amp; state === &#x27;field&#x27;) status = &#x27;The same field is turning inward: relation becoming capture.&#x27;;
    statusNode.textContent = status;

    const percent = Math.round(shadowMix * 100);
    if (shadowMix &gt; 0.02 &amp;&amp; shadowMix &lt; 0.98) {
      orientationNode.textContent = `${shadowTarget ? &#x27;turning inward&#x27; : &#x27;returning outward&#x27;} · ${percent}%`;
    } else {
      orientationNode.textContent = shadowMix &gt;= 0.98 ? &#x27;inward orientation&#x27; : &#x27;outward orientation&#x27;;
    }

    actionButton.textContent = state === &#x27;candidate&#x27;
      ? &#x27;Attest convergence&#x27;
      : state === &#x27;locked&#x27;
        ? &#x27;Release renewed form&#x27;
        : state === &#x27;returning&#x27;
          ? &#x27;Returning…&#x27;
          : &#x27;Send attention&#x27;;
    actionButton.disabled = state === &#x27;returning&#x27;;
  }

  function update(dt) {
    const motionScale = reducedMotion ? 0.12 : 1;
    clock += dt * 0.001 * motionScale;
    pointer.vx += (pointer.tx - pointer.x) * 0.075;
    pointer.vy += (pointer.ty - pointer.y) * 0.075;
    pointer.vx *= 0.76;
    pointer.vy *= 0.76;
    pointer.x += pointer.vx;
    pointer.y += pointer.vy;

    const spring = (shadowTarget - shadowMix) * 0.00007 * dt;
    shadowVelocity = (shadowVelocity + spring) * Math.pow(0.88, dt / 16.67);
    shadowMix = clamp(shadowMix + shadowVelocity, 0, 1);
    if (shadowMix === 0 || shadowMix === 1) shadowVelocity *= 0.5;

    attention += ((pointer.inside ? 1 : 0.18) - attention) * Math.min(1, dt * 0.0024);
    const order = [4, 3, 5, 2, 6, 1, 7, 0, 8];
    for (let rank = 0; rank &lt; order.length; rank++) {
      const target = rank &lt; depthTarget ? 1 : 0;
      const i = order[rank];
      layerPresence[i] += (target - layerPresence[i]) * Math.min(1, dt * 0.004);
    }

    for (let i = ripples.length - 1; i &gt;= 0; i--) {
      ripples[i].age += dt * 0.001;
      if (ripples[i].age &gt; ripples[i].life) ripples.splice(i, 1);
    }
    for (let i = seams.length - 1; i &gt;= 0; i--) {
      if (!seams[i].active) seams[i].life -= dt * 0.00008;
      if (seams[i].life &lt;= 0) seams.splice(i, 1);
    }

    if (state === &#x27;field&#x27;) {
      resonance = Math.max(0.04, resonance - dt * 0.000008);
      if (resonance &gt;= 0.68) {
        state = &#x27;candidate&#x27;;
        setStatus();
        eventTone(&#x27;candidate&#x27;);
      }
    }

    if (state === &#x27;returning&#x27;) {
      returnProgress += dt / 3400;
      if (returnProgress &gt;= 1) {
        returnProgress = -1;
        generation = (generation + 1) % 6;
        resonance = 0.14;
        state = &#x27;field&#x27;;
        addRipple(0.18, 0.52, 1.2);
        setStatus();
        eventTone(&#x27;return&#x27;);
      }
    }

    for (let i = 0; i &lt; 9; i++) buildCurve(i);
    statusClock += dt;
    if (statusClock &gt; 120) {
      statusClock = 0;
      setStatus();
    }
    if (frame % 4 === 0) updateAudio();
  }

  function animate(now) {
    const dt = Math.min(40, now - lastTime || 16.67);
    lastTime = now;
    frame++;
    update(dt);
    draw();
    requestAnimationFrame(animate);
  }

  function canvasPoint(event) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: clamp((event.clientX - rect.left) / rect.width, 0, 1),
      y: clamp((event.clientY - rect.top) / rect.height, 0, 1)
    };
  }

  function impress(x, y, strength = 1) {
    addRipple(x, y, strength);
    if (state === &#x27;field&#x27;) resonance = clamp(resonance + 0.18 * strength, 0, 1);
    eventTone(&#x27;touch&#x27;, y);
  }

  canvas.addEventListener(&#x27;pointerenter&#x27;, event =&gt; {
    pointer.inside = true;
    const p = canvasPoint(event);
    pointer.tx = p.x;
    pointer.ty = p.y;
  });

  canvas.addEventListener(&#x27;pointerleave&#x27;, () =&gt; {
    pointer.inside = false;
    if (!pointer.down) currentSeam = null;
  });

  canvas.addEventListener(&#x27;pointerdown&#x27;, event =&gt; {
    canvas.setPointerCapture(event.pointerId);
    const p = canvasPoint(event);
    pointer.down = true;
    pointer.tx = p.x;
    pointer.ty = p.y;
    pressedAt = p;
    dragged = false;
    currentSeam = { points: [p], life: 1, active: true };
    seams.push(currentSeam);
    if (seams.length &gt; 5) seams.shift();
  });

  canvas.addEventListener(&#x27;pointermove&#x27;, event =&gt; {
    const p = canvasPoint(event);
    pointer.tx = p.x;
    pointer.ty = p.y;
    if (!pointer.down || !currentSeam) return;
    const previous = currentSeam.points[currentSeam.points.length - 1];
    if (Math.hypot(p.x - previous.x, p.y - previous.y) &gt; 0.008) {
      currentSeam.points.push(p);
      if (currentSeam.points.length &gt; 90) currentSeam.points.shift();
      dragged = true;
      if (state === &#x27;field&#x27;) resonance = clamp(resonance + 0.0065, 0, 1);
    }
  });

  function endPointer(event) {
    if (!pointer.down) return;
    const p = canvasPoint(event);
    pointer.down = false;
    if (currentSeam) currentSeam.active = false;
    if (dragged) {
      impress(p.x, p.y, 0.78);
      eventTone(&#x27;peel&#x27;, p.y);
    } else {
      impress(p.x, p.y, 1);
    }
    currentSeam = null;
  }

  canvas.addEventListener(&#x27;pointerup&#x27;, endPointer);
  canvas.addEventListener(&#x27;pointercancel&#x27;, event =&gt; {
    pointer.down = false;
    if (currentSeam) currentSeam.active = false;
    currentSeam = null;
  });

  depthInput.addEventListener(&#x27;input&#x27;, () =&gt; {
    depthTarget = Number(depthInput.value);
    depthValue.textContent = String(depthTarget);
  });

  shadowInput.addEventListener(&#x27;change&#x27;, () =&gt; {
    shadowTarget = shadowInput.checked ? 1 : 0;
    setStatus();
    eventTone(&#x27;shadow&#x27;);
  });

  actionButton.addEventListener(&#x27;click&#x27;, () =&gt; {
    if (state === &#x27;candidate&#x27;) {
      state = &#x27;locked&#x27;;
      resonance = 1;
      addRipple(0.62, 0.5, 1.55);
      eventTone(&#x27;lock&#x27;);
