  function findConvergenceCandidate() {

      let y = 0;

      let spread = 0;
      for (const mark of cluster) {

        y += mark.y * w;

      y /= Math.max(weight, 0.001);

      const dy = (ny - wave.y) * (H / W);
      const distance = Math.hypot(dx, dy);
      force += Math.sin(distance * 58 - wave.age * 2.1 + layer * 0.31) * Math.exp(-distance * 5.2) * life * wave.strength * 0.018;
    }
    return force;
  }

  function buildCurve(i) {
    const points = curves[i];
    points.length = 0;
    const count = 108;
    const z = (i - 4) / 4;
    const coherence = state === &#x27;locked&#x27; ? 0.76 * lockStrength : state === &#x27;candidate&#x27; ? 0.38 : 0;
    const grip = shadowGrip();
    const time = (reducedMotion ? clock * 0.12 : clock) * lerp(1, -0.52, grip);
    const a = aperture();
    const foldCenter = lerp(0.63, 0.54, shadowMix);

    for (let j = 0; j &lt; count; j++) {
      const u = j / (count - 1);
      const nx = lerp(-0.10, 1.10, u);
      const fold = Math.exp(-Math.pow((nx - foldCenter) / 0.23, 2));
      const second = Math.exp(-Math.pow((nx - 0.78) / 0.18, 2));
      let y = 0.51;
      y += Math.sin(nx * TAU * 0.86 + time * 0.24 + (1 - coherence) * i * 0.39) * (0.094 + 0.018 * Math.sin(i));
      y += Math.sin(nx * TAU * 2.13 - time * 0.17 + i * 0.67) * 0.032;
      y += Math.cos(nx * TAU * 3.7 + time * 0.11 - i * 0.53) * 0.013;
      y += z * (0.205 - fold * 0.116 - second * 0.048);

      const ax = (nx - a.x) / Math.max(a.rx / W, 0.001);
      const nearBlind = Math.exp(-ax * ax * 0.58);
      const side = i &lt; 4 ? -1 : i &gt; 4 ? 1 : Math.sin(i + time) &gt; 0 ? 1 : -1;
      const refraction = Math.sin(ax * 3.2 + i * 0.63 + clock * 0.2) * blindEnergy;
      y += side * nearBlind * (a.ry / H) * lerp(0.72, 0.45, grip);
      y += nearBlind * refraction * 0.034 * lerp(1, 0.42, grip);
      y += (a.y - y) * Math.exp(-Math.pow((nx - a.x) / 0.29, 2)) * grip * 0.34;
      const corrupt = Math.exp(-Math.pow((nx - a.x) / 0.38, 2));
      y += Math.sin(nx * 71 + i * 1.73 - clock * 0.61) * corrupt * grip * (0.009 + blindEnergy * 0.013);
      y += Math.sin(nx * 23 - i * 0.92 + clock * 0.29) * corrupt * grip * 0.011;

      if (emergentInput.checked &amp;&amp; emergentFocus.coherence &gt; 0.02) {
        const secondary = Math.exp(-Math.pow((nx - emergentFocus.x) / 0.20, 2));
        const sign = i &lt; 4 ? -1 : i &gt; 4 ? 1 : Math.sin(i) &gt; 0 ? 1 : -1;
        y += (emergentFocus.y - y) * secondary * emergentFocus.coherence * 0.11;
        y += sign * secondary * emergentFocus.coherence * 0.022;
      }
      if (lockPoint) {
        const locked = Math.exp(-Math.pow((nx - lockPoint.x) / 0.16, 2));
        y += (lockPoint.y - y) * locked * 0.16 * lockStrength;
      }

      const pull = Math.exp(-Math.pow((nx - pointer.x) / 0.17, 2));
      y += (pointer.y - y) * pull * (pointer.inside ? 0.08 : 0.018) * (0.58 + (i + 1) / 18);
      if (pointer.down) y += (i &lt; 4 ? -1 : 1) * pull * 0.034;
      y += memoryForce(nx, y, i);

      let x = nx + (pointer.x - 0.5) * z * 0.014 * (pointer.inside ? 1 : 0);
      x += Math.sin((nx - foldCenter) * 17 + i * 0.84 - time * 0.09) * fold * (0.013 + (1 - Math.abs(z)) * 0.022) * (i % 2 ? 1 : -1);
      x += nearBlind * refraction * 0.012;
      x += Math.sin(nx * 89 + i * 2.2 + clock * 0.37) * corrupt * grip * 0.006;
      const thickness = H * (0.034 + fold * 0.026 + second * 0.012)
        * (1 + Math.sin(nx * TAU * PHI + i * 0.61 - time * 0.2) * 0.22)
        * lerp(1, 0.69, grip)
        * (1 + corrupt * grip * Math.sin(nx * 37 + i) * 0.13);
      points.push({ x: x * W, y: y * H, thickness });
    }

    for (let j = 0; j &lt; points.length; j++) {
      const prev = points[Math.max(0, j - 1)];
      const next = points[Math.min(points.length - 1, j + 1)];
      const dx = next.x - prev.x;
      const dy = next.y - prev.y;
      const length = Math.hypot(dx, dy) || 1;
      points[j].tx = dx / length;
      points[j].ty = dy / length;
      points[j].normalX = -dy / length;
      points[j].normalY = dx / length;
    }
  }

  function traceOffset(points, offset, reverse = false) {
    const start = reverse ? points.length - 1 : 0;
    const end = reverse ? -1 : points.length;
    const step = reverse ? -1 : 1;
    for (let j = start; j !== end; j += step) {
      const p = points[j];
      const x = p.x + p.normalX * p.thickness * offset;
      const y = p.y + p.normalY * p.thickness * offset;
      if (j === start) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
  }

  function sampleCurve(points, u) {
    const raw = clamp(u, 0, 1) * (points.length - 1);
    const a = Math.floor(raw);
    const b = Math.min(points.length - 1, a + 1);
    const t = raw - a;
    return {
      x: lerp(points[a].x, points[b].x, t),
      y: lerp(points[a].y, points[b].y, t),
      tx: lerp(points[a].tx, points[b].tx, t),
      ty: lerp(points[a].ty, points[b].ty, t)
    };
  }

  function fieldSampleAt(nx, ny) {
    const u = clamp((nx + 0.1) / 1.2, 0, 1);
    let first = null;
    let second = null;
    for (let layer = 0; layer &lt; curves.length; layer++) {
      if (!curves[layer].length) continue;
      const point = sampleCurve(curves[layer], u);
      const distance = Math.abs(point.y / H - ny);
      const sample = { ...point, layer, distance };
      if (!first || distance &lt; first.distance) {
        second = first;
        first = sample;
      } else if (!second || distance &lt; second.distance) {
        second = sample;
      }
    }
    return { first, second: second || first };
  }

  function fieldColorAt(nx, ny, phase = 0) {
    const { first, second } = fieldSampleAt(nx, ny);
    if (!first) return gradedColor(colorFor(phase, phase), phase);
    const spatial = Math.floor(nx * 7 + ny * 5 + phase);
    const colorA = gradedColor(colorFor(first.layer, spatial), first.layer + phase);
    const colorB = gradedColor(colorFor(second.layer + 1, spatial + 2), second.layer + phase + 1);
    const denominator = Math.max(0.0001, first.distance + second.distance);
    const blend = clamp(first.distance / denominator, 0.12, 0.52);
    return intensify(mixColor(colorA, colorB, blend), darkField ? 1.18 : 1.04);
  }

  function drawBackdrop() {
    const grip = shadowGrip();
    const temperatureDepth = 0.12 + Math.abs(temperature - 0.5) * (darkField ? 0.30 : 0.16);
    const temperatureColor = temperatureShift(palette.bg, 1);
    const tint = mixColor(mixColor(palette.bg, temperatureColor, temperatureDepth), palette.shadow, grip * 0.073);
    const base = ctx.createLinearGradient(0, lerp(0, H, grip), W, lerp(H, 0, grip));
    base.addColorStop(0, rgba(mixColor(tint, gradedColor(colorFor(0, 1), 0), darkField ? 0.10 : 0.03), 1));
    base.addColorStop(0.47, rgba(tint, 1));
    base.addColorStop(1, rgba(mixColor(tint, gradedColor(colorFor(3, 2), 3), darkField ? 0.09 : 0.025), 1));
    ctx.fillStyle = base;
    ctx.fillRect(0, 0, W, H);

    const blooms = [
      [lerp(0.17, 0.82, grip), lerp(0.25, 0.78, grip), 0.5, 0],
      [lerp(0.63, 0.56, grip), lerp(0.47, 0.55, grip), 0.58, 3],
      [lerp(0.87, 0.18, grip), lerp(0.73, 0.28, grip), 0.43, 5]
    ];
    for (let i = 0; i &lt; blooms.length; i++) {
      const [x, y, radius, colorIndex] = blooms[i];
      const gradient = ctx.createRadialGradient(x * W, y * H, 0, x * W, y * H, radius * Math.max(W, H));
      const bloomColor = gradedColor(colorFor(colorIndex, i), i);
      gradient.addColorStop(0, rgba(mixColor(bloomColor, palette.shadow, grip * (i === 0 ? 0.20 : 0.08)), 0.18));
      gradient.addColorStop(1, rgba(bloomColor, 0));
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, W, H);
    }

    ctx.save();
    ctx.globalCompositeOperation = darkField ? &#x27;screen&#x27; : &#x27;multiply&#x27;;
    for (let k = 0; k &lt; 18; k++) {
      ctx.beginPath();
      for (let j = 0; j &lt;= 48; j++) {
        const x = j / 48 * W;
        const y = H * (0.08 + k / 20) + Math.sin(j * 0.23 + k * 0.71 + clock * 0.05) * H * 0.014;
        if (j === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = rgba(gradedColor(colorFor(k % 9, 1), k), 0.035);
      ctx.lineWidth = 0.6;
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawLayer(i) {
    const points = curves[i];
    const colorA = gradedColor(colorFor(i), i);
    const colorB = gradedColor(colorFor(i + 2, 1), i + 1);
    const colorC = gradedColor(colorFor(i + 4, 2), i + 2);
    const depth = 1 - Math.abs(i - 4) / 7;
    ctx.save();
    ctx.globalCompositeOperation = darkField ? &#x27;screen&#x27; : &#x27;multiply&#x27;;
    ctx.beginPath();
    traceOffset(points, 1);
    traceOffset(points, -1, true);
    ctx.closePath();
    const gradient = ctx.createLinearGradient(0, H * 0.3, W, H * 0.7);
    gradient.addColorStop(0, rgba(colorA, 0.86));
    gradient.addColorStop(0.42, rgba(colorB, 0.92));
    gradient.addColorStop(0.73, rgba(colorC, 0.78));
    gradient.addColorStop(1, rgba(colorA, 0.62));
    ctx.fillStyle = gradient;
    ctx.globalAlpha = darkField ? 0.16 + depth * 0.06 : 0.09 + depth * 0.04;
    ctx.fill();
    ctx.globalAlpha = 0.24 + depth * 0.13;
    ctx.strokeStyle = rgba(mixColor(colorA, palette.fg, darkField ? 0.22 : 0.08), 0.9);
    ctx.lineWidth = 0.7 + depth * 0.5;
    ctx.stroke();
    for (const offset of [-0.7, -0.35, 0, 0.35, 0.7]) {
      ctx.beginPath();
      traceOffset(points, offset);
      ctx.globalAlpha = offset === 0 ? 0.18 : 0.085;
      ctx.strokeStyle = rgba(offset &lt; 0 ? colorB : colorC, 0.9);
      ctx.lineWidth = offset === 0 ? 0.85 : 0.55;
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawFolds() {
    const specs = [
      [3, 0.34, 0.62, -0.34, 0.12, 1],
      [5, 0.43, 0.79, 0.31, -0.15, 4],
      [4, 0.55, 0.91, -0.25, 0.22, 2],
      [6, 0.18, 0.52, 0.22, -0.12, 5]
    ];
    ctx.save();
    ctx.globalCompositeOperation = darkField ? &#x27;screen&#x27; : &#x27;multiply&#x27;;
    specs.forEach((spec, index) =&gt; {
      const [layer, au, bu, liftValue, bellyValue, colorIndex] = spec;
      const a = sampleCurve(curves[layer], au);
      const b = sampleCurve(curves[layer], bu);
      const cx = (a.x + b.x) * 0.5;
      const cy = (a.y + b.y) * 0.5;
      const dx = b.x - a.x;
      const lift = H * liftValue * lerp(1, 0.68, shadowMix);
      const belly = H * bellyValue * lerp(1, 1.22, shadowMix);
      for (let echo = 0; echo &lt; 6; echo++) {
        const q = 1 - echo * 0.105;
        const ax = lerp(cx, a.x, q);
        const ay = lerp(cy, a.y, q);
        const bx = lerp(cx, b.x, q);
        const by = lerp(cy, b.y, q);
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.bezierCurveTo(ax + dx * 0.16, ay + lift * q, cx - dx * 0.17, cy + lift * 1.15 * q, cx + dx * 0.06, cy + lift * 0.84 * q);
        ctx.bezierCurveTo(cx + dx * 0.34, cy + lift * 0.57 * q, bx - dx * 0.11, by + lift * 0.17 * q, bx, by);
        ctx.bezierCurveTo(bx - dx * 0.18, by + belly * q, cx + dx * 0.28, cy + belly * 1.1 * q, cx - dx * 0.08, cy + belly * 0.78 * q);
        ctx.bezierCurveTo(cx - dx * 0.32, cy + belly * 0.52 * q, ax + dx * 0.12, ay + belly * 0.13 * q, ax, ay);
        ctx.closePath();
        if (echo === 0) {
          const gradient = ctx.createLinearGradient(ax, ay + lift, bx, by + belly);
          gradient.addColorStop(0, rgba(gradedColor(colorFor(colorIndex, index), index), 0.06));
          gradient.addColorStop(0.48, rgba(gradedColor(colorFor(colorIndex + 2, index), index + 1), 0.31));
          gradient.addColorStop(1, rgba(gradedColor(colorFor(colorIndex, index), index + 2), 0.04));
          ctx.fillStyle = gradient;
          ctx.globalAlpha = 0.44;
          ctx.fill();
        }
        ctx.globalAlpha = 0.15 - echo * 0.018;
        ctx.strokeStyle = rgba(gradedColor(colorFor(colorIndex + echo, index), echo), 0.9);
        ctx.lineWidth = echo === 0 ? 1.05 : 0.56;
        ctx.stroke();
      }
    });
    ctx.restore();
  }

  function strokeLife(stroke) {
    if (stroke.active) return 1;
    const remaining = clamp(1 - stroke.age / stroke.life, 0, 1);
    const anchored = lockPoint &amp;&amp; stroke.points.some(point =&gt; Math.hypot(point.x + point.ox - lockPoint.x, point.y + point.oy - lockPoint.y) &lt; 0.19);
    return Math.pow(remaining, anchored ? 0.58 : 0.88);
  }

  function chalkPoint(point) {
    return { x: point.x + (point.ox || 0), y: point.y + (point.oy || 0) };
  }

  function chalkColorForPoint(point, stroke) {
    const colorKey = `${Math.floor(frame / 6)}:${Math.round(temperature * 36)}`;
    if (point.colorKey !== colorKey) {
      const position = chalkPoint(point);
      point.chalkColor = fieldColorAt(position.x, position.y, stroke.seed);
      point.colorKey = colorKey;
    }
    return point.chalkColor;
  }

  function drawChalkLane(stroke, lane, widthScale, alphaScale, blur = 0) {
    const points = stroke.points;
    const life = strokeLife(stroke);
    if (points.length &lt; 2 || life &lt;= 0) return;
    ctx.save();
    if (blur) ctx.filter = `blur(${blur}px)`;
    ctx.lineJoin = &#x27;round&#x27;;
    ctx.lineCap = &#x27;butt&#x27;;

    for (let i = 1; i &lt; points.length; i++) {
      const previous = points[Math.max(0, i - 2)];
      const a = points[i - 1];
      const b = points[i];
      const pa = chalkPoint(previous);
      const aa = chalkPoint(a);
      const bb = chalkPoint(b);
      const startX = (i === 1 ? aa.x : (pa.x + aa.x) * 0.5) * W;
      const startY = (i === 1 ? aa.y : (pa.y + aa.y) * 0.5) * H;
      const endX = ((aa.x + bb.x) * 0.5) * W;
      const endY = ((aa.y + bb.y) * 0.5) * H;
      const dx = (bb.x - aa.x) * W;
      const dy = (bb.y - aa.y) * H;
      const rawLength = Math.hypot(endX - startX, endY - startY);
      if (rawLength &lt; 0.35) continue;
      const length = Math.hypot(dx, dy) || 1;
      const nx = -dy / length;
      const ny = dx / length;
      const mess = (a.mess + b.mess) * 0.5;
      const seed = stroke.seed * 37 + i * 11.7;
      const baseWidth = Math.max(0.55, (a.width + b.width) * 0.5 * widthScale);
      const laneSpread = lane * (a.width + b.width) * 0.16;
      const grain = (hash(seed + lane * 17.9) - 0.5) * mess * (a.width + b.width) * 0.22;
      const offset = laneSpread + grain;
      const startColor = chalkColorForPoint(a, stroke);
      const endColor = chalkColorForPoint(b, stroke);
      const depthAlpha = 0.72 + ((a.ds || 0.3) + (b.ds || 0.3)) * 0.28;
      const gradient = ctx.createLinearGradient(startX, startY, endX, endY);
      gradient.addColorStop(0, rgba(startColor, life * alphaScale * depthAlpha));
      gradient.addColorStop(1, rgba(endColor, life * alphaScale * depthAlpha));
      ctx.beginPath();
      ctx.moveTo(startX + nx * offset, startY + ny * offset);
      ctx.quadraticCurveTo(aa.x * W + nx * offset, aa.y * H + ny * offset, endX + nx * offset, endY + ny * offset);
      ctx.strokeStyle = gradient;
      ctx.lineWidth = baseWidth;
      if (lane !== 0 &amp;&amp; mess &gt; 0.18) {
        const mark = Math.max(7, baseWidth * (3.2 - mess * 0.5));
        ctx.setLineDash([mark, Math.max(1.1, mark * (0.10 + mess * 0.18))]);
        ctx.lineDashOffset = -hash(seed + lane) * mark * 2;
      } else {
        ctx.setLineDash([]);
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawBrushStroke(stroke) {
    if (stroke.points.length &lt; 2 || strokeLife(stroke) &lt;= 0) return;
    drawChalkLane(stroke, 0, 0.72, 0.46, stroke.active ? 0.12 : 0.42);
    drawChalkLane(stroke, -1.25, 0.12, 0.18);
    drawChalkLane(stroke, 1.28, 0.11, 0.16);
  }

  function drawBrushStrokes() {
    ctx.save();
    ctx.globalCompositeOperation = darkField ? &#x27;screen&#x27; : &#x27;multiply&#x27;;
    for (const stroke of strokes) drawBrushStroke(stroke);
    ctx.restore();
  }

  function createSaturationStain(stroke, point, metrics) {
    const total = Math.max(stroke.depositWeight, 0.001);
    const centerX = clamp(lerp(point.x, stroke.depositX / total, 0.48), 0.03, 0.97);
    const centerY = clamp(lerp(point.y, stroke.depositY / total, 0.48), 0.04, 0.96);
    const depth = clamp(0.28 + metrics.rho * 0.34 + stroke.deposit / stroke.nextStain * 0.22, 0.22, 1);
    const nearest = fieldSampleAt(centerX, centerY).first;
    const mark = {
      x: centerX,
      y: centerY,
      vx: point.dx || 0.01,
      vy: point.dy || 0,
      strength: 0.72 + depth * 0.45,
      metrics,
      type: &#x27;stain&#x27;,
      reason: &#x27;flow-saturation&#x27;,
      pillar: ((nearest?.layer ?? 0) + stroke.color) % 3,
      weight: clamp(0.65 + point.width / 10.5, 0.65, 1.65),
      depth,
      age: 0,
      life: 390 + depth * 330 + Math.random() * 90,
      seed: stroke.seed + marks.length * 0.73,
      color: nearest?.layer ?? stroke.color,
      shadow: shadowMix
    };
    marks.push(mark);
    if (marks.length &gt; 260) marks.shift();
    addWave(centerX, centerY, 0.76 + depth * 0.42, mark.seed);
    resonance = clamp(resonance + 0.13 + depth * 0.08, 0, 1);
    focalSeed = clamp(focalSeed + depth * 0.12, 0, 1.6);
    canvas.dataset.lastMarkType = &#x27;stain&#x27;;
    canvas.dataset.lastStainReason = mark.reason;
    canvas.dataset.stainCount = String(marks.filter(candidate =&gt; candidate.type === &#x27;stain&#x27;).length);
    canvas.dataset.memoryCount = String(marks.length);
    statusNode.textContent = &#x27;Saturated attention has become a gravity-bearing stain.&#x27;;
    eventTone(&#x27;stain&#x27;, centerY);
  }

  function strokeAppearance(stroke, time) {
    const elapsed = Math.max(0, (time - stroke.startedAt) / 1000);
    const growth = 1 - Math.exp(-(elapsed * 0.24 + stroke.length * 1.55));
    const width = Math.min(stroke.maxWidth, 0.85 + growth * (stroke.maxWidth - 0.85));
    const mess = smooth(clamp((width - 3.7) / (stroke.maxWidth - 3.7), 0, 1));
    return { width, mess };
  }

  function updateStrokeMeter(stroke, hold = true) {
    const saturation = clamp(stroke.deposit / stroke.nextStain, 0, 1);
    const percent = Math.round(saturation * 100);
    strokeMeter.value = saturation;
    strokeMeterValue.value = `${percent}%`;
    strokeMeterValue.textContent = `${percent}%`;
    strokeMeterWrap.hidden = false;
    if (hold) meterHideAt = performance.now() + 1500;
    canvas.dataset.strokeSaturation = saturation.toFixed(3);
  }

  function recordPrimitiveMetrics(stroke, metrics) {
    const keys = [&#x27;delta&#x27;, &#x27;rv&#x27;, &#x27;rho&#x27;, &#x27;mu&#x27;, &#x27;xp&#x27;, &#x27;theta&#x27;, &#x27;ds&#x27;];
    stroke.primitiveSums ||= Object.fromEntries(keys.map(key =&gt; [key, 0]));
    stroke.primitiveCount = (stroke.primitiveCount || 0) + 1;
    for (const key of keys) stroke.primitiveSums[key] += metrics[key] || 0;
    const values = keys.map(key =&gt; stroke.primitiveSums[key] / stroke.primitiveCount);
    canvas.dataset.primitiveVector = values.map(value =&gt; value.toFixed(3)).join(&#x27;,&#x27;);
    canvas.dataset.primitiveLabels = &#x27;delta,rv,rho,mu,xp,theta,ds&#x27;;
  }

  function accrueStrokeDwell(stroke, time) {
    const point = stroke.points[stroke.points.length - 1];
    if (!point) return;
    const seconds = clamp((time - stroke.lastDwellAt) / 1000, 0, 0.16);
    if (seconds &lt;= 0) return;
    const appearance = strokeAppearance(stroke, time);
    point.width = appearance.width;
    point.mess = appearance.mess;
    point.fidelity = clamp(1 - appearance.mess * 0.76, 0.16, 1);
    const metrics = metricsAt(point.x, point.y, point.dx || 0.001, point.dy || 0);
    metrics.ds = clamp(point.width / stroke.maxWidth * 0.74 + stroke.deposit / stroke.nextStain * 0.26, 0, 1);
    Object.assign(point, metrics);
    const deposit = seconds * (0.095 + metrics.rho * 0.18 + point.revisit * 0.08);
    stroke.deposit += deposit;
    stroke.depositX += point.x * deposit;
    stroke.depositY += point.y * deposit;
    stroke.depositWeight += deposit;
    stroke.lastDwellAt = time;
    canvas.dataset.strokeWidth = point.width.toFixed(2);
    canvas.dataset.strokeFidelity = point.fidelity.toFixed(3);
    updateStrokeMeter(stroke, true);
    if (stroke.deposit &gt;= stroke.nextStain) {
      createSaturationStain(stroke, point, metrics);
      stroke.nextStain += 1.05 + stroke.stains * 0.24;
      stroke.stains++;
    }
  }

  function appendStrokePoint(stroke, point, force = false) {
    const previous = stroke.points[stroke.points.length - 1];
    if (!previous) {
      const metrics = metricsAt(point.x, point.y, 0.01, 0);
      metrics.ds = 0.08;
      stroke.points.push({ ...point, ...metrics, width: 0.85, fidelity: 1, mess: 0, dx: 0.01, dy: 0, speed: 0, revisit: 0, ox: 0, oy: 0, vx: 0, vy: 0 });
      recordPrimitiveMetrics(stroke, metrics);
      updateStrokeMeter(stroke, true);
      return;
    }
    const dx = point.x - previous.x;
    const dy = point.y - previous.y;
    const distance = Math.hypot(dx, dy);
    const pointThreshold = stroke.points.length &gt; 420 ? 0.008 : stroke.points.length &gt; 240 ? 0.0048 : 0.0026;
    if (!force &amp;&amp; distance &lt; pointThreshold) return;
    const seconds = Math.max(0.008, (point.time - previous.time) / 1000);
    const speed = clamp(distance / seconds / 1.25, 0, 1);
    stroke.length += distance;
    const { width, mess } = strokeAppearance(stroke, point.time);
    const fidelity = clamp(1 - mess * 0.76 - speed * mess * 0.08, 0.16, 1);
    const metrics = metricsAt(point.x, point.y, dx, dy);
    let revisits = 0;
    const start = Math.max(0, stroke.points.length - 70);
    for (let i = start; i &lt; stroke.points.length - 8; i += 3) {
      if (Math.hypot(point.x - stroke.points[i].x, point.y - stroke.points[i].y) &lt; 0.028) revisits++;
    }
    const revisit = clamp(revisits / 3, 0, 1);
    metrics.ds = clamp(width / stroke.maxWidth * 0.72 + stroke.deposit / stroke.nextStain * 0.28, 0, 1);
    const deposit = seconds * (0.045 + (1 - speed) * 0.24 + metrics.mu * 0.06)
      + distance * (0.18 + metrics.rho * 0.52 + metrics.xp * 0.12)
      + revisit * 0.024;
    stroke.deposit += deposit;
    stroke.depositX += point.x * deposit;
    stroke.depositY += point.y * deposit;
    stroke.depositWeight += deposit;
    const enriched = { ...point, ...metrics, width, fidelity, mess, dx, dy, speed, revisit, ox: 0, oy: 0, vx: 0, vy: 0 };
    stroke.points.push(enriched);
    recordPrimitiveMetrics(stroke, metrics);
    stroke.lastDwellAt = point.time;
    canvas.dataset.strokeWidth = width.toFixed(2);
    canvas.dataset.strokeFidelity = fidelity.toFixed(3);
    updateStrokeMeter(stroke, true);

    if (stroke.deposit &gt;= stroke.nextStain) {
      createSaturationStain(stroke, enriched, metrics);
      stroke.nextStain += 1.05 + stroke.stains * 0.24;
      stroke.stains++;
    }
    if (insideBlind(point.x, point.y) &amp;&amp; point.time - stroke.lastBlindAt &gt; 620) {
      stroke.lastBlindAt = point.time;
      addMark(point.x, point.y, dx, dy, 0.74, { speed, curvature: revisit, pressure: point.pressure });
    } else {
      applyFocusImpulse(point.x, point.y, 0.12 + mess * 0.12 + metrics.xp * 0.08, metrics.rho);
      if (shadowMix &gt; 0.08) engagement = clamp(engagement + 0.004 + mess * 0.005, 0, 1);
    }
    updateChalkSound(speed, width, point.pressure, metrics.theta, metrics.rv);
  }

  function updateStrokeClouds(dt) {
    if (frame % 3 !== 0) return;
    const seconds = dt * 0.003;
    const direction = lerp(1, -0.62, shadowGrip());
    let driftTotal = 0;
    let driftCount = 0;
    for (const stroke of strokes) {
      if (stroke.active) continue;
      const reintegration = smooth(clamp((stroke.age / stroke.life - 0.32) / 0.62, 0, 1));
      for (let index = 0; index &lt; stroke.points.length; index++) {
        const point = stroke.points[index];
        const x = point.x + point.ox;
        const y = point.y + point.oy;
        const { first } = fieldSampleAt(x, y);
        if (!first) continue;
        const voidness = point.rv ?? 0.5;
        const compression = point.rho ?? 0.3;
        const unity = point.mu ?? 0.3;
        const stability = point.theta ?? 0.5;
        const edgePull = point.xp ?? 0.2;
        const turbulence = Math.sin(clock * 0.19 + stroke.seed * 2.7 + index * 0.31);
        const transport = 0.0022 * (0.72 + voidness * 0.58) * (0.72 + stability * 0.38) * (1 - compression * 0.28);
        const wander = 0.00018 + voidness * (1 - unity * 0.45) * 0.00034;
        let targetVX = first.tx * direction * transport + turbulence * wander;
        let targetVY = first.ty * direction * transport * (W / H) + Math.cos(clock * 0.16 + index * 0.23) * wander * 0.78;
        targetVX += Math.sign(x - 0.5) * edgePull * 0.00052 * lerp(1, -0.35, shadowGrip());
        targetVY += Math.sign(y - 0.5) * edgePull * 0.00038 * lerp(1, -0.35, shadowGrip());
        if (lockPoint &amp;&amp; lockStrength &gt; 0.01) {
          const dx = lockPoint.x - x;
          const dy = lockPoint.y - y;
          const distance = Math.hypot(dx, dy);
          const influence = Math.exp(-Math.pow(distance / 0.28, 2)) * lockStrength;
          targetVX += dx * influence * 0.014;
          targetVY += dy * influence * 0.014;
        }
        const follow = 1 - Math.pow(0.90, dt / 16.67);
        point.vx += (targetVX - point.vx) * follow;
        point.vy += (targetVY - point.vy) * follow;
        point.ox += point.vx * seconds;
        point.oy += point.vy * seconds;
        if (reintegration &gt; 0) {
          const nearestY = first.y / H;
          point.oy += (nearestY - (point.y + point.oy)) * reintegration * 0.00042 * dt;
        }
        point.ox = clamp(point.ox, -0.12, 0.12);
        point.oy = clamp(point.oy, -0.14, 0.14);
        driftTotal += Math.hypot(point.ox, point.oy);
        driftCount++;
      }
    }
    canvas.dataset.cloudDrift = (driftTotal / Math.max(1, driftCount)).toFixed(5);
  }

  function drifted(mark) {
    const radialX = mark.x - 0.5;
    const radialY = mark.y - 0.5;
    const radialLength = Math.hypot(radialX, radialY) || 1;
    const direction = lerp(1, -1, smooth(shadowMix));
    const distance = Math.min(0.12, mark.age * 0.00135 * Math.abs(mark.metrics.xp));
    const parallax = mark.type === &#x27;stain&#x27; ? (mark.depth - 0.5) : 0;
    return {
      x: (mark.x + radialX / radialLength * distance * direction + (pointer.x - 0.5) * parallax * 0.024) * W,
      y: (mark.y + radialY / radialLength * distance * direction + (pointer.y - 0.5) * parallax * 0.018) * H
    };
  }

  function drawStain(mark, life) {
    const center = drifted(mark);
    const base = 9 + mark.weight * 18 + mark.depth * 23 + Math.min(36, mark.age * 0.095);
    const rings = 8 + Math.round(mark.depth * 4);
    const direction = Math.atan2(mark.vy * H, mark.vx * W);
    const cosD = Math.cos(direction);
    const sinD = Math.sin(direction);
    ctx.save();
    ctx.globalAlpha = 0.52 + mark.depth * 0.48;
    ctx.filter = mark.depth &lt; 0.38 ? &#x27;blur(1.4px)&#x27; : mark.depth &gt; 0.78 ? &#x27;blur(0.25px)&#x27; : &#x27;none&#x27;;
    for (let ring = 0; ring &lt; rings; ring++) {
      const radius = base * (1 - ring * (0.69 / rings));
      ctx.beginPath();
      for (let j = 0; j &lt;= 44; j++) {
        const angle = j / 44 * TAU;
        const noise = 1 + Math.sin(angle * 3 + mark.seed) * 0.19 + Math.sin(angle * 7 - mark.seed * 0.4) * 0.08;
        const pinch = lerp(1, 0.64 + 0.25 * Math.cos(angle), shadowMix * mark.shadow);
        const localX = Math.cos(angle) * radius * noise * pinch * (1.08 + mark.depth * 0.36);
        const localY = Math.sin(angle) * radius * noise * lerp(0.58, 1.02, mark.metrics.mu);
        const x = center.x + localX * cosD - localY * sinD;
        const y = center.y + localX * sinD + localY * cosD;
        if (j === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      const stainColor = gradedColor(colorFor(mark.color + ring, ring), ring);
      ctx.fillStyle = rgba(stainColor, (0.07 + mark.depth * 0.07) * life * (1 - ring / (rings + 2)));
      ctx.fill();
      if (ring % 2 === 0) {
        ctx.strokeStyle = rgba(gradedColor(colorFor(mark.color + ring + 1, 1), ring + 1), (0.16 + mark.depth * 0.13) * life);
        ctx.lineWidth = 0.4 + mark.weight * 0.52;
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  function drawThread(mark, life) {
    const center = drifted(mark);
    const speed = Math.hypot(mark.vx, mark.vy) || 0.01;
    const vx = mark.vx / speed;
    const vy = mark.vy / speed;
    const length = W * (0.08 + mark.metrics.theta * 0.15 + Math.min(0.16, mark.age * 0.0014));
    for (let echo = 0; echo &lt; 8; echo++) {
      const offset = (echo - 3.5) * 2.2;
      const curl = Math.sin(mark.seed + echo + mark.age * 0.09) * 22 * lerp(1, 1.8, shadowMix * mark.shadow);
      ctx.beginPath();
      ctx.moveTo(center.x - vx * length * 0.34 - vy * offset, center.y - vy * length * 0.34 + vx * offset);
      ctx.bezierCurveTo(
        center.x - vx * length * 0.05 + vy * curl,
        center.y - vy * length * 0.05 - vx * curl,
        center.x + vx * length * 0.28 - vy * curl,
        center.y + vy * length * 0.28 + vx * curl,
        center.x + vx * length * 0.66 - vy * offset,
        center.y + vy * length * 0.66 + vx * offset
      );
      ctx.strokeStyle = rgba(gradedColor(colorFor(mark.color + echo, echo), echo), life * (echo === 3 ? 0.42 : 0.14));
      ctx.lineWidth = echo === 3 ? 0.7 + mark.weight * 2.9 : 0.34 + mark.weight * 0.52;
      ctx.stroke();
    }
  }

  function drawDust(mark, life) {
    const center = drifted(mark);
    const spread = 18 + Math.min(95, mark.age * 0.85);
    for (let i = 0; i &lt; 38; i++) {
      const angle = hash(mark.seed * 53 + i) * TAU;
      const radius = Math.pow(hash(mark.seed * 91 + i * 3), 0.56) * spread;
      const inward = smooth(shadowMix) * mark.shadow;
      const x = lerp(center.x + Math.cos(angle) * radius * 1.7, W * 0.5, inward * 0.18);
      const y = lerp(center.y + Math.sin(angle) * radius, H * 0.5, inward * 0.18);
      const size = 0.5 + hash(i + mark.seed) * 1.8;
      ctx.fillStyle = rgba(gradedColor(colorFor(mark.color + i, i), i), life * (0.11 + hash(i) * 0.2));
      ctx.fillRect(x, y, size * (inward &gt; 0.5 ? 2.4 : 1), size * 0.72);
    }
  }

  function drawArc(mark, life) {
    const center = drifted(mark);
    const sign = mark.x &lt; 0.5 ? -1 : 1;
    const reach = W * (0.22 + mark.metrics.xp * 0.18 + Math.min(0.22, mark.age * 0.0018));
    for (let i = 0; i &lt; 7; i++) {
      const spread = (i - 3) * 5;
      ctx.beginPath();
      ctx.moveTo(center.x, center.y + spread);
      ctx.bezierCurveTo(
        center.x + sign * reach * 0.2,
        center.y - H * (0.14 + i * 0.012),
        center.x + sign * reach * 0.72,
        center.y + H * (0.12 - i * 0.01),
        center.x + sign * reach,
        center.y + spread * 0.3
      );
      ctx.strokeStyle = rgba(gradedColor(colorFor(mark.color + i, 2), i), life * (i === 3 ? 0.36 : 0.11));
      ctx.lineWidth = i === 3 ? 0.62 + mark.weight * 1.55 : 0.32 + mark.weight * 0.36;
      ctx.stroke();
    }
  }

  function drawBlindMark(mark, life) {
    const a = aperture();
    const cx = a.x * W;
    const cy = a.y * H;
    const collapse = smooth(shadowMix);
    const basin = mark.metrics.basin;
    const direction = basin === &#x27;B1&#x27; ? 1 : basin === &#x27;B2&#x27; ? -1 : Math.sin(mark.seed) &gt; 0 ? 1 : -1;
    if (basin === &#x27;B0&#x27; || collapse &gt; 0.62) {
      for (let ring = 0; ring &lt; 13; ring++) {
        const q = (ring + 1) / 13;
        const radiusX = a.rx * (0.22 + q * lerp(1.25, 0.72, collapse));
        const radiusY = a.ry * (0.16 + q * lerp(0.9, 1.18, collapse));
        ctx.beginPath();
        for (let j = 0; j &lt;= 48; j++) {
          const angle = j / 48 * TAU;
          const wobble = 1 + Math.sin(angle * (3 + ring % 4) + mark.seed + mark.age * 0.06) * 0.08;
          const x = cx + Math.cos(angle) * radiusX * wobble;
          const y = cy + Math.sin(angle) * radiusY * wobble;
          if (j === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = rgba(collapse &gt; 0.5 ? mixColor(colorFor(ring, 1), palette.shadow, 0.34) : colorFor(ring, 1), life * (0.045 + q * 0.08));
        ctx.lineWidth = ring % 4 === 0 ? 0.95 : 0.5;
        ctx.stroke();
      }
    } else {
      for (let branch = 0; branch &lt; 11; branch++) {
        const angle = (branch / 11 - 0.5) * 1.8 + (direction &lt; 0 ? Math.PI : 0);
        const reach = W * (0.12 + mark.metrics.rv * 0.24 + branch * 0.004);
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.bezierCurveTo(
          cx + Math.cos(angle) * reach * 0.22,
          cy + Math.sin(angle) * reach * 0.18,
          cx + Math.cos(angle + Math.sin(mark.seed + branch) * 0.4) * reach * 0.72,
          cy + Math.sin(angle) * reach * 0.55,
          cx + Math.cos(angle) * reach,
          cy + Math.sin(angle) * reach * 0.74
        );
        ctx.strokeStyle = rgba(colorFor(branch + mark.color, branch), life * (0.08 + (branch % 4 === 0 ? 0.18 : 0)));
        ctx.lineWidth = branch % 4 === 0 ? 1.15 : 0.55;
        ctx.stroke();
      }
    }
  }

  function drawMemory() {
    drawBrushStrokes();
    ctx.save();
    ctx.globalCompositeOperation = darkField ? &#x27;screen&#x27; : &#x27;multiply&#x27;;
    const ordered = marks.slice().sort((a, b) =&gt; {
      if (a.type === &#x27;stain&#x27; &amp;&amp; b.type === &#x27;stain&#x27;) return a.depth - b.depth;
      if (a.type === &#x27;stain&#x27;) return -1;
      if (b.type === &#x27;stain&#x27;) return 1;
      return 0;
    });
    drawTapestryLinks(ordered);
    for (const mark of ordered) {
      const life = markLife(mark);
      if (life &lt;= 0) continue;
      if (mark.type === &#x27;stain&#x27;) drawStain(mark, life);
      else if (mark.type === &#x27;thread&#x27;) drawThread(mark, life);
      else if (mark.type === &#x27;dust&#x27;) drawDust(mark, life);
      else if (mark.type === &#x27;arc&#x27;) drawArc(mark, life);
      else drawBlindMark(mark, life);
    }
    ctx.restore();
  }

  function drawTapestryLinks(ordered) {
    const stains = ordered.filter(mark =&gt; mark.type === &#x27;stain&#x27; &amp;&amp; markLife(mark) &gt; 0.12).slice(-28);
    for (let i = 0; i &lt; stains.length; i++) {
      for (let j = i + 1; j &lt; stains.length; j++) {
        const a = stains[i];
        const b = stains[j];
        const distance = Math.hypot(a.x - b.x, a.y - b.y);
        if (distance &gt; 0.25) continue;
        const p = drifted(a);
        const q = drifted(b);
        const life = Math.min(markLife(a), markLife(b));
        const depth = (a.depth + b.depth) * 0.5;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.bezierCurveTo(
          lerp(p.x, q.x, 0.32), lerp(p.y, q.y, 0.32) - H * 0.025 * depth,
          lerp(p.x, q.x, 0.68), lerp(p.y, q.y, 0.68) + H * 0.018 * depth,
          q.x, q.y
        );
        ctx.strokeStyle = rgba(gradedColor(colorFor(a.color + b.color, i + j), i + j), life * (0.018 + depth * 0.034) * (1 - distance / 0.25));
        ctx.lineWidth = 0.35 + depth * 0.55;
        ctx.stroke();
      }
    }
  }

  function drawWaves() {
    ctx.save();
    ctx.globalCompositeOperation = darkField ? &#x27;screen&#x27; : &#x27;multiply&#x27;;
    for (const wave of waves) {
      const life = clamp(1 - wave.age / wave.life, 0, 1);
      const radius = W * (0.02 + wave.age * 0.0095);
      for (let k = 0; k &lt; 5; k++) {
        ctx.beginPath();
        for (let j = 0; j &lt;= 54; j++) {
          const angle = j / 54 * TAU;
          const deformation = 1 + Math.sin(angle * 4 + wave.seed + k) * 0.08;
          const x = wave.x * W + Math.cos(angle) * (radius + k * 6) * deformation;
          const y = wave.y * H + Math.sin(angle) * (radius + k * 6) * H / W * 1.65 * deformation;
          if (j === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = rgba(colorFor(k + wave.seed, k), life * (0.11 - k * 0.014));
        ctx.lineWidth = 0.6;
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  function aperturePath(a, scale = 1, phase = 0) {
    ctx.beginPath();
    for (let j = 0; j &lt;= 72; j++) {
      const angle = j / 72 * TAU;
      const wobble = 1
        + Math.sin(angle * 3 + clock * 0.16 + phase) * (0.09 + blindEnergy * 0.06 + shadowGrip() * 0.035)
        + Math.cos(angle * 7 - phase + clock * 0.09) * (0.032 + blindEnergy * 0.025 + shadowGrip() * 0.018);
      const x = a.x * W + Math.cos(angle) * a.rx * scale * wobble;
      const y = a.y * H + Math.sin(angle) * a.ry * scale * (1 + Math.sin(angle * 5 + phase) * 0.04);
      if (j === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
  }

  function drawRefraction() {
    const a = aperture();
    const grip = shadowGrip();
    sceneCtx.setTransform(1, 0, 0, 1, 0, 0);
    sceneCtx.clearRect(0, 0, scene.width, scene.height);
    sceneCtx.drawImage(canvas, 0, 0);
    ctx.save();
    aperturePath(a, 1.02, blindEnergy);
    ctx.clip();
    const top = Math.max(0, a.y * H - a.ry * 1.15);
    const bottom = Math.min(H, a.y * H + a.ry * 1.15);
    const strip = 3;
    for (let y = top; y &lt; bottom; y += strip) {
      const normalized = (y - a.y * H) / a.ry;
      const envelope = Math.max(0, 1 - normalized * normalized);
      const oscillation = Math.sin(normalized * (12 + grip * 5) + clock * 0.7) * (5 + blindEnergy * 25 + grip * 15);
      const capture = (a.x * W - W * 0.5) * grip * envelope * 0.26;
      const shift = oscillation * envelope - capture;
      const sourceX = clamp(a.x * W - a.rx * 1.55 - shift, 0, W - 1);
      const width = Math.min(a.rx * 3.1, W - sourceX);
      ctx.drawImage(scene, sourceX * dpr, y * dpr, width * dpr, strip * dpr, sourceX + shift, y, width, strip + 0.5);
    }
    const veil = ctx.createRadialGradient(a.x * W, a.y * H, 0, a.x * W, a.y * H, Math.max(a.rx, a.ry));
    veil.addColorStop(0, rgba(mixColor(palette.bg, palette.page, 0.55), lerp(0.34, 0.66, grip)));
    veil.addColorStop(0.68, rgba(mixColor(palette.bg, gradedColor(colorFor(5, 3), 3), 0.08), 0.22));
    veil.addColorStop(1, rgba(palette.bg, 0.05));
    ctx.fillStyle = veil;
    ctx.fillRect(a.x * W - a.rx * 1.3, a.y * H - a.ry * 1.3, a.rx * 2.6, a.ry * 2.6);
    ctx.restore();
  }

  function drawApertureRim() {
    const a = aperture();
    const grip = shadowGrip();
    ctx.save();
    ctx.globalCompositeOperation = darkField ? &#x27;screen&#x27; : &#x27;multiply&#x27;;
    for (let k = 0; k &lt; 9; k++) {
      aperturePath(a, 0.84 + k * 0.068, k * 0.73);
      const baseColor = gradedColor(colorFor(k + 1, k % 2), k);
      const color = grip &gt; 0.35 ? mixColor(baseColor, palette.shadow, grip * 0.27) : baseColor;
      ctx.strokeStyle = rgba(color, 0.78);
      ctx.globalAlpha = 0.05 + (k === 4 ? 0.16 : 0.035) + blindEnergy * 0.055;
      ctx.lineWidth = k === 4 ? 1.35 : 0.62;
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawEmergentFocus() {
    const coherence = emergentInput.checked ? emergentFocus.coherence : 0;
    if (coherence &lt; 0.012) return;
    const cx = emergentFocus.x * W;
    const cy = emergentFocus.y * H;
    const radius = Math.min(W, H) * (0.035 + coherence * 0.07);
    ctx.save();
    ctx.globalCompositeOperation = darkField ? &#x27;screen&#x27; : &#x27;multiply&#x27;;
    const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * 2.8);
    glow.addColorStop(0, rgba(gradedColor(colorFor(2, 1), 0), 0.17 * coherence));
    glow.addColorStop(0.38, rgba(gradedColor(colorFor(4, 2), 1), 0.08 * coherence));
    glow.addColorStop(1, rgba(gradedColor(colorFor(1, 3), 2), 0));
    ctx.fillStyle = glow;
    ctx.fillRect(cx - radius * 3, cy - radius * 3, radius * 6, radius * 6);
    for (let ring = 0; ring &lt; 8; ring++) {
      const q = (ring + 1) / 8;
      ctx.beginPath();
      for (let j = 0; j &lt;= 52; j++) {
        const angle = j / 52 * TAU;
        const wobble = 1 + Math.sin(angle * (3 + ring % 3) - clock * 0.18 + ring) * 0.08;
        const x = cx + Math.cos(angle) * radius * q * 1.45 * wobble;
        const y = cy + Math.sin(angle) * radius * q * 0.82 * (1 + Math.cos(angle * 5 + clock * 0.1) * 0.035);
        if (j === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.strokeStyle = rgba(gradedColor(colorFor(ring + 2, ring), ring), coherence * (ring === 5 ? 0.28 : 0.085));
      ctx.lineWidth = ring === 5 ? 1.15 : 0.52;
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawSignalLock() {
    if (!lockPoint || lockStrength &lt;= 0.005) return;
    const cx = lockPoint.x * W;
    const cy = lockPoint.y * H;
    const pulse = 0.5 + Math.sin(clock * 0.9) * 0.5;
    ctx.save();
    ctx.globalCompositeOperation = darkField ? &#x27;screen&#x27; : &#x27;multiply&#x27;;
    for (let ring = 0; ring &lt; 5; ring++) {
      const radius = 8 + ring * 8 + pulse * 3;
      ctx.beginPath();
      ctx.ellipse(cx, cy, radius * 1.45, radius * 0.78, clock * 0.025, 0, TAU);
      ctx.strokeStyle = rgba(gradedColor(colorFor(4 + ring, ring), ring), (0.24 - ring * 0.034) * lockStrength);
      ctx.lineWidth = ring === 0 ? 1.35 : 0.58;
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.arc(cx, cy, 2.2 + pulse, 0, TAU);
    ctx.fillStyle = rgba(mixColor(gradedColor(colorFor(4, 1), 0), palette.fg, 0.42), 0.72 * lockStrength);
    ctx.fill();
    ctx.restore();
  }

  function drawFlow() {
    ctx.save();
    ctx.globalCompositeOperation = darkField ? &#x27;screen&#x27; : &#x27;multiply&#x27;;
    const direction = lerp(1, -0.72, smooth(shadowMix));
    for (let i = 0; i &lt; 9; i++) {
      for (let p = 0; p &lt; 6; p++) {
        const seed = hash(i * 31 + p * 7);
        const u = ((seed + direction * clock * (0.012 + hash(p + i) * 0.009)) % 1 + 1) % 1;
        const point = sampleCurve(curves[i], u);
        const length = 3 + 10 * (0.5 + resonance) * hash(p * 4 + i);
        ctx.beginPath();
        ctx.moveTo(point.x - point.tx * length, point.y - point.ty * length);
        ctx.lineTo(point.x + point.tx * length, point.y + point.ty * length);
        ctx.strokeStyle = rgba(mixColor(colorFor(i), palette.fg, darkField ? 0.34 : 0.08), 0.9);
        ctx.globalAlpha = (0.14 + resonance * 0.2) * (0.55 + hash(p + i));
        ctx.lineWidth = 0.7 + hash(p * i + 1) * 1.1;
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  function draw() {
    drawBackdrop();
    for (let i = 0; i &lt; 4; i++) drawLayer(i);
    drawFolds();
    for (let i = 4; i &lt; 9; i++) drawLayer(i);
    drawFlow();
    drawMemory();
    drawWaves();
    drawEmergentFocus();
    drawSignalLock();
    drawRefraction();
    drawApertureRim();
  }

  function metricsAt(x, y, vx = 0.01, vy = 0) {
    let density = 0;
    const u = clamp((x + 0.1) / 1.2, 0, 1);
    for (const points of curves) {
      const p = sampleCurve(points, u);
      const dx = (x * W - p.x) / W;
      const dy = (y * H - p.y) / H;
      density += Math.exp(-(dx * dx + dy * dy) * 280);
    }
    const rho = clamp(density / 4.1, 0, 1);
    const rv = 1 - rho;
    const delta = clamp(Math.hypot(x - 0.5, y - 0.5) / 0.707, 0, 1);
    const speed = clamp(Math.hypot(vx, vy) * 18, 0, 1);
    const mu = clamp(rho * (0.72 + (1 - speed) * 0.28), 0, 1);
    const edgeDistance = Math.min(x, 1 - x, y, 1 - y);
    const apertureShape = aperture();
    const apertureRadius = Math.hypot((x - apertureShape.x) / Math.max(apertureShape.rx / W, 0.001), (y - apertureShape.y) / Math.max(apertureShape.ry / H, 0.001));
    const edgePull = Math.exp(-edgeDistance / 0.10);
    const blindPull = Math.exp(-Math.abs(apertureRadius - 1) * 1.8);
    const xp = clamp(edgePull * 0.54 + blindPull * 0.46 + shadowGrip() * blindPull * 0.18, 0, 1);
    const field = fieldSampleAt(x, y).first;
    const pixelVX = vx * W;
    const pixelVY = vy * H;
    const movementLength = Math.hypot(pixelVX, pixelVY);
    const theta = field &amp;&amp; movementLength &gt; 0.01
      ? clamp(Math.abs((pixelVX / movementLength) * field.tx + (pixelVY / movementLength) * field.ty), 0, 1)
      : 0.5;
    const ds = clamp(0.22 + rho * 0.47 + (1 - speed) * 0.31, 0, 1);
    let basin = &#x27;B3&#x27;;
    if (delta &lt; 0.2 &amp;&amp; rv &lt; 0.62) basin = &#x27;B0&#x27;;
    else if (x &gt;= 0.5 &amp;&amp; rv &lt; 0.78) basin = &#x27;B1&#x27;;
    else if (x &lt; 0.5 &amp;&amp; rv &lt; 0.66) basin = &#x27;B2&#x27;;
    return { delta, rv, rho, mu, xp, theta, ds, speed, basin };
  }

  function typeFor(x, y, metrics) {
    if (insideBlind(x, y)) return &#x27;blind&#x27;;
    if (metrics.rho &gt; 0.58 || metrics.mu &gt; 0.68) return &#x27;stain&#x27;;
    if (metrics.rv &gt; 0.73) return &#x27;dust&#x27;;
    if (Math.abs(x - 0.5) &gt; 0.31 || Math.abs(y - 0.5) &gt; 0.34) return &#x27;arc&#x27;;
    return &#x27;thread&#x27;;
  }

  function addWave(x, y, strength = 1, seed = Math.random() * 9) {
    waves.push({ x, y, strength, seed, age: 0, life: 30 + strength * 15 });
    if (waves.length &gt; 24) waves.shift();
  }

  function applyFocusImpulse(x, y, strength, depth) {
    const magnitude = Math.abs(focusForce);
    if (magnitude &lt; 0.025) return;
    const dx = x - blindFocus.x;
    const dy = y - blindFocus.y;
    const distance = Math.hypot(dx, dy) || 1;
    const direction = focusForce &lt; 0 ? 1 : -1;
    const impulse = magnitude * (0.0018 + depth * 0.0025) * strength;
    blindFocus.vx += dx / distance * impulse * direction;
    blindFocus.vy += dy / distance * impulse * direction;
    if (shadowMix &gt; 0.58) {
      const rewrite = impulse * direction * (0.62 + shadowMix * 0.46);
      blindHome.offsetX = clamp(blindHome.offsetX + dx / distance * rewrite, -0.24, 0.24);
      blindHome.offsetY = clamp(blindHome.offsetY + dy / distance * rewrite, -0.20, 0.20);
    }
  }

  function addMark(x, y, vx = 0.01, vy = 0, strength = 1, motion = {}) {
    const metrics = metricsAt(x, y, vx, vy);
    const type = typeFor(x, y, metrics);
    const speed = clamp(motion.speed ?? metrics.speed, 0, 1);
    const curvature = clamp(motion.curvature ?? 0.18, 0, 1);
    const pressure = clamp(motion.pressure ?? 0.34, 0, 1);
    const weight = clamp(0.22 + (1 - speed) * 0.72 + curvature * 0.38 + pressure * 0.42, 0.22, 1.62);
    const depth = clamp(0.12 + (1 - speed) * 0.29 + curvature * 0.31 + pressure * 0.28 + metrics.rho * 0.24, 0.08, 1);
    metrics.ds = clamp(weight / 1.45, 0, 1);
    const mark = {
      x, y, vx, vy, strength,
      metrics,
      type,
      weight,
      depth,
      age: 0,
      life: type === &#x27;stain&#x27;
        ? 330 + depth * 330 + Math.random() * 80
        : 68 + metrics.rv * 58 + (type === &#x27;blind&#x27; ? 44 : 0),
      seed: Math.random() * 99,
      color: Math.floor(Math.random() * 9),
      shadow: shadowMix
    };
    marks.push(mark);
    canvas.dataset.lastMarkType = type;
    canvas.dataset.lastMarkX = x.toFixed(3);
    canvas.dataset.lastMarkY = y.toFixed(3);
    canvas.dataset.lastMarkWeight = weight.toFixed(3);
    canvas.dataset.lastMarkDepth = depth.toFixed(3);
    canvas.dataset.memoryCount = String(marks.length);
    if (marks.length &gt; 260) {
      const expendable = marks.findIndex(candidate =&gt; candidate.type !== &#x27;stain&#x27;);
      marks.splice(expendable &gt;= 0 ? expendable : 0, 1);
    }
    if (shadowMix &gt; 0.08) engagement = clamp(engagement + 0.08 + strength * 0.055, 0, 1);
    applyFocusImpulse(x, y, strength, depth);
    if (emergentInput.checked &amp;&amp; type === &#x27;stain&#x27;) focalSeed = clamp(focalSeed + depth * strength * 0.05, 0, 1.6);
    addWave(x, y, 0.58 + strength * 0.55, mark.seed);
    if (type === &#x27;blind&#x27;) {
      blindEvents.push(mark);
      if (blindEvents.length &gt; 16) blindEvents.shift();
      blindEnergy = clamp(blindEnergy + 0.68 * strength, 0, 1.5);
      if (shadowMix &lt; 0.5) {
        addWave(clamp(x + 0.24, 0.08, 0.94), clamp(y - 0.18, 0.08, 0.92), 1.1, mark.seed + 2);
        addWave(clamp(x - 0.29, 0.06, 0.92), clamp(y + 0.21, 0.08, 0.94), 0.92, mark.seed + 4);
      } else {
        addWave(0.5, 0.5, 1.35, mark.seed + 6);
      }
      eventTone(&#x27;blind&#x27;, y);
    } else {
      eventTone(type, y);
    }
    if (state === &#x27;field&#x27;) resonance = clamp(resonance + 0.075 + strength * 0.025, 0, 1);
    setStatus();
  }

  function setStatus() {
    let status = &#x27;Draw. Linger or overlap to saturate.&#x27;;
    if (blindEnergy &gt; 0.2) status = shadowMix &gt; 0.5 ? &#x27;The absence is binding the field to one attractor.&#x27; : &#x27;The absence is generating counterfactual space.&#x27;;
    if (emergentInput.checked &amp;&amp; emergentFocus.coherence &gt; 0.22) status = &#x27;A second focal coherence is learning where to belong.&#x27;;
    if (shadowMix &gt; 0.6 &amp;&amp; engagement &gt; 0.38) status = &#x27;Your engagement is loosening shadow’s grip on the field.&#x27;;
    if (state === &#x27;candidate&#x27;) status = &#x27;The field has produced a convergence candidate; only you can attest it.&#x27;;
    if (state === &#x27;locked&#x27;) status = &#x27;Your attestation is acting as a local gravitational anchor.&#x27;;
    if (state === &#x27;releasing&#x27;) status = &#x27;The anchor is releasing its privilege; its residue remains in the field.&#x27;;
    statusNode.textContent = status;
    const percent = Math.round(shadowMix * 100);
    const gripPercent = Math.round(shadowGrip() * 100);
    const homeShift = Math.round(Math.hypot(blindHome.offsetX, blindHome.offsetY) * 260);
    orientationNode.textContent = shadowMix &gt; 0.02 &amp;&amp; shadowMix &lt; 0.98
      ? `${shadowTarget ? &#x27;turning inward&#x27; : &#x27;returning outward&#x27;} · ${percent}%`
      : shadowMix &gt;= 0.98
        ? homeShift &gt; 2 ? `sunset · home displaced ${homeShift}%` : `sunset orientation · grip ${gripPercent}%`
        : &#x27;sunrise orientation · outward&#x27;;
    actionButton.textContent = state === &#x27;candidate&#x27;
      ? &#x27;Attest convergence&#x27;
      : state === &#x27;locked&#x27;
        ? &#x27;Release convergence&#x27;
        : state === &#x27;releasing&#x27;
          ? &#x27;Releasing…&#x27;
          : &#x27;Field unconverged&#x27;;
    actionButton.disabled = state === &#x27;releasing&#x27; || state === &#x27;field&#x27;;
    actionButton.setAttribute(&#x27;data-tooltip&#x27;, state === &#x27;locked&#x27;
      ? &#x27;Release withdraws the anchor’s privileged influence. It does not erase the marks or stains that produced it.&#x27;
      : &#x27;Attestation lets a locally coherent pattern influence nearby flow. It is a human commitment, not a claim that the pattern is correct.&#x27;);
    canvas.dataset.fieldState = state;
    canvas.dataset.lockPoint = lockPoint ? `${lockPoint.x.toFixed(3)},${lockPoint.y.toFixed(3)}` : &#x27;&#x27;;
    canvas.dataset.lockStrength = lockStrength.toFixed(3);
  }

  function update(dt) {
    clock += dt * 0.001 * (reducedMotion ? 0.12 : 1);
    pointer.vx += (pointer.tx - pointer.x) * 0.075;
    pointer.vy += (pointer.ty - pointer.y) * 0.075;
    pointer.vx *= 0.76;
    pointer.vy *= 0.76;
    pointer.x += pointer.vx;
    pointer.y += pointer.vy;

    if (pointer.down &amp;&amp; currentGesture) {
      const now = performance.now();
      if (now - currentGesture.stroke.lastDwellAt &gt; 88) accrueStrokeDwell(currentGesture.stroke, now);
    }

    const spring = (shadowTarget - shadowMix) * 0.00007 * dt;
    shadowVelocity = (shadowVelocity + spring) * Math.pow(0.88, dt / 16.67);
    shadowMix = clamp(shadowMix + shadowVelocity, 0, 1);
    blindEnergy = Math.max(0, blindEnergy - dt * 0.000019);
    engagement = Math.max(0, engagement - dt * 0.000052);
    focalSeed = Math.max(0, focalSeed - dt * 0.000012);
    temperature += (temperatureTarget - temperature) * (1 - Math.pow(0.86, dt / 16.67));
    focusForce += (focusForceTarget - focusForce) * (1 - Math.pow(0.82, dt / 16.67));
    attestationCooldown = Math.max(0, attestationCooldown - dt * 0.001);

    const step = dt / 16.67;
    const grip = shadowGrip();
    const centroid = stainCentroid();
    const stainGravity = clamp(centroid.weight / 14, 0, 1);
    if (shadowMix &lt; 0.08) {
      blindHome.offsetX *= Math.pow(0.982, step);
      blindHome.offsetY *= Math.pow(0.982, step);
    }
    let blindTargetX = lerp(0.315, 0.43, grip) + blindHome.offsetX;
    let blindTargetY = lerp(0.455, 0.49, grip) + blindHome.offsetY;
    blindTargetX += (centroid.x - 0.5) * stainGravity * 0.035;
    blindTargetY += (centroid.y - 0.5) * stainGravity * 0.028;
    if (pointer.down &amp;&amp; Math.abs(focusForce) &gt; 0.025) applyFocusImpulse(pointer.x, pointer.y, 0.11 * step, 0.5);
    blindFocus.vx += (blindTargetX - blindFocus.x) * 0.0024 * step;
    blindFocus.vy += (blindTargetY - blindFocus.y) * 0.0024 * step;
    blindFocus.vx *= Math.pow(0.93, step);
    blindFocus.vy *= Math.pow(0.93, step);
    blindFocus.x = clamp(blindFocus.x + blindFocus.vx * step, 0.12, 0.88);
    blindFocus.y = clamp(blindFocus.y + blindFocus.vy * step, 0.15, 0.85);

    const emergentTarget = emergentInput.checked
      ? clamp(0.04 + focalSeed * 0.5 + stainGravity * 0.56, 0, 1)
      : 0;
    emergentFocus.coherence += (emergentTarget - emergentFocus.coherence) * (1 - Math.pow(0.975, step));
    const emergentTargetX = centroid.weight &gt; 0.02 ? centroid.x : 0.68 + Math.sin(clock * 0.07) * 0.05;
    const emergentTargetY = centroid.weight &gt; 0.02 ? centroid.y : 0.37 + Math.cos(clock * 0.09) * 0.04;
    emergentFocus.vx += (emergentTargetX - emergentFocus.x) * (0.00075 + emergentFocus.coherence * 0.0012) * step;
    emergentFocus.vy += (emergentTargetY - emergentFocus.y) * (0.00075 + emergentFocus.coherence * 0.0012) * step;
    emergentFocus.vx *= Math.pow(0.955, step);
    emergentFocus.vy *= Math.pow(0.955, step);
    emergentFocus.x = clamp(emergentFocus.x + emergentFocus.vx * step, 0.10, 0.90);
    emergentFocus.y = clamp(emergentFocus.y + emergentFocus.vy * step, 0.12, 0.88);
    canvas.dataset.blindFocusX = blindFocus.x.toFixed(3);
    canvas.dataset.blindFocusY = blindFocus.y.toFixed(3);
    canvas.dataset.blindHomeX = blindHome.offsetX.toFixed(3);
    canvas.dataset.blindHomeY = blindHome.offsetY.toFixed(3);
    canvas.dataset.emergentCoherence = emergentFocus.coherence.toFixed(3);
    canvas.dataset.shadowGrip = grip.toFixed(3);

    for (let i = marks.length - 1; i &gt;= 0; i--) {
      marks[i].age += dt * 0.001;
      if (marks[i].age &gt;= marks[i].life) marks.splice(i, 1);
    }
    for (let i = strokes.length - 1; i &gt;= 0; i--) {
      if (!strokes[i].active) strokes[i].age += dt * 0.001;
      if (!strokes[i].active &amp;&amp; strokes[i].age &gt;= strokes[i].life) strokes.splice(i, 1);
    }
    updateStrokeClouds(dt);
    for (let i = waves.length - 1; i &gt;= 0; i--) {
      waves[i].age += dt * 0.001;
      if (waves[i].age &gt;= waves[i].life) waves.splice(i, 1);
    }

    const convergence = findConvergenceCandidate();
    candidateScore = clamp(convergence.score + (emergentInput.checked ? emergentFocus.coherence * 0.06 : 0), 0, 1);
    candidatePoint = convergence.score &gt; 0 ? { x: convergence.x, y: convergence.y } : null;
    canvas.dataset.convergenceCandidate = candidateScore.toFixed(3);

    if (state === &#x27;field&#x27;) {
      resonance = Math.max(0.04, resonance - dt * 0.0000025);
      if (attestationCooldown &lt;= 0 &amp;&amp; candidatePoint &amp;&amp; candidateScore &gt;= 0.68) {
        state = &#x27;candidate&#x27;;
        eventTone(&#x27;candidate&#x27;, 0.5);
        setStatus();
      }
    }
    if (state === &#x27;releasing&#x27;) {
      returnProgress = (performance.now() - releaseStartedAt) / 2400;
      lockStrength = 1 - ease(returnProgress);
      if (returnProgress &gt;= 1) {
        returnProgress = -1;
        resonance = 0.14;
        state = &#x27;field&#x27;;
        lockPoint = null;
        lockStrength = 0;
        attestationCooldown = 14;
        addWave(candidatePoint?.x ?? 0.5, candidatePoint?.y ?? 0.5, 0.88, generation + 12);
        setStatus();
        eventTone(&#x27;return&#x27;, 0.5);
      }
    }

    for (let i = 0; i &lt; 9; i++) buildCurve(i);
    statusClock += dt;
    if (statusClock &gt; 180 &amp;&amp; !pointer.down) {
      statusClock = 0;
      setStatus();
    }
    if (!pointer.down &amp;&amp; !strokeMeterWrap.hidden &amp;&amp; performance.now() &gt; meterHideAt) strokeMeterWrap.hidden = true;
    if (frame % 4 === 0) updateAudio();
  }

  function animate(now) {
    const dt = Math.min(40, now - lastTime || 16.67);
    lastTime = now;
    frame++;
    update(dt);
    draw();
    requestAnimationFrame(animate);
  }

  function pointFromEvent(event) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: clamp((event.clientX - rect.left) / rect.width, 0, 1),
      y: clamp((event.clientY - rect.top) / rect.height, 0, 1),
      time: event.timeStamp || performance.now(),
      pressure: event.pressure &gt; 0 ? event.pressure : (event.buttons ? 0.42 : 0.24)
    };
  }

  function motionFromGesture(points) {
    if (points.length &lt; 2) return { speed: 0.08, curvature: 0.22, pressure: points[0]?.pressure ?? 0.42 };
    const b = points[points.length - 1];
    const a = points[points.length - 2];
    const distance = Math.hypot(b.x - a.x, b.y - a.y);
    const seconds = Math.max(0.008, (b.time - a.time) / 1000);
    const speed = clamp(distance / seconds / 1.35, 0, 1);
    let curvature = 0;
    if (points.length &gt; 2) {
      const p = points[points.length - 3];
      const a1 = Math.atan2(a.y - p.y, a.x - p.x);
      const a2 = Math.atan2(b.y - a.y, b.x - a.x);
      let turn = Math.abs(a2 - a1);
      if (turn &gt; Math.PI) turn = TAU - turn;
      curvature = clamp(turn / (Math.PI * 0.72), 0, 1);
    }
    return { speed, curvature, pressure: b.pressure };
  }

  canvas.addEventListener(&#x27;pointerenter&#x27;, event =&gt; {
    pointer.inside = true;
    const p = pointFromEvent(event);
    pointer.tx = p.x;
    pointer.ty = p.y;
  });

  canvas.addEventListener(&#x27;pointerleave&#x27;, () =&gt; {
    pointer.inside = false;
  });

  canvas.addEventListener(&#x27;pointerdown&#x27;, event =&gt; {
    canvas.setPointerCapture(event.pointerId);
    const p = pointFromEvent(event);
    pointer.down = true;
    pointer.tx = p.x;
    pointer.ty = p.y;
    eventTone(insideBlind(p.x, p.y) ? &#x27;blind&#x27; : &#x27;thread&#x27;, p.y);
    chalkContact(p.y);
    const stroke = {
      points: [],
      active: true,
      age: 0,
      life: 240 + Math.random() * 120,
      startedAt: p.time,
      length: 0,
      maxWidth: 10.5,
      deposit: 0,
      depositX: 0,
      depositY: 0,
      depositWeight: 0,
      nextStain: 0.82,
      stains: 0,
      lastBlindAt: -Infinity,
      lastDwellAt: p.time,
      seed: Math.random() * 97,
      color: (strokes.length * 4 + generation) % 9
    };
    appendStrokePoint(stroke, p, true);
    strokes.push(stroke);
    if (strokes.length &gt; 90) strokes.shift();
    currentGesture = { stroke, pressure: p.pressure };
    canvas.dataset.strokeCount = String(strokes.length);
    strokeMeterWrap.hidden = false;
  });

  canvas.addEventListener(&#x27;pointermove&#x27;, event =&gt; {
    const p = pointFromEvent(event);
    pointer.tx = p.x;
    pointer.ty = p.y;
    if (!pointer.down || !currentGesture) return;
    currentGesture.pressure = p.pressure;
    appendStrokePoint(currentGesture.stroke, p);
  });

  function endGesture(event) {
    if (!pointer.down) return;
    const p = pointFromEvent(event);
    pointer.down = false;
    if (currentGesture) {
      appendStrokePoint(currentGesture.stroke, p, true);
      currentGesture.stroke.active = false;
      addWave(p.x, p.y, 0.46 + currentGesture.stroke.deposit * 0.16, currentGesture.stroke.seed);
    }
    currentGesture = null;
    stopChalkSound();
    meterHideAt = performance.now() + 1500;
    setStatus();
  }

  canvas.addEventListener(&#x27;pointerup&#x27;, endGesture);
  canvas.addEventListener(&#x27;pointercancel&#x27;, () =&gt; {
    pointer.down = false;
    if (currentGesture) currentGesture.stroke.active = false;
    currentGesture = null;
    stopChalkSound();
    meterHideAt = performance.now() + 900;
  });

  function temperatureName(value) {
    if (value &lt; 0.12) return &#x27;glacial&#x27;;
    if (value &lt; 0.30) return &#x27;polar blue&#x27;;
    if (value &lt; 0.46) return &#x27;moon-cool&#x27;;
    if (value &lt; 0.56) return &#x27;temperate&#x27;;
    if (value &lt; 0.72) return &#x27;warm dawn&#x27;;
    if (value &lt; 0.88) return &#x27;ember-warm&#x27;;
    return &#x27;forge heat&#x27;;
  }

  function syncAtmosphereControls() {
    temperatureTarget = Number(temperatureInput.value) / 100;
    focusForceTarget = Number(focusForceInput.value) / 100;
    temperatureValue.textContent = temperatureName(temperatureTarget);
    focusForceValue.textContent = focusForceTarget &lt; -0.08
      ? `stroke pulls ${Math.round(Math.abs(focusForceTarget) * 100)}%`
      : focusForceTarget &gt; 0.08
        ? `stroke pushes ${Math.round(focusForceTarget * 100)}%`
        : &#x27;elastic drift&#x27;;
    canvas.dataset.temperature = temperatureTarget.toFixed(2);
    canvas.dataset.focusForce = focusForceTarget.toFixed(2);
  }

  temperatureInput.addEventListener(&#x27;input&#x27;, syncAtmosphereControls);
  focusForceInput.addEventListener(&#x27;input&#x27;, syncAtmosphereControls);
  emergentInput.addEventListener(&#x27;change&#x27;, () =&gt; {
    if (emergentInput.checked) focalSeed = Math.max(focalSeed, 0.12);
    canvas.dataset.emergentEnabled = String(emergentInput.checked);
    setStatus();
    eventTone(emergentInput.checked ? &#x27;candidate&#x27; : &#x27;thread&#x27;, 0.44);
  });

  shadowInput.addEventListener(&#x27;change&#x27;, () =&gt; {
    shadowTarget = shadowInput.checked ? 1 : 0;
    setStatus();
    eventTone(&#x27;shadow&#x27;, 0.5);
  });

  actionButton.addEventListener(&#x27;click&#x27;, () =&gt; {
    if (state === &#x27;candidate&#x27;) {
      state = &#x27;locked&#x27;;
      resonance = 1;
      lockStrength = 1;
      lockPoint = candidatePoint ? { ...candidatePoint } : { x: emergentFocus.x, y: emergentFocus.y };
      addWave(lockPoint.x, lockPoint.y, 1.6, 17);
      eventTone(&#x27;lock&#x27;, 0.5);
    } else if (state === &#x27;locked&#x27;) {
      state = &#x27;releasing&#x27;;
      returnProgress = 0;
      releaseStartedAt = performance.now();
      eventTone(&#x27;release&#x27;, 0.5);
    }
    setStatus();
  });

  window.addEventListener(&#x27;keydown&#x27;, event =&gt; {
    if (event.key.toLowerCase() !== &#x27;s&#x27; || /input|select|textarea/i.test(event.target.tagName)) return;
    shadowInput.checked = !shadowInput.checked;
    shadowInput.dispatchEvent(new Event(&#x27;change&#x27;));
  });

  let audio = null;

  function ensureAudio() {
    if (audio) {
      if (audio.context.state === &#x27;suspended&#x27;) audio.context.resume();
      return audio;
    }
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return null;
    const context = new AudioContext();
    const master = context.createGain();
    const filter = context.createBiquadFilter();
    const warmGain = context.createGain();
    const glassGain = context.createGain();
    const shadowGain = context.createGain();
    const chalkFilter = context.createBiquadFilter();
    const chalkGain = context.createGain();
    master.gain.value = 0;
    filter.type = &#x27;lowpass&#x27;;
    filter.frequency.value = 900;
    warmGain.gain.value = 0.028;
    glassGain.gain.value = 0.012;
    shadowGain.gain.value = 0;
    chalkFilter.type = &#x27;bandpass&#x27;;
    chalkFilter.frequency.value = 1850;
    chalkFilter.Q.value = 0.72;
    chalkGain.gain.value = 0;
    filter.connect(master);
    master.connect(context.destination);
    warmGain.connect(filter);
    glassGain.connect(filter);
    shadowGain.connect(filter);
    chalkFilter.connect(chalkGain);
    chalkGain.connect(context.destination);
    const warm = context.createOscillator();
    const glass = context.createOscillator();
    const shadow = context.createOscillator();
    const chalkBuffer = context.createBuffer(1, context.sampleRate * 2, context.sampleRate);
    const chalkData = chalkBuffer.getChannelData(0);
    for (let i = 0; i &lt; chalkData.length; i++) {
      const grain = Math.random() * 2 - 1;
      chalkData[i] = grain * (0.54 + Math.sin(i * 0.017) * 0.12);
    }
    const chalk = context.createBufferSource();
    chalk.buffer = chalkBuffer;
    chalk.loop = true;
    warm.type = &#x27;sine&#x27;;
    glass.type = &#x27;triangle&#x27;;
    shadow.type = &#x27;sawtooth&#x27;;
    warm.connect(warmGain);
    glass.connect(glassGain);
    shadow.connect(shadowGain);
    chalk.connect(chalkFilter);
    warm.start();
    glass.start();
    shadow.start();
    chalk.start();
    audio = { context, master, filter, warmGain, glassGain, shadowGain, chalkFilter, chalkGain, warm, glass, shadow, chalk, chalkBuffer, lastScrape: -Infinity };
    return audio;
  }

  function chalkContact(y = pointer.y) {
    if (!tonesInput.checked) return;
    const engine = ensureAudio();
    if (!engine) return;
    const now = engine.context.currentTime;
    const source = engine.context.createBufferSource();
    const contactFilter = engine.context.createBiquadFilter();
    const contactGain = engine.context.createGain();
    const tick = engine.context.createOscillator();
    const tickGain = engine.context.createGain();
    source.buffer = engine.chalkBuffer;
    source.playbackRate.value = 1.25 + (1 - y) * 0.42;
    contactFilter.type = &#x27;highpass&#x27;;
    contactFilter.frequency.value = 1150 + (1 - temperature) * 520;
    contactFilter.Q.value = 0.72;
    contactGain.gain.setValueAtTime(0.0001, now);
    contactGain.gain.exponentialRampToValueAtTime(0.038, now + 0.0015);
    contactGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.044);
    tick.type = &#x27;triangle&#x27;;
    tick.frequency.value = 1720 + (1 - y) * 780 + (1 - temperature) * 260;
    tick.frequency.exponentialRampToValueAtTime(tick.frequency.value * 0.72, now + 0.028);
    tickGain.gain.setValueAtTime(0.0001, now);
    tickGain.gain.exponentialRampToValueAtTime(0.012, now + 0.001);
    tickGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.032);
    source.connect(contactFilter);
    contactFilter.connect(contactGain);
    contactGain.connect(engine.context.destination);
    tick.connect(tickGain);
    tickGain.connect(engine.context.destination);
    source.start(now, Math.random() * 0.5, 0.052);
    tick.start(now);
    tick.stop(now + 0.036);
    source.addEventListener(&#x27;ended&#x27;, () =&gt; {
      contactFilter.disconnect();
      contactGain.disconnect();
      tickGain.disconnect();
    }, { once: true });
    canvas.dataset.chalkContact = &#x27;tap&#x27;;
  }

  function updateChalkSound(speed = 0, width = 0.85, pressure = 0.32, stability = 0.5, voidness = 0.5) {
    canvas.dataset.chalkMotion = speed.toFixed(3);
    if (!tonesInput.checked || speed &lt; 0.018) {
      stopChalkSound();
      return;
    }
    const engine = ensureAudio();
    if (!engine) return;
    const now = engine.context.currentTime;
    const interval = lerp(0.052, 0.014, speed) * lerp(1.22, 0.78, 1 - stability);
    if (now - engine.lastScrape &lt; interval) return;
    engine.lastScrape = now;
    const grain = clamp((width - 0.85) / 9.65, 0, 1);
    const crossGrain = 1 - stability;
    const slip = 0.72 + Math.random() * 0.34;
    const loudness = clamp((0.006 + speed * 0.019 + grain * 0.008 + pressure * 0.004 + crossGrain * 0.006) * slip, 0, 0.036);
    engine.chalkFilter.frequency.setTargetAtTime(880 + speed * 2250 + (1 - temperature) * 360 + crossGrain * 720 + voidness * 180, now, 0.035);
    engine.chalkFilter.Q.setTargetAtTime(0.52 + grain * 0.85 + crossGrain * 0.72, now, 0.05);
    engine.chalkGain.gain.cancelScheduledValues(now);
    engine.chalkGain.gain.setValueAtTime(Math.max(0.0001, engine.chalkGain.gain.value), now);
    engine.chalkGain.gain.exponentialRampToValueAtTime(loudness, now + 0.002 + crossGrain * 0.002);
    engine.chalkGain.gain.exponentialRampToValueAtTime(0.0001, now + lerp(0.034, 0.014, speed));
    if (crossGrain &gt; 0.38 &amp;&amp; Math.random() &lt; 0.18 + crossGrain * 0.22) {
      const squeak = engine.context.createOscillator();
      const squeakGain = engine.context.createGain();
      squeak.type = &#x27;triangle&#x27;;
      squeak.frequency.value = 1120 + speed * 1180 + Math.random() * 210;
      squeak.frequency.exponentialRampToValueAtTime(squeak.frequency.value * (0.86 + Math.random() * 0.1), now + 0.026);
      squeakGain.gain.setValueAtTime(0.0001, now);
      squeakGain.gain.exponentialRampToValueAtTime(0.0025 + crossGrain * 0.004, now + 0.002);
      squeakGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.028);
      squeak.connect(squeakGain);
      squeakGain.connect(engine.context.destination);
      squeak.start(now);
      squeak.stop(now + 0.032);
      squeak.addEventListener(&#x27;ended&#x27;, () =&gt; squeakGain.disconnect(), { once: true });
    }
    canvas.dataset.chalkSound = &#x27;stick-slip&#x27;;
  }

  function stopChalkSound() {
    if (audio) {
      const now = audio.context.currentTime;
      audio.chalkGain.gain.cancelScheduledValues(now);
      audio.chalkGain.gain.setTargetAtTime(0, now, 0.018);
    }
    canvas.dataset.chalkSound = &#x27;quiet&#x27;;
  }

  function updateAudio() {
    if (!audio) return;
    const now = audio.context.currentTime;
    const altitude = 1 - pointer.y;
    const base = 52 * Math.pow(2, altitude * 1.85 + (temperature - 0.5) * 0.14);
    const inward = shadowGrip();
    audio.master.gain.setTargetAtTime(ambientInput.checked ? 0.68 : 0, now, 0.45);
    audio.warm.frequency.setTargetAtTime(base, now, 0.18);
    audio.glass.frequency.setTargetAtTime(base * lerp(1.5, Math.SQRT2, inward), now, 0.22);
    audio.shadow.frequency.setTargetAtTime(base * lerp(1.25, Math.SQRT2, inward), now, 0.2);
    audio.shadow.detune.setTargetAtTime(inward * 42, now, 0.28);
    audio.warmGain.gain.setTargetAtTime(0.024 * (0.78 + temperature * 0.44) * (1 - inward * 0.48), now, 0.34);
    audio.glassGain.gain.setTargetAtTime(0.012 * (1.16 - temperature * 0.32) * (1 - inward * 0.34), now, 0.34);
    audio.shadowGain.gain.setTargetAtTime(0.012 * inward, now, 0.38);
    audio.filter.frequency.setTargetAtTime(lerp(1320 + temperature * 360 + altitude * 900, 390 + temperature * 140 + altitude * 280, inward), now, 0.32);
  }

  function eventTone(kind, y = pointer.y) {
    canvas.dataset.lastToneKind = kind;
    canvas.dataset.toneCount = String(Number(canvas.dataset.toneCount || 0) + 1);
    if (!tonesInput.checked) return;
    const engine = ensureAudio();
    if (!engine) return;
    const now = engine.context.currentTime;
    const notes = { stain: -2, thread: 4, dust: 7, arc: 9, blind: 1, candidate: 7, lock: 12, shadow: -1, release: 4, return: 9 };
    const significant = [&#x27;blind&#x27;, &#x27;candidate&#x27;, &#x27;lock&#x27;, &#x27;release&#x27;, &#x27;return&#x27;].includes(kind);
    const base = 146.83 * Math.pow(2, (1 - y) * 0.78 + (temperature - 0.5) * 0.10);
    const frequency = base * Math.pow(2, (notes[kind] || 0) / 12);
    const destination = engine.context.createGain();
    destination.connect(engine.context.destination);
    const osc = engine.context.createOscillator();
    const upper = engine.context.createOscillator();
    const gain = engine.context.createGain();
    const upperGain = engine.context.createGain();
    osc.type = shadowMix &gt; 0.65 ? &#x27;triangle&#x27; : &#x27;sine&#x27;;
    upper.type = shadowMix &gt; 0.65 ? &#x27;sawtooth&#x27; : &#x27;sine&#x27;;
    osc.frequency.value = frequency;
    upper.frequency.value = frequency * lerp(1.5, Math.SQRT2, shadowMix);
    upper.detune.value = shadowMix * 38;
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(significant ? 0.072 : 0.032, now + 0.008);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + (significant ? 1.55 : 0.46));
    upperGain.gain.setValueAtTime(0.0001, now);
    upperGain.gain.exponentialRampToValueAtTime(significant ? 0.025 : 0.01, now + 0.012);
    upperGain.gain.exponentialRampToValueAtTime(0.0001, now + (significant ? 1.15 : 0.34));
    osc.connect(gain);
    upper.connect(upperGain);
    gain.connect(destination);
    upperGain.connect(destination);
    osc.start(now);
    upper.start(now);
    osc.stop(now + (significant ? 1.6 : 0.5));
    upper.stop(now + (significant ? 1.2 : 0.38));
    osc.addEventListener(&#x27;ended&#x27;, () =&gt; destination.disconnect(), { once: true });
  }

  ambientInput.addEventListener(&#x27;change&#x27;, () =&gt; {
    if (ambientInput.checked) ensureAudio();
    updateAudio();
  });

  tonesInput.addEventListener(&#x27;change&#x27;, () =&gt; {
    if (tonesInput.checked) {
      ensureAudio();
      eventTone(&#x27;thread&#x27;, 0.5);
    } else stopChalkSound();
  });

  const resizeObserver = new ResizeObserver(resize);
  resizeObserver.observe(canvas);
  new MutationObserver(refreshPalette).observe(document.documentElement, { attributes: true, attributeFilter: [&#x27;class&#x27;, &#x27;data-theme&#x27;] });
  resize();
  syncAtmosphereControls();
  for (let i = 0; i &lt; 9; i++) buildCurve(i);
  addWave(0.51, 0.5, 0.7, 3);
  setStatus();
  requestAnimationFrame(animate);
})();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
