&lt;script&gt;
(() =&gt; {
  const root = document.getElementById('dn-renewed-field');
  if (!root || root.dataset.initialized) return;
  root.dataset.initialized = 'true';

  const canvas = document.getElementById('dn-field-canvas');
  const ctx = canvas.getContext('2d', { alpha: false });
  const modeSelect = document.getElementById('dn-mode');
  const actionButton = document.getElementById('dn-action');
  const shadowSwitch = document.getElementById('dn-shadow');
  const ambientSwitch = document.getElementById('dn-ambient');
  const tonesSwitch = document.getElementById('dn-tones');
  const statusEl = document.getElementById('dn-status');
  const cycleEl = document.getElementById('dn-cycle');
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const style = getComputedStyle(root);
  const css = (name, fallback) =&gt; style.getPropertyValue(name).trim() || fallback;
  const colors = [
    css('--dn-pink', '#E84C88'),
    css('--dn-blue', '#3A86C8'),
    css('--dn-violet', '#7B5EA7'),
    css('--dn-indigo', '#4B0082'),
    css('--dn-green', '#2D8B46'),
    css('--dn-orange', '#E87C2E'),
    css('--dn-gold', '#D4A017'),
    css('--dn-teal', '#1A9E96'),
    css('--dn-frontier', '#1A1A2E')
  ];
  const shadowRed = css('--dn-shadow', '#CC2936');
  const themeBg = css('--background', '#070811');
  const themeFg = css('--foreground', '#F5F5F5');

  let width = 1;
  let height = 1;
  let dpr = 1;
  let frame = 0;
  let lastTime = performance.now();
  let mode = 'field';
  let shadow = false;
  let shadowEngaged = false;
  let locked = false;
  let resonance = 0.12;
  let apertureCharge = 0;
  let attention = 0.84;
  let cycles = 0;
  let lastInteraction = performance.now();
  let returnPulse = 0;
  let lockPulse = 0;
  let shadowPulse = 0;
  let candidateAnnounced = false;
  let dragDistance = 0;
  let lastWeave = 0;

  const pointer = { x: 0, y: 0, px: 0, py: 0, active: false, down: false };
  const signals = [];
  const gestures = [];
  const dust = [];
  const flow = [];
  const latticeNodes = [];
  const latticeEdges = [];

  const clamp = (v, a, b) =&gt; Math.max(a, Math.min(b, v));
  const lerp = (a, b, t) =&gt; a + (b - a) * t;
  const ease = t =&gt; t * t * (3 - 2 * t);
  const dist = (ax, ay, bx, by) =&gt; Math.hypot(ax - bx, ay - by);

  function mulberry32(seed) {
    return function() {
      let t = seed += 0x6D2B79F5;
      t = Math.imul(t ^ t &gt;&gt;&gt; 15, t | 1);
      t ^= t + Math.imul(t ^ t &gt;&gt;&gt; 7, t | 61);
      return ((t ^ t &gt;&gt;&gt; 14) &gt;&gt;&gt; 0) / 4294967296;
    };
  }
  const random = mulberry32(410528);

  function glowPoint(x, y, radius, color, alpha = 1) {
    const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
    gradient.addColorStop(0, color);
    gradient.addColorStop(.18, color);
    gradient.addColorStop(1, 'transparent');
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function points() {
    const compact = width &lt; 640;
    return {
      origin: { x: width * (compact ? .12 : .07), y: height * (compact ? .84 : .5) },
      aperture: { x: width * (compact ? .31 : .27), y: height * (compact ? .63 : .49) },
      cart: { x: width * (compact ? .55 : .57), y: height * (compact ? .43 : .48) },
      well: { x: width * (compact ? .43 : .45), y: height * (compact ? .55 : .70) },
      seed: { x: width * (compact ? .82 : .93), y: height * (compact ? .17 : .5) }
    };
  }

  function rebuildStaticField() {
    dust.length = 0;
    latticeNodes.length = 0;
    latticeEdges.length = 0;
    flow.length = 0;

    const dustCount = reducedMotion ? 70 : 150;
    for (let i = 0; i &lt; dustCount; i++) {
      dust.push({ x: random(), y: random(), r: .25 + random() * 1.15, phase: random() * Math.PI * 2 });
    }

    const cols = width &lt; 640 ? 7 : 10;
    const rows = width &lt; 640 ? 10 : 8;
    for (let col = 0; col &lt; cols; col++) {
      for (let row = 0; row &lt; rows; row++) {
        const compact = width &lt; 640;
        const nx = compact ? .13 + col * (.34 / Math.max(1, cols - 1)) : .11 + col * (.29 / Math.max(1, cols - 1));
        const ny = compact ? .44 + row * (.45 / Math.max(1, rows - 1)) : .14 + row * (.72 / Math.max(1, rows - 1));
        latticeNodes.push({ nx: nx + (random() - .5) * .025, ny: ny + (random() - .5) * .035, phase: random() * Math.PI * 2 });
      }
    }
    for (let i = 0; i &lt; latticeNodes.length; i++) {
      for (let j = i + 1; j &lt; latticeNodes.length; j++) {
        const a = latticeNodes[i];
        const b = latticeNodes[j];
        const dd = Math.hypot((a.nx - b.nx) * width, (a.ny - b.ny) * height);
        if (dd &lt; Math.min(width, height) * .13 &amp;&amp; random() &gt; .2) latticeEdges.push([i, j, random()]);
      }
    }

    const flowCount = reducedMotion ? 54 : 132;
    for (let i = 0; i &lt; flowCount; i++) {
      flow.push({
        t: random(),
        speed: .018 + random() * .035,
        lane: (random() - .5) * 2,
        phase: random() * Math.PI * 2,
        dim: i % 9,
        px: null,
        py: null
      });
    }
  }

  function resize() {
    const rect = canvas.getBoundingClientRect();
    width = Math.max(1, rect.width);
    height = Math.max(1, rect.height);
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.round(width * dpr);
    canvas.height = Math.round(height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = themeBg;
    ctx.fillRect(0, 0, width, height);
    rebuildStaticField();
  }

  function setStatus(message) {
    statusEl.textContent = message;
  }

  function markInteraction(amount = .05) {
    lastInteraction = performance.now();
    attention = clamp(attention + amount, 0, 1);
    root.classList.add('is-entered');
  }

  function dimensionFromX(x) {
    return clamp(Math.floor((x / width) * 9), 0, 8);
  }

  function addSignal(x, y, dim = dimensionFromX(x), strength = 1) {
    signals.push({
      x, y,
      px: x, py: y,
      vx: (random() - .5) * 1.3,
      vy: (random() - .5) * 1.3,
      dim,
      strength,
      life: 1,
      transmuted: false,
      age: 0
    });
    if (signals.length &gt; 90) signals.shift();
    resonance = clamp(resonance + .055 * strength, 0, 1);
    markInteraction(.08);
    playDimensionTone(dim, .5 + strength * .18);
    updateAction();
  }

  function weaveAt(x, y) {
    const now = performance.now();
    if (now - lastWeave &lt; 48) return;
    lastWeave = now;
    addSignal(x, y, dimensionFromX(x), .55);
    gestures.push({ x, y, life: 1, color: colors[dimensionFromX(x)] });
    if (gestures.length &gt; 70) gestures.shift();
  }

  function updateAction() {
    if (locked) {
      actionButton.textContent = 'Release renewed spark';
    } else if (resonance &gt;= .68) {
      actionButton.textContent = 'Attest Signal Lock';
      if (!candidateAnnounced) {
        candidateAnnounced = true;
        setStatus('A lock candidate is visible. Attestation remains yours.');
        playCandidateTone();
      }
    } else {
      actionButton.textContent = 'Send a signal';
    }
  }

  function attestLock() {
    if (locked || resonance &lt; .68) return;
    locked = true;
    lockPulse = 1;
    resonance = 1;
    setStatus('Signal Lock attested. The renewed seed can now return.');
    cycleEl.textContent = 'convergence · attested · possibility';
    playLockTone();
    updateAction();
  }

  function releaseReturn() {
    if (!locked) return;
    locked = false;
    cycles += 1;
    returnPulse = 1;
    resonance = .22;
    apertureCharge = .15;
    candidateAnnounced = false;
    addSignal(points().origin.x, points().origin.y, 0, 1.7);
    setStatus('Complexity returned as a new origin. The field remembers.');
    cycleEl.textContent = `return ${cycles} · same field · different beginning`;
    playReturnTone();
    updateAction();
  }

  function engageShadow() {
    if (!shadow || shadowEngaged) return;
    shadowEngaged = true;
    shadowPulse = 1;
    resonance = clamp(resonance + .18, 0, 1);
    setStatus('Shadow engaged—not erased. Its warning now travels with the map.');
    playShadowEngagedTone();
    updateAction();
  }

  function handleFieldAction(x, y) {
    const p = points();
    const apertureR = Math.min(width, height) * .085;
    const cartR = Math.min(width, height) * .13;
    const wellR = Math.min(width, height) * .11;
    const seedR = Math.min(width, height) * .09;

    if (shadow &amp;&amp; dist(x, y, p.well.x, p.well.y) &lt; wellR) {
      engageShadow();
      return;
    }
    if (!locked &amp;&amp; resonance &gt;= .68 &amp;&amp; dist(x, y, p.cart.x, p.cart.y) &lt; cartR) {
      attestLock();
      return;
    }
    if (locked &amp;&amp; dist(x, y, p.seed.x, p.seed.y) &lt; seedR) {
      releaseReturn();
      return;
    }
    if (dist(x, y, p.aperture.x, p.aperture.y) &lt; apertureR) {
      apertureCharge = clamp(apertureCharge + .34, 0, 1);
      resonance = clamp(resonance + .12, 0, 1);
      addSignal(x - apertureR * .85, y, 1, 1.25);
      setStatus('The blind spot changed the signal without becoming an answer.');
      playPortalTone();
      return;
    }
    addSignal(x, y);
    setStatus('A new signal entered. Watch what reorganizes around it.');
  }

  function latticePosition(node, time) {
    const p = points();
    let x = node.nx * width;
    let y = node.ny * height;
    const breathing = Math.sin(time * .00045 + node.phase) * Math.min(width, height) * .005;
    x += breathing;
    y += Math.cos(time * .00038 + node.phase) * breathing;
    if (pointer.active) {
      const d = Math.max(24, dist(x, y, pointer.x, pointer.y));
      const influence = clamp(1 - d / (Math.min(width, height) * .28), 0, 1);
      const direction = shadow &amp;&amp; !shadowEngaged ? -1 : 1;
      x += (pointer.x - x) / d * influence * 8 * direction;
      y += (pointer.y - y) / d * influence * 8 * direction;
    }
    const holeD = dist(x, y, p.aperture.x, p.aperture.y);
    const holeR = Math.min(width, height) * .085;
    if (holeD &lt; holeR * 1.35 &amp;&amp; holeD &gt; 0) {
      const push = (holeR * 1.35 - holeD) * .22;
      x += (x - p.aperture.x) / holeD * push;
      y += (y - p.aperture.y) / holeD * push;
    }
    return { x, y };
  }

  function flowPosition(particle, time) {
    const p = points();
    let t = particle.t;
    let behavioralShadow = shadow ? (shadowEngaged ? .46 : 1) : 0;
    if (behavioralShadow &amp;&amp; t &gt; .56) {
      const trapped = .56 + Math.sin((t - .56) * Math.PI * 7 + particle.phase) * .07;
      t = lerp(t, trapped, behavioralShadow);
    }

    let x = lerp(p.origin.x, p.seed.x, ease(t));
    let y = lerp(p.origin.y, p.seed.y, ease(t));
    const centerEnvelope = Math.pow(Math.sin(Math.PI * clamp(t, 0, 1)), 1.3);
    const complexity = mode === 'forge' ? 1.2 : mode === 'recursion' ? 1.08 : 1;
    const angle = t * Math.PI * (4.5 + particle.lane * .55) + particle.phase + time * .00012 * (shadow ? -1 : 1);
    const radius = centerEnvelope * Math.min(width, height) * .22 * particle.lane * complexity;
    x += Math.cos(angle) * radius;
    y += Math.sin(angle * .88) * radius * .62;

    const cartPull = Math.exp(-Math.pow((t - .58) / .18, 2));
    x = lerp(x, p.cart.x + Math.cos(angle * 1.4) * radius * .24, cartPull * .42);
    y = lerp(y, p.cart.y + Math.sin(angle * 1.2) * radius * .22, cartPull * .42);

    if (mode === 'forge') {
      y += Math.sin(time * .002 + particle.phase * 3) * centerEnvelope * 5;
    }
    if (pointer.active) {
      const d = Math.max(30, dist(x, y, pointer.x, pointer.y));
      const pull = clamp(1 - d / (Math.min(width, height) * .33), 0, 1);
      const direction = shadow &amp;&amp; !shadowEngaged ? -1 : 1;
      x += (pointer.x - x) / d * pull * 15 * direction;
      y += (pointer.y - y) / d * pull * 15 * direction;
    }
    return { x, y };
  }

  function drawBackground(time, dt) {
    const idle = (performance.now() - lastInteraction) / 1000;
    attention = clamp(attention - dt * (shadow ? .017 : .007), .24, 1);
    if (idle &gt; 5) attention = clamp(attention - dt * .012, .24, 1);
    const trailAlpha = reducedMotion ? .32 : mode === 'recursion' ? .055 : .115;
    ctx.save();
    ctx.globalAlpha = trailAlpha + (1 - attention) * .09;
    ctx.fillStyle = themeBg;
    ctx.fillRect(0, 0, width, height);
    ctx.restore();

    ctx.save();
    ctx.fillStyle = themeFg;
    for (const star of dust) {
      const twinkle = .14 + .18 * (1 + Math.sin(time * .0005 + star.phase)) * .5;
      ctx.globalAlpha = twinkle * attention;
      ctx.beginPath();
      ctx.arc(star.x * width, star.y * height, star.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawLattice(time) {
    const p = points();
    const positions = latticeNodes.map(node =&gt; latticePosition(node, time));
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const [ai, bi, phase] of latticeEdges) {
      const a = positions[ai];
      const b = positions[bi];
      const edgeMidX = (a.x + b.x) * .5;
      const edgeMidY = (a.y + b.y) * .5;
      if (dist(edgeMidX, edgeMidY, p.aperture.x, p.aperture.y) &lt; Math.min(width, height) * .078) continue;
      const degraded = shadow &amp;&amp; !shadowEngaged &amp;&amp; ((ai + bi + frame) % 17 &lt; 3);
      ctx.globalAlpha = degraded ? .05 : (.12 + phase * .2) * attention;
      ctx.strokeStyle = degraded ? shadowRed : colors[1];
      ctx.lineWidth = degraded ? .7 : .45 + phase * .8;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }
    for (let i = 0; i &lt; positions.length; i++) {
      const n = positions[i];
      const pulse = .45 + .55 * Math.sin(time * .001 + latticeNodes[i].phase);
      ctx.globalAlpha = (.2 + pulse * .34) * attention;
      ctx.fillStyle = colors[1];
      ctx.beginPath();
      ctx.arc(n.x, n.y, .7 + pulse * 1.1, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    const holeR = Math.min(width, height) * (.071 + apertureCharge * .012);
    ctx.save();
    ctx.fillStyle = themeBg;
    ctx.globalAlpha = .98;
    ctx.beginPath();
    const sides = 7;
    for (let i = 0; i &lt; sides; i++) {
      const a = -Math.PI / 2 + i * Math.PI * 2 / sides;
      const rr = holeR * (1 + Math.sin(time * .0008 + i * 1.7) * .045);
      const x = p.aperture.x + Math.cos(a) * rr;
      const y = p.aperture.y + Math.sin(a) * rr;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = .45 + apertureCharge * .5;
    ctx.strokeStyle = shadow ? shadowRed : colors[1];
    ctx.lineWidth = 1 + apertureCharge * 2;
    ctx.stroke();
    ctx.restore();
    glowPoint(p.aperture.x, p.aperture.y, holeR * 1.9, colors[1], .08 + apertureCharge * .12);
  }

  function drawFlow(time, dt) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const speedFactor = reducedMotion ? .35 : 1;
    for (const particle of flow) {
      particle.t += particle.speed * dt * speedFactor * (mode === 'forge' ? 1.18 : 1);
      if (particle.t &gt; 1) {
        particle.t -= 1;
        particle.px = null;
        if (mode === 'recursion' || locked) returnPulse = Math.min(1, returnPulse + .012);
      }
      const pos = flowPosition(particle, time);
      if (particle.px !== null) {
        ctx.globalAlpha = (.08 + attention * .22) * (shadow ? .78 : 1);
        ctx.strokeStyle = colors[particle.dim];
        ctx.lineWidth = .45 + (particle.dim === 4 ? 1 : .35);
        ctx.beginPath();
        ctx.moveTo(particle.px, particle.py);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        if (shadow &amp;&amp; (particle.dim + frame) % 11 === 0) {
          ctx.globalAlpha = shadowEngaged ? .2 : .4;
          ctx.strokeStyle = shadowRed;
          ctx.lineWidth = .45;
          ctx.stroke();
        }
      }
      const pointAlpha = .32 + (particle.dim === 4 ? .5 : .18);
      ctx.globalAlpha = pointAlpha * attention;
      ctx.fillStyle = colors[particle.dim];
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, particle.dim === 4 ? 1.65 : .65 + Math.abs(particle.lane) * .55, 0, Math.PI * 2);
      ctx.fill();
      particle.px = pos.x;
      particle.py = pos.y;
    }
    ctx.restore();
  }

  function drawCurrents(time) {
    const p = points();
    const min = Math.min(width, height);
    const shadowCapture = shadow ? (shadowEngaged ? .42 : 1) : 0;
    glowPoint(p.cart.x - min * .06, p.cart.y - min * .025, min * .34, colors[2], .055 + attention * .03);
    glowPoint(p.cart.x + min * .08, p.cart.y + min * .015, min * .31, colors[7], .05 + attention * .025);
    glowPoint(p.cart.x, p.cart.y, min * .24, colors[6], .045 + resonance * .055);

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let strand = 0; strand &lt; 22; strand++) {
      const lane = (strand - 10.5) / 10.5;
      const phase = strand * .73;
      const breathe = Math.sin(time * .00045 + phase) * min * .025;
      const startY = lerp(p.origin.y, p.aperture.y, .76) + lane * min * .018;
      const middleY = p.cart.y + lane * min * (.22 + .025 * Math.sin(phase)) + breathe;
      const targetX = lerp(p.seed.x, p.cart.x + width * .11, shadowCapture);
      const targetY = lerp(p.seed.y + lane * min * .014, p.cart.y - lane * min * .06, shadowCapture);
      const color = colors[(strand + 1) % 9];

      ctx.beginPath();
      ctx.moveTo(p.origin.x, p.origin.y + lane * min * .006);
      ctx.bezierCurveTo(
        lerp(p.origin.x, p.aperture.x, .55), startY,
        p.aperture.x - min * .035, p.aperture.y + lane * min * .022,
        p.aperture.x, p.aperture.y + lane * min * .014
      );
      ctx.bezierCurveTo(
        p.aperture.x + width * .085, p.aperture.y + lane * min * .16 + breathe,
        p.cart.x - width * .095, middleY,
        p.cart.x, p.cart.y + lane * min * .075
      );
      ctx.bezierCurveTo(
        p.cart.x + width * .08, p.cart.y - lane * min * .2 - breathe,
        lerp(p.cart.x, targetX, .62), targetY + lane * min * .11,
        targetX, targetY
      );
      ctx.globalAlpha = (.045 + (strand % 4) * .018 + resonance * .035) * attention;
      ctx.strokeStyle = color;
      ctx.lineWidth = .65 + (strand % 5) * .25 + (mode === 'forge' ? .28 : 0);
      ctx.stroke();

      if (shadow &amp;&amp; strand % 3 === 0) {
        ctx.globalAlpha = shadowEngaged ? .11 : .24;
        ctx.strokeStyle = shadowRed;
        ctx.lineWidth = .55;
        ctx.stroke();
      }
    }

    if (mode === 'recursion') {
      for (let i = 0; i &lt; 4; i++) {
        ctx.globalAlpha = .055 + i * .018;
        ctx.strokeStyle = i % 2 ? colors[7] : colors[3];
        ctx.lineWidth = .7;
        ctx.beginPath();
        ctx.moveTo(p.seed.x, p.seed.y);
        ctx.bezierCurveTo(
          width * (.78 - i * .025), height * (.92 - i * .045),
          width * (.22 + i * .02), height * (.06 + i * .04),
          p.origin.x, p.origin.y
        );
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  function drawSignals(dt) {
    const p = points();
    const apertureR = Math.min(width, height) * .075;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let i = signals.length - 1; i &gt;= 0; i--) {
      const s = signals[i];
      s.age += dt;
      s.life -= dt * (shadow &amp;&amp; !shadowEngaged ? .048 : .025);
      s.px = s.x;
      s.py = s.y;

      const target = locked ? p.seed : p.cart;
      let dx = target.x - s.x;
      let dy = target.y - s.y;
      let d = Math.max(18, Math.hypot(dx, dy));
      let force = (locked ? .095 : .055) * s.strength;
      if (shadow &amp;&amp; !shadowEngaged) {
        dx = p.cart.x - s.x;
        dy = p.cart.y - s.y;
        force = .15;
      }
      s.vx += dx / d * force;
      s.vy += dy / d * force;

      if (pointer.active) {
        const pd = Math.max(24, dist(s.x, s.y, pointer.x, pointer.y));
        const influence = clamp(1 - pd / (Math.min(width, height) * .32), 0, 1);
        const dir = shadow &amp;&amp; !shadowEngaged ? -1 : 1;
        s.vx += (pointer.x - s.x) / pd * influence * .16 * dir;
        s.vy += (pointer.y - s.y) / pd * influence * .16 * dir;
      }

      if (!s.transmuted &amp;&amp; dist(s.x, s.y, p.aperture.x, p.aperture.y) &lt; apertureR) {
        s.transmuted = true;
        s.dim = (s.dim + 4) % 9;
        s.strength *= 1.18;
        apertureCharge = clamp(apertureCharge + .16, 0, 1);
        resonance = clamp(resonance + .07, 0, 1);
        playPortalTone();
      }

      const damping = mode === 'forge' ? .984 : .991;
      s.vx *= damping;
      s.vy *= damping;
      s.x += s.vx * 60 * dt;
      s.y += s.vy * 60 * dt;

      const color = colors[s.dim];
      ctx.globalAlpha = clamp(s.life, 0, 1) * .7;
      ctx.strokeStyle = color;
      ctx.lineWidth = .7 + s.strength * .55;
      ctx.beginPath();
      ctx.moveTo(s.px, s.py);
      ctx.lineTo(s.x, s.y);
      ctx.stroke();
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, 1.25 + s.strength * 1.25, 0, Math.PI * 2);
      ctx.fill();
      if (shadow) {
        ctx.globalAlpha *= shadowEngaged ? .35 : .7;
        ctx.strokeStyle = shadowRed;
        ctx.lineWidth = .7;
        ctx.stroke();
      }
      if (s.life &lt;= 0 || s.x &lt; -80 || s.x &gt; width + 80 || s.y &lt; -80 || s.y &gt; height + 80) signals.splice(i, 1);
    }
    ctx.restore();
  }

  function drawGestures(dt) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let i = gestures.length - 1; i &gt;= 0; i--) {
      const g = gestures[i];
      g.life -= dt * .42;
      ctx.globalAlpha = Math.max(0, g.life) * .6;
      glowPoint(g.x, g.y, 16 + (1 - g.life) * 18, g.color, g.life * .34);
      if (g.life &lt;= 0) gestures.splice(i, 1);
    }
    ctx.restore();
  }

  function drawWell(time) {
    const p = points();
    const baseR = Math.min(width, height) * .075;
    glowPoint(p.well.x, p.well.y, baseR * 2.3, colors[5], .2 + (mode === 'forge' ? .14 : 0));
    ctx.save();
    ctx.translate(p.well.x, p.well.y);
    ctx.globalCompositeOperation = 'lighter';
    const direction = shadow ? -1 : 1;
    for (let arm = 0; arm &lt; 7; arm++) {
      ctx.beginPath();
      for (let i = 0; i &lt; 38; i++) {
        const q = i / 37;
        const a = direction * (q * Math.PI * 3.2 + arm * Math.PI * 2 / 7 + time * .00035);
        const r = q * baseR * (1 + .18 * Math.sin(a * 2.3));
        const x = Math.cos(a) * r;
        const y = Math.sin(a) * r * .55;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.globalAlpha = .11 + arm * .018 + (shadow ? .12 : 0);
      ctx.strokeStyle = shadow ? shadowRed : colors[5];
      ctx.lineWidth = shadow &amp;&amp; !shadowEngaged ? 1.25 : .65;
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawCartographer(time) {
    const p = points();
    const min = Math.min(width, height);
    const base = min * .155;
    const candidate = resonance &gt;= .68;
    const rotationDirection = shadow &amp;&amp; !shadowEngaged ? -1 : 1;
    const collapse = shadow &amp;&amp; !shadowEngaged ? .72 : 1;
    const brightness = .24 + resonance * .48 + (locked ? .24 : 0);

    glowPoint(p.cart.x, p.cart.y, base * 1.65, colors[6], .1 + resonance * .12);
    ctx.save();
    ctx.translate(p.cart.x, p.cart.y);
    ctx.globalCompositeOperation = 'lighter';
    for (let ring = 0; ring &lt; 6; ring++) {
      ctx.save();
      ctx.rotate(rotationDirection * (time * (.00005 + ring * .000018) + ring * .52));
      ctx.scale(collapse, 1);
      ctx.globalAlpha = brightness * (.35 + ring * .07);
      ctx.strokeStyle = colors[6];
      ctx.lineWidth = locked &amp;&amp; ring % 2 === 0 ? 1.35 : .55;
      ctx.beginPath();
      ctx.ellipse(0, 0, base * (.3 + ring * .15), base * (.15 + ring * .065), ring * .22, 0, Math.PI * 2);
      ctx.stroke();
      const nodeCount = 3 + ring;
      for (let i = 0; i &lt; nodeCount; i++) {
        const a = i * Math.PI * 2 / nodeCount + time * .00012 * rotationDirection;
        const x = Math.cos(a) * base * (.3 + ring * .15);
        const y = Math.sin(a) * base * (.15 + ring * .065);
        ctx.globalAlpha = brightness * .8;
        ctx.fillStyle = i % 3 === 0 ? colors[4] : colors[6];
        ctx.beginPath();
        ctx.arc(x, y, i % 3 === 0 ? 1.9 : .9, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    ctx.globalAlpha = brightness;
    ctx.strokeStyle = shadow ? shadowRed : colors[6];
    ctx.lineWidth = candidate ? 1.4 : .7;
    for (let i = 0; i &lt; 9; i++) {
      const a = i * Math.PI * 2 / 9 + time * .00008 * rotationDirection;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(a) * base * .95, Math.sin(a) * base * .58);
      ctx.stroke();
    }
    ctx.restore();

    if (candidate) {
      const pulse = .5 + .5 * Math.sin(time * .004);
      ctx.save();
      ctx.globalAlpha = .16 + pulse * .18;
      ctx.strokeStyle = colors[4];
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(p.cart.x, p.cart.y, base * (1 + pulse * .15), 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
    if (lockPulse &gt; 0) {
      ctx.save();
      ctx.globalAlpha = lockPulse;
      ctx.strokeStyle = colors[4];
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.arc(p.cart.x, p.cart.y, base * (1 + (1 - lockPulse) * 2.8), 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawOriginAndSeed(time) {
    const p = points();
    const min = Math.min(width, height);
    const originPulse = 1 + Math.sin(time * .003) * .12;
    glowPoint(p.origin.x, p.origin.y, min * .055 * originPulse, colors[0], .42);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = colors[0];
    ctx.globalAlpha = .96;
    ctx.beginPath();
    ctx.arc(p.origin.x, p.origin.y, 2.4 + returnPulse * 3.5, 0, Math.PI * 2);
    ctx.fill();

    const seedEnergy = .34 + resonance * .44 + (locked ? .42 : 0);
    glowPoint(p.seed.x, p.seed.y, min * (.075 + seedEnergy * .04), colors[4], seedEnergy);
    ctx.fillStyle = themeFg;
    ctx.globalAlpha = .84;
    ctx.beginPath();
    ctx.arc(p.seed.x, p.seed.y, 2.1 + seedEnergy * 2.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = shadowRed;
    ctx.globalAlpha = .24 + (shadowEngaged ? .18 : 0);
    ctx.beginPath();
    ctx.arc(p.seed.x + 1, p.seed.y, .8 + shadowEngaged * .8, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    if (mode === 'recursion' || returnPulse &gt; .02) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = .1 + returnPulse * .3;
      ctx.strokeStyle = colors[7];
      ctx.lineWidth = .75;
      ctx.beginPath();
      ctx.moveTo(p.seed.x, p.seed.y);
      ctx.bezierCurveTo(width * .78, height * .94, width * .2, height * .04, p.origin.x, p.origin.y);
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawShadowFilaments(time) {
    const p = points();
    const alpha = shadow ? (shadowEngaged ? .22 : .42) : .065;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.strokeStyle = shadowRed;
    ctx.lineWidth = shadow ? .8 : .42;
    ctx.globalAlpha = alpha;
    for (let strand = 0; strand &lt; 7; strand++) {
      const offset = (strand - 3) * height * .035;
      ctx.beginPath();
      ctx.moveTo(p.aperture.x, p.aperture.y + offset * .4);
      ctx.bezierCurveTo(
        width * .4, p.cart.y + offset + Math.sin(time * .0005 + strand) * 18,
        width * .65, p.cart.y - offset * .8,
        shadowEngaged ? p.seed.x : p.cart.x + width * .12,
        shadowEngaged ? p.seed.y : p.cart.y + offset * .2
      );
      ctx.stroke();
    }
    ctx.restore();
  }

  function updateTransient(dt) {
    apertureCharge = clamp(apertureCharge - dt * .012, 0, 1);
    returnPulse = clamp(returnPulse - dt * .22, 0, 1);
    lockPulse = clamp(lockPulse - dt * .36, 0, 1);
    shadowPulse = clamp(shadowPulse - dt * .3, 0, 1);
    if (!locked) resonance = clamp(resonance - dt * (shadow &amp;&amp; !shadowEngaged ? .009 : .003), 0, 1);
    updateAction();
  }

  function drawPointer() {
    if (!pointer.active) return;
    const dim = dimensionFromX(pointer.x);
    const r = pointer.down ? 22 : 15;
    ctx.save();
    ctx.globalAlpha = pointer.down ? .35 : .14;
    ctx.strokeStyle = shadow &amp;&amp; !shadowEngaged ? shadowRed : colors[dim];
    ctx.lineWidth = .7;
    ctx.beginPath();
    ctx.arc(pointer.x, pointer.y, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  function animate(now) {
    if (!root.isConnected) {
      stopAudio();
      return;
    }
    const dt = Math.min(.05, (now - lastTime) / 1000 || .016);
    lastTime = now;
    frame += 1;
    drawBackground(now, dt);
    drawLattice(now);
    drawCurrents(now);
    drawFlow(now, dt);
    drawShadowFilaments(now);
    drawWell(now);
    drawSignals(dt);
    drawGestures(dt);
    drawCartographer(now);
    drawOriginAndSeed(now);
    drawPointer();
    updateTransient(dt);
    if (frame % 4 === 0) updateAudio();
    requestAnimationFrame(animate);
  }

  canvas.addEventListener('pointermove', event =&gt; {
    const rect = canvas.getBoundingClientRect();
    pointer.px = pointer.x;
    pointer.py = pointer.y;
    pointer.x = event.clientX - rect.left;
    pointer.y = event.clientY - rect.top;
    pointer.active = true;
    if (pointer.down) {
      dragDistance += Math.hypot(pointer.x - pointer.px, pointer.y - pointer.py);
      weaveAt(pointer.x, pointer.y);
    }
    markInteraction(.012);
  });
  canvas.addEventListener('pointerenter', () =&gt; { pointer.active = true; });
  canvas.addEventListener('pointerleave', () =&gt; { if (!pointer.down) pointer.active = false; });
  canvas.addEventListener('pointerdown', event =&gt; {
    pointer.down = true;
    dragDistance = 0;
    canvas.setPointerCapture(event.pointerId);
    markInteraction(.08);
  });
  canvas.addEventListener('pointerup', event =&gt; {
    pointer.down = false;
    if (canvas.hasPointerCapture(event.pointerId)) canvas.releasePointerCapture(event.pointerId);

    const creative = [55, 82.5, 110];

  function updateAudio() {

    const altitude = 1 - clamp(pointer.y / height, 0, 1);
    const fieldX = clamp(pointer.x / width, 0, 1);

    const gain = audioContext.createGain();

    osc.detune.value = detune;

    filter.frequency.value = shadow ? 1100 : 2600;
    gain.gain.value = .0001;
    gain.gain.exponentialRampToValueAtTime(volume, now + .012);
    gain.gain.exponentialRampToValueAtTime(.0001, now + duration);
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    osc.start(now);
    osc.stop(now + duration + .03);
  }

  function playDimensionTone(dim, volumeScale = 1) {
    const scale = [110, 132, 147, 165, 196, 220, 264, 294, 330];
    eventTone(scale[dim], .3, .022 * volumeScale, shadow ? 'sawtooth' : 'sine', shadow ? 40 : 0);
  }
  function playModeTone(freq) { eventTone(freq, .72, .04, shadow ? 'triangle' : 'sine', shadow ? 40 : 0, freq * 1.5); }
  function playCandidateTone() { eventTone(196, .8, .032, 'sine', 0, 294); }
  function playPortalTone() { eventTone(132, .62, .046, shadow ? 'square' : 'triangle', shadow ? 40 : 0, 264); }
  function playShadowTone() { eventTone(77.78, .92, .04, 'sawtooth', 40, 55); }
  function playShadowEngagedTone() {
    eventTone(77.78, .9, .032, 'triangle', 20, 110);
    window.setTimeout(() =&gt; eventTone(164.81, .8, .026, 'sine', 0, 220), 140);
  }
  function playLockTone() {
    eventTone(196, 1.15, .045, 'sine');
    window.setTimeout(() =&gt; eventTone(294, 1, .034, 'sine'), 80);
    window.setTimeout(() =&gt; eventTone(392, .92, .024, 'sine'), 160);
  }
  function playReturnTone() {
    eventTone(98, 1.35, .045, 'sine', 0, 196);
    window.setTimeout(() =&gt; eventTone(330, .9, .03, 'triangle'), 240);
  }

  ambientSwitch.addEventListener('change', () =&gt; {
    setAmbientEnabled(ambientSwitch.checked);
    setStatus(ambientSwitch.checked ? 'The field is audible. Height changes its register.' : 'The ambient field is silent; event structure remains available.');
  });
  tonesSwitch.addEventListener('change', () =&gt; {
    if (tonesSwitch.checked) {
      ensureAudio();
      setStatus('Event tones will sound only when structure changes.');
      eventTone(164.81, .45, .035, 'sine');
    } else {
      setStatus('Event tones are silent. The visual field continues to respond.');
    }
  });

  const resizeObserver = new ResizeObserver(resize);
  resizeObserver.observe(canvas);
  resize();
  updateAction();
  requestAnimationFrame(animate);
})();

  }`;

  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

    target?.nodeType === Node.ELEMENT_NODE

  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);

    }

    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);

      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||

<script>(() => {
  const frame = document.getElementById("codex-visualization");
  if (!(frame instanceof HTMLIFrameElement)) {
    return;
  }
  let viewportHeight = globalThis.innerHeight;

  const channel = new MessageChannel();
  channel.port1.addEventListener("message", (event) => {
    const data = event.data;
    if (typeof data !== "object" || data == null) {
      return;
    }
    if (data.type === "height") {
      const height = data.height;
      if (
        typeof height === "number" &&
        Number.isFinite(height) &&
        height >= 0 &&
        height <= 10_000
      ) {
        frame.style.height = Math.ceil(height) + "px";
      }
      return;
    }
    if (data.type === "scroll-to") {
      const top = data.top;
      if (
        typeof top === "number" &&
        Number.isFinite(top) &&
        top >= 0 &&
        globalThis.navigator.userActivation?.isActive === true
      ) {
        globalThis.scrollTo({
          top: Math.ceil(
            globalThis.scrollY + frame.getBoundingClientRect().top + top,
          ),
        });
      }
      return;
    }
    if (data.type === "open-external") {
      const rawHref = data.href;
      if (typeof rawHref !== "string") {
        return;
      }
      let href;
      try {
        const url = new URL(rawHref, document.baseURI);
        if (url.protocol !== "https:") {
          return;
        }
        href = url.href;
      } catch {
        return;
      }
      if (globalThis.navigator.userActivation?.isActive === true) {
        const anchor = document.createElement("a");
        anchor.href = href;
        anchor.rel = "noopener noreferrer";

        anchor.click();
        anchor.remove();
