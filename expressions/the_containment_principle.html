
<style>
  canvas { display: block; width: 100%; cursor: crosshair; border-radius: var(--border-radius-lg); }
  .controls { display: flex; align-items: center; gap: 16px; margin: 12px 0 0; font-size: 13px; color: var(--color-text-secondary); flex-wrap: wrap; }
  .controls label { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
  .key-hint { font-size: 11px; padding: 2px 6px; border: 0.5px solid var(--color-border-tertiary); border-radius: 4px; font-family: var(--font-mono); }
  #dim-label { font-weight: 500; color: var(--color-text-primary); min-width: 200px; }
  .toggle-track { position: relative; width: 32px; height: 18px; background: var(--color-border-secondary); border-radius: 9px; transition: background 0.2s; display: inline-block; }
  .toggle-track:has(input:checked) { background: var(--color-text-info); }
  .toggle-track input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; margin: 0; }
  .toggle-track span { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: #fff; border-radius: 50%; transition: transform 0.2s; pointer-events: none; }
  .toggle-track:has(input:checked) span { transform: translateX(14px); }
</style>
<canvas id="c"></canvas>
<div class="controls">
  <span id="dim-label">Move cursor inward to unfold</span>
  <label>
    <span class="toggle-track">
      <input type="checkbox" id="sound-toggle" onchange="toggleSound(this.checked)">
      <span></span>
    </span>
    Sound
  </label>
  <span><span class="key-hint">S</span> Shadow</span>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const dimLabel = document.getElementById('dim-label');
let W, H, cx, cy, maxR;
let mouseX = -1, mouseY = -1;
let shadowMode = false;
let shadowFade = 0;
let activeDim = 0;
let dimSmooth = 0;
let audioCtx = null;
let oscillators = [];
let gainNodes = [];
let masterGain = null;
let soundOn = false;
let lastBellDim = -1;
let time = 0;

const dims = [
  { name: '0D — Origin', sub: 'Existence without extension', color: '#FFFFFF', shadow: 'The void that refuses to spark' },
  { name: '1D — Spark', sub: 'A single vector. A single why.', color: '#E84C88', shadow: '1D\u0305 Anti-spark: energy toward entropy' },
  { name: '2D — Reaction', sub: 'Polarity emerges. Idea meets counter-idea.', color: '#3A86C8', shadow: '2D\u0305 Anti-truth: patterns for deception' },
  { name: '3D — Context', sub: 'Volume. Environment. Ecosystems of meaning.', color: '#7B5EA7', shadow: '3D\u0305 Anti-context: systems that fragment' },
  { name: '4D — Time', sub: 'Structure + evolution. Memory lives here.', color: '#4B0082', shadow: '4D\u0305 Anti-temporal: loops that tighten' },
  { name: '5D — Singularity', sub: 'Identity: what remains when everything changes.', color: '#2D8B46', shadow: '5D\u0305 Anti-singularity: self as cage' },
  { name: '6D — Connection', sub: 'Bridges between distinct structures.', color: '#E87C2E', shadow: '6D\u0305 Anti-bridge: connection for dominance' },
  { name: '7D — Manifestation', sub: 'Turning structure into form. Making real.', color: '#D4A017', shadow: '7D\u0305 Anti-creation: form that constrains' },
  { name: '8D — Recursion', sub: 'The structure re-enters itself.', color: '#1A9E96', shadow: '8D\u0305 Anti-recursion: elegant entropy' },
  { name: '9D — Frontier', sub: 'Engagement with the unknown.', color: '#1A1A2E', shadow: '9D\u0305 Anti-frontier: expansion without return' }
];

const frequencies = [65.41, 130.81, 196.00, 261.63, 329.63, 392.00, 523.25, 659.26, 783.99, 880.00];

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width;
  H = Math.min(W * 0.75, 520);
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  cx = W / 2;
  cy = H / 2;
  maxR = Math.min(cx, cy) * 0.88;
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return [r, g, b];
}

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0;
  masterGain.connect(audioCtx.destination);
  for (let i = 0; i < 10; i++) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = i < 5 ? 'sine' : 'triangle';
    osc.frequency.value = frequencies[i];
    gain.gain.value = 0;
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start();
    oscillators.push(osc);
    gainNodes.push(gain);
  }
}

function toggleSound(on) {
  soundOn = on;
  if (on) {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    masterGain.gain.setTargetAtTime(0.12, audioCtx.currentTime, 0.3);
  } else if (masterGain) {
    masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.3);
  }
}

function playBell(dim) {
  if (!soundOn || !audioCtx || dim === lastBellDim) return;
  lastBellDim = dim;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = frequencies[Math.min(dim, 9)] * 2;
  g.gain.value = 0.15;
  g.gain.setTargetAtTime(0, audioCtx.currentTime, 0.6);
  osc.connect(g);
  g.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + 1.5);
}

function updateSound() {
  if (!soundOn || !audioCtx) return;
  const t = audioCtx.currentTime;
  for (let i = 0; i < 10; i++) {
    const target = i <= activeDim ? (0.08 / (i + 1)) : 0;
    gainNodes[i].gain.setTargetAtTime(target, t, 0.15);
    if (shadowMode && i <= activeDim) {
      oscillators[i].detune.setTargetAtTime(i * 12 - 30, t, 0.4);
    } else {
      oscillators[i].detune.setTargetAtTime(0, t, 0.4);
    }
  }
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
});
canvas.addEventListener('mouseleave', () => { mouseX = -1; mouseY = -1; });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = e.touches[0].clientX - rect.left;
  mouseY = e.touches[0].clientY - rect.top;
}, { passive: false });
canvas.addEventListener('touchend', () => { mouseX = -1; mouseY = -1; });

document.addEventListener('keydown', e => {
  if (e.key === 's' || e.key === 'S') {
    shadowMode = !shadowMode;
  }
});

let particles = [];
for (let i = 0; i < 180; i++) {
  const dim = Math.floor(Math.random() * 10);
  const angle = Math.random() * Math.PI * 2;
  const rBase = (dim / 9) * 0.9 + 0.05;
  particles.push({
    dim, angle,
    rBase,
    rOff: (Math.random() - 0.5) * 0.08,
    speed: (Math.random() * 0.3 + 0.1) * (Math.random() < 0.5 ? 1 : -1),
    size: Math.random() * 2 + 1,
    phase: Math.random() * Math.PI * 2
  });
}

function draw() {
  time += 0.016;
  ctx.clearRect(0, 0, W, H);

  let dist = maxR * 1.2;
  if (mouseX >= 0) {
    dist = Math.sqrt((mouseX - cx) ** 2 + (mouseY - cy) ** 2);
  }

  const rawDim = Math.floor(Math.max(0, Math.min(9, (1 - dist / maxR) * 10)));
  activeDim = mouseX < 0 ? 0 : rawDim;
  dimSmooth += (activeDim - dimSmooth) * 0.08;
  shadowFade += ((shadowMode ? 1 : 0) - shadowFade) * 0.06;

  updateSound();

  if (Math.round(dimSmooth) !== lastBellDim && Math.abs(dimSmooth - Math.round(dimSmooth)) < 0.3) {
    playBell(Math.round(dimSmooth));
  }

  const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;

  for (let d = 9; d >= 0; d--) {
    const r = maxR * ((d + 1) / 10);
    const visible = dimSmooth >= d - 0.5;
    const opacity = visible ? Math.min(1, (dimSmooth - d + 0.5) * 1.5) : 0;
    if (opacity <= 0) continue;

    const [cr, cg, cb] = hexToRgb(dims[d].color);
    const isAbove5 = d >= 5;
    const breathe = isAbove5 ? Math.sin(time * 0.8 + d * 0.5) * 0.08 : 0;
    const rActual = r * (1 + breathe);

    const baseAlpha = (dark ? 0.12 : 0.08) * opacity;
    const shadowTint = shadowFade * 0.3;
    const fillR = Math.round(cr * (1 - shadowTint) + 204 * shadowTint);
    const fillG = Math.round(cg * (1 - shadowTint) + 41 * shadowTint);
    const fillB = Math.round(cb * (1 - shadowTint) + 54 * shadowTint);

    ctx.beginPath();
    if (d < 5) {
      const sides = d + 3;
      for (let i = 0; i <= sides; i++) {
        const a = (i / sides) * Math.PI * 2 - Math.PI / 2;
        const px = cx + Math.cos(a) * rActual;
        const py = cy + Math.sin(a) * rActual;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
    } else {
      ctx.arc(cx, cy, rActual, 0, Math.PI * 2);
    }
    ctx.closePath();

    ctx.fillStyle = `rgba(${fillR},${fillG},${fillB},${baseAlpha})`;
    ctx.fill();

    ctx.strokeStyle = `rgba(${fillR},${fillG},${fillB},${(0.35 + breathe * 2) * opacity})`;
    ctx.lineWidth = d === 4 ? 2 : 0.8;
    ctx.stroke();

    if (shadowFade > 0.1 && opacity > 0.5) {
      ctx.strokeStyle = `rgba(204,41,54,${0.15 * shadowFade * opacity})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  if (dimSmooth > 4.3) {
    const inflectionR = maxR * (5 / 10);
    const pulse = Math.sin(time * 2) * 0.5 + 0.5;
    const alpha = Math.min(1, (dimSmooth - 4.3) * 1.5) * 0.15 * (0.5 + pulse * 0.5);
    ctx.beginPath();
    ctx.arc(cx, cy, inflectionR, 0, Math.PI * 2);
    const inflectionColor = shadowFade > 0.5 ? `rgba(204,41,54,${alpha})` : `rgba(45,139,70,${alpha})`;
    ctx.strokeStyle = inflectionColor;
    ctx.lineWidth = 3;
    ctx.setLineDash([4, 8]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  for (const p of particles) {
    if (dimSmooth < p.dim - 0.3) continue;
    const vis = Math.min(1, (dimSmooth - p.dim + 0.3) * 2);
    p.angle += p.speed * 0.016;
    const r = (p.rBase + p.rOff + Math.sin(time + p.phase) * 0.02) * maxR;
    const px = cx + Math.cos(p.angle) * r;
    const py = cy + Math.sin(p.angle) * r;
    const [pr, pg, pb] = hexToRgb(dims[p.dim].color);

    if (shadowMode && vis > 0.5) {
      const sx = cx + Math.cos(p.angle) * r * (1 - shadowFade * 0.15);
      const sy = cy + Math.sin(p.angle) * r * (1 - shadowFade * 0.15);
      ctx.beginPath();
      ctx.arc(sx, sy, p.size * 1.2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(204,41,54,${0.3 * vis * shadowFade})`;
      ctx.fill();
    }

    ctx.beginPath();
    ctx.arc(px, py, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${pr},${pg},${pb},${0.6 * vis})`;
    ctx.fill();
  }

  if (dimSmooth > 5.5) {
    const bridgeAlpha = Math.min(1, (dimSmooth - 5.5) * 1.5) * 0.12;
    const numBridges = Math.min(6, Math.floor(dimSmooth - 4));
    for (let i = 0; i < numBridges; i++) {
      const a1 = time * 0.15 + (i / numBridges) * Math.PI * 2;
      const a2 = a1 + Math.PI * (0.4 + Math.sin(time * 0.3 + i) * 0.2);
      const r1 = maxR * (0.2 + Math.sin(time * 0.5 + i) * 0.1);
      const r2 = maxR * (0.5 + Math.cos(time * 0.4 + i * 2) * 0.15);
      const x1 = cx + Math.cos(a1) * r1;
      const y1 = cy + Math.sin(a1) * r1;
      const x2 = cx + Math.cos(a2) * r2;
      const y2 = cy + Math.sin(a2) * r2;

      ctx.beginPath();
      ctx.moveTo(x1, y1);
      const cpx = cx + Math.cos((a1 + a2) / 2) * maxR * 0.6;
      const cpy = cy + Math.sin((a1 + a2) / 2) * maxR * 0.6;
      ctx.quadraticCurveTo(cpx, cpy, x2, y2);

      const bridgeColor = shadowFade > 0.5 ? `rgba(204,41,54,${bridgeAlpha * shadowFade})` : `rgba(232,124,46,${bridgeAlpha})`;
      ctx.strokeStyle = bridgeColor;
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }
  }

  const coreAlpha = 0.6 + Math.sin(time * 1.5) * 0.3;
  ctx.beginPath();
  ctx.arc(cx, cy, 3, 0, Math.PI * 2);
  ctx.fillStyle = shadowMode ? `rgba(204,41,54,${coreAlpha})` : `rgba(255,255,255,${coreAlpha})`;
  ctx.fill();

  const d = Math.round(dimSmooth);
  const safeD = Math.max(0, Math.min(9, d));
  if (mouseX >= 0) {
    const info = dims[safeD];
    dimLabel.textContent = shadowMode ? info.shadow : `${info.name} — ${info.sub}`;
  } else {
    dimLabel.textContent = 'Move cursor toward center to unfold dimensions';
  }

  requestAnimationFrame(draw);
}

resize();
window.addEventListener('resize', resize);
requestAnimationFrame(draw);
</script>
