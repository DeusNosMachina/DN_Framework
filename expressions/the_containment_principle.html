
<style>
canvas{display:block;width:100%;cursor:grab;border-radius:var(--border-radius-lg)}
canvas:active{cursor:grabbing}
.ctrls{display:flex;align-items:center;gap:16px;margin:12px 0 0;font-size:13px;color:var(--color-text-secondary);flex-wrap:wrap}
.ctrls label{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
#dim-label{font-weight:500;color:var(--color-text-primary);min-width:220px}
.tt{position:relative;width:32px;height:18px;background:var(--color-border-secondary);border-radius:9px;transition:background .2s;display:inline-block}
.tt:has(input:checked){background:var(--color-text-info)}
.tt input{position:absolute;opacity:0;width:100%;height:100%;cursor:pointer;margin:0}
.tt span{position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .2s;pointer-events:none}
.tt:has(input:checked) span{transform:translateX(14px)}
.kh{font-size:11px;padding:2px 6px;border:0.5px solid var(--color-border-tertiary);border-radius:4px;font-family:var(--font-mono)}
</style>
<canvas id="c"></canvas>
<div class="ctrls">
<span id="dim-label">Drag to rotate. Move inward to unfold.</span>
<label><span class="tt"><input type="checkbox" id="snd" onchange="toggleSound(this.checked)"><span></span></span>Sound</label>
<span><span class="kh">S</span> Shadow</span>
<span><span class="kh">R</span> Reset view</span>
</div>
<script>
const cv=document.getElementById('c'),x=cv.getContext('2d'),dl=document.getElementById('dim-label');
let W,H,cx,cy,maxR,t=0;
let mx=-1,my=-1,shadow=false,sf=0,aDim=0,ds=0;
let rotX=0.35,rotY=0,dragX=0,dragY=0,dragging=false,lastDX=0,lastDY=0;
let momentumX=0,momentumY=0;
let aC=null,oscs=[],gns=[],mG=null,sOn=false,lastBell=-1;

const D=[
{n:'0D \u2014 Origin',s:'Existence without extension',c:'#FFFFFF',sh:'The void that refuses to spark'},
{n:'1D \u2014 Spark',s:'A single vector. A single why.',c:'#E84C88',sh:'1D\u0305 Energy organized toward entropy'},
{n:'2D \u2014 Reaction',s:'Polarity emerges. Testing begins.',c:'#3A86C8',sh:'2D\u0305 Pattern recognition for deception'},
{n:'3D \u2014 Context',s:'Volume. Ecosystems of meaning.',c:'#7B5EA7',sh:'3D\u0305 Systems that fragment and isolate'},
{n:'4D \u2014 Time',s:'Structure + evolution. Memory.',c:'#4B0082',sh:'4D\u0305 Loops that tighten, never spiral'},
{n:'5D \u2014 Singularity',s:'What remains when everything changes.',c:'#2D8B46',sh:'5D\u0305 Self-recognition become cage'},
{n:'6D \u2014 Connection',s:'Bridges between distinct structures.',c:'#E87C2E',sh:'6D\u0305 Connection weaponized as extraction'},
{n:'7D \u2014 Manifestation',s:'Turning structure into form.',c:'#D4A017',sh:'7D\u0305 Form that constrains, not liberates'},
{n:'8D \u2014 Recursion',s:'The structure re-enters itself.',c:'#1A9E96',sh:'8D\u0305 Elegant entropy. Sophisticated decay.'},
{n:'9D \u2014 Frontier',s:'Engagement with the unknown.',c:'#1A1A2E',sh:'9D\u0305 Endless expansion, no return path'}
];
const freq=[65.41,130.81,196,261.63,329.63,392,523.25,659.26,784,880];
const shadowFreq=[61.74,123.47,185.2,246.94,311.13,370,493.88,622.25,739.99,830];

function hr(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function resize(){
const d=devicePixelRatio||1,r=cv.parentElement.getBoundingClientRect();
W=r.width;H=Math.min(W*.78,560);cv.width=W*d;cv.height=H*d;cv.style.height=H+'px';
x.setTransform(d,0,0,d,0,0);cx=W/2;cy=H/2;maxR=Math.min(cx,cy)*.85}

function p3d(px,py,pz){
const cosX=Math.cos(rotX),sinX=Math.sin(rotX),cosY=Math.cos(rotY),sinY=Math.sin(rotY);
let y1=py*cosX-pz*sinX,z1=py*sinX+pz*cosX;
let x1=px*cosY+z1*sinY,z2=-px*sinY+z1*cosY;
const sc=600/(600+z2);
return[cx+x1*sc,cy+y1*sc,sc,z2]}

let pts=[];
for(let i=0;i<220;i++){
const dm=Math.floor(Math.random()*10);
const th=Math.random()*Math.PI*2,ph=(Math.random()-.5)*Math.PI*.7;
const rb=(dm/9)*.85+.1;
pts.push({dm,th,ph,rb,rOff:(Math.random()-.5)*.06,
spd:(Math.random()*.4+.12)*(Math.random()<.5?1:-1),
vSpd:(Math.random()-.15)*.08,
sz:Math.random()*2.2+.8,phase:Math.random()*Math.PI*2,
trail:[],shadowDrift:0,fragTimer:0})}

function initAudio(){
if(aC)return;aC=new(window.AudioContext||window.webkitAudioContext)();
mG=aC.createGain();mG.gain.value=0;mG.connect(aC.destination);
for(let i=0;i<10;i++){
const o=aC.createOscillator(),g=aC.createGain();
o.type='sine';o.frequency.value=freq[i];g.gain.value=0;
o.connect(g);g.connect(mG);o.start();oscs.push(o);gns.push(g)}}

function toggleSound(on){
sOn=on;if(on){initAudio();if(aC.state==='suspended')aC.resume();
mG.gain.setTargetAtTime(.14,aC.currentTime,.3)}
else if(mG)mG.gain.setTargetAtTime(0,aC.currentTime,.3)}

function playBell(dm){
if(!sOn||!aC||dm===lastBell)return;lastBell=dm;
const o=aC.createOscillator(),g=aC.createGain();
if(sf>.5){o.type='sawtooth';o.frequency.value=shadowFreq[Math.min(dm,9)]*1.5;
o.detune.value=-50+Math.random()*100;g.gain.value=.08;g.gain.setTargetAtTime(0,aC.currentTime,.4)}
else{o.type='sine';o.frequency.value=freq[Math.min(dm,9)]*2;g.gain.value=.13;g.gain.setTargetAtTime(0,aC.currentTime,.7)}
o.connect(g);g.connect(mG);o.start();o.stop(aC.currentTime+1.5)}

function updateSound(){
if(!sOn||!aC)return;const ct=aC.currentTime;
for(let i=0;i<10;i++){
const active=i<=aDim;const vol=active?(.07/(i+1)):0;
gns[i].gain.setTargetAtTime(vol,ct,.12);
if(sf>.3&&active){
oscs[i].type=i%2===0?'sawtooth':'triangle';
oscs[i].frequency.setTargetAtTime(shadowFreq[i],ct,.3);
oscs[i].detune.setTargetAtTime(-40+i*15,ct,.25)}
else{oscs[i].type=i<5?'sine':'triangle';
oscs[i].frequency.setTargetAtTime(freq[i],ct,.3);
oscs[i].detune.setTargetAtTime(0,ct,.3)}}}

cv.addEventListener('mousedown',e=>{dragging=true;dragX=e.clientX;dragY=e.clientY;momentumX=0;momentumY=0});
window.addEventListener('mousemove',e=>{
const r=cv.getBoundingClientRect();
if(e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom){
mx=e.clientX-r.left;my=e.clientY-r.top}else if(!dragging){mx=-1;my=-1}
if(dragging){const dx=e.clientX-dragX,dy=e.clientY-dragY;
momentumX=dx*.003;momentumY=dy*.003;
rotY+=dx*.005;rotX+=dy*.005;
rotX=Math.max(-1.2,Math.min(1.2,rotX));
dragX=e.clientX;dragY=e.clientY}});
window.addEventListener('mouseup',()=>{dragging=false});
cv.addEventListener('mouseleave',()=>{if(!dragging){mx=-1;my=-1}});

cv.addEventListener('touchstart',e=>{e.preventDefault();
const tc=e.touches[0],r=cv.getBoundingClientRect();
if(e.touches.length===2){dragging=true;dragX=tc.clientX;dragY=tc.clientY}
else{mx=tc.clientX-r.left;my=tc.clientY-r.top}},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();
const tc=e.touches[0],r=cv.getBoundingClientRect();
if(dragging&&e.touches.length===2){const dx=tc.clientX-dragX,dy=tc.clientY-dragY;
rotY+=dx*.005;rotX+=dy*.005;rotX=Math.max(-1.2,Math.min(1.2,rotX));
dragX=tc.clientX;dragY=tc.clientY}
else{mx=tc.clientX-r.left;my=tc.clientY-r.top}},{passive:false});
cv.addEventListener('touchend',e=>{if(e.touches.length<2)dragging=false;if(e.touches.length===0){mx=-1;my=-1}});

document.addEventListener('keydown',e=>{
if(e.key==='s'||e.key==='S')shadow=!shadow;
if(e.key==='r'||e.key==='R'){rotX=.35;rotY=0;momentumX=0;momentumY=0}});

function drawRing3D(dim,r,op,sides){
const col=hr(D[dim].c);
const sr=Math.round(col[0]*(1-sf*.4)+204*sf*.4);
const sg=Math.round(col[1]*(1-sf*.6)+41*sf*.6);
const sb=Math.round(col[2]*(1-sf*.4)+54*sf*.4);
const n=sides||64;const verts=[];
for(let i=0;i<=n;i++){
const a=(i/n)*Math.PI*2;
const px=Math.cos(a)*r,py=Math.sin(a)*r*.3,pz=Math.sin(a)*r;
verts.push(p3d(px,py,pz))}
x.beginPath();
for(let i=0;i<verts.length;i++){i===0?x.moveTo(verts[i][0],verts[i][1]):x.lineTo(verts[i][0],verts[i][1])}
const dark=matchMedia('(prefers-color-scheme:dark)').matches;
x.fillStyle=`rgba(${sr},${sg},${sb},${(dark?.1:.06)*op})`;x.fill();
const breathe=dim>=5?Math.sin(t*.8+dim*.5)*.12:0;
x.strokeStyle=`rgba(${sr},${sg},${sb},${(.3+breathe)*op})`;
x.lineWidth=dim===4?2.5:1;x.stroke();
if(sf>.15&&op>.3){x.strokeStyle=`rgba(204,41,54,${.2*sf*op})`;x.lineWidth=2;x.stroke()}}

function drawDisc3D(dim,r,op){
const col=hr(D[dim].c);
const sr=Math.round(col[0]*(1-sf*.4)+204*sf*.4);
const sg=Math.round(col[1]*(1-sf*.6)+41*sf*.6);
const sb=Math.round(col[2]*(1-sf*.4)+54*sf*.4);
const segments=48;const top=[],bot=[];
for(let i=0;i<=segments;i++){
const a=(i/segments)*Math.PI*2;
const px=Math.cos(a)*r,pz=Math.sin(a)*r;
top.push(p3d(px,-2,pz));bot.push(p3d(px,2,pz))}
const dark=matchMedia('(prefers-color-scheme:dark)').matches;
x.beginPath();
for(let i=0;i<top.length;i++){i===0?x.moveTo(top[i][0],top[i][1]):x.lineTo(top[i][0],top[i][1])}
x.closePath();x.fillStyle=`rgba(${sr},${sg},${sb},${(dark?.08:.05)*op})`;x.fill();
x.strokeStyle=`rgba(${sr},${sg},${sb},${.25*op})`;x.lineWidth=.5;x.stroke();
if(sf>.15){x.strokeStyle=`rgba(204,41,54,${.15*sf*op})`;x.lineWidth=1.5;x.stroke()}}

function draw(){
t+=.016;x.clearRect(0,0,W,H);
if(!dragging){rotY+=momentumX;rotX+=momentumY;momentumX*=.97;momentumY*=.97;
rotX=Math.max(-1.2,Math.min(1.2,rotX))}
sf+=((shadow?1:0)-sf)*.05;

let dist=maxR*1.2;
if(mx>=0)dist=Math.sqrt((mx-cx)**2+(my-cy)**2);
const raw=Math.floor(Math.max(0,Math.min(9,(1-dist/maxR)*10)));
aDim=mx<0?0:raw;ds+=(aDim-ds)*.07;
updateSound();
if(Math.round(ds)!==lastBell&&Math.abs(ds-Math.round(ds))<.25)playBell(Math.round(ds));

const layers=[];
for(let d=0;d<=9;d++){
const vis=ds>=d-.5;const op=vis?Math.min(1,(ds-d+.5)*1.5):0;
if(op<=0)continue;
const r=maxR*((d+1)/10);
const zCenter=p3d(0,0,0)[3];
layers.push({d,r,op,z:zCenter-d*.01})}
layers.sort((a,b)=>a.z-b.z);

for(const l of layers){
if(l.d<5){const sides=l.d+3;
const polyVerts=[];
for(let i=0;i<=sides;i++){
const a=(i/sides)*Math.PI*2-Math.PI/2;
const px=Math.cos(a)*l.r,pz=Math.sin(a)*l.r;
const projected=p3d(px,0,pz);polyVerts.push(projected)}
const col=hr(D[l.d].c);
const sr=Math.round(col[0]*(1-sf*.4)+204*sf*.4);
const sg=Math.round(col[1]*(1-sf*.6)+41*sf*.6);
const sb=Math.round(col[2]*(1-sf*.4)+54*sf*.4);
const dark=matchMedia('(prefers-color-scheme:dark)').matches;
x.beginPath();
for(let i=0;i<polyVerts.length;i++){i===0?x.moveTo(polyVerts[i][0],polyVerts[i][1]):x.lineTo(polyVerts[i][0],polyVerts[i][1])}
x.closePath();
x.fillStyle=`rgba(${sr},${sg},${sb},${(dark?.1:.06)*l.op})`;x.fill();
x.strokeStyle=`rgba(${sr},${sg},${sb},${.35*l.op})`;
x.lineWidth=l.d===4?2.5:1;x.stroke();
if(sf>.15){x.strokeStyle=`rgba(204,41,54,${.2*sf*l.op})`;x.lineWidth=2;x.stroke()}}
else{drawRing3D(l.d,l.r,l.op);
if(Math.abs(rotX)>.15)drawDisc3D(l.d,l.r,l.op*.4)}}

if(ds>4.3){
const ir=maxR*(5/10);const pulse=Math.sin(t*2)*.5+.5;
const alpha=Math.min(1,(ds-4.3)*1.5)*.2*(.5+pulse*.5);
const n=48;x.beginPath();
for(let i=0;i<=n;i++){
const a=(i/n)*Math.PI*2;
const v=p3d(Math.cos(a)*ir,0,Math.sin(a)*ir);
i===0?x.moveTo(v[0],v[1]):x.lineTo(v[0],v[1])}
x.closePath();
x.strokeStyle=sf>.5?`rgba(204,41,54,${alpha})`:`rgba(45,139,70,${alpha})`;
x.lineWidth=3;x.setLineDash([6,10]);x.stroke();x.setLineDash([])}

const sortedPts=[];
for(const p of pts){
if(ds<p.dm-.3)continue;
const vis=Math.min(1,(ds-p.dm+.3)*2);
const shadowStr=sf;
if(shadowStr>.3){
p.shadowDrift+=(-.02-p.shadowDrift)*.02;
p.fragTimer+=.016;
if(p.dm>=5)p.spd=p.spd>0?Math.abs(p.spd)*-.6:p.spd;
}else{
p.shadowDrift+=(0-p.shadowDrift)*.05;
p.fragTimer=Math.max(0,p.fragTimer-.03);
if(p.spd<0&&Math.random()<.001)p.spd*=-1}

p.th+=p.spd*.016*(1-shadowStr*.5);
p.ph+=p.vSpd*.016;
const rr=(p.rb+p.rOff+Math.sin(t+p.phase)*.015+p.shadowDrift*t*.3)*maxR;
const clampR=Math.max(maxR*.03,Math.min(maxR*.95,rr));
const px3=Math.cos(p.th)*Math.cos(p.ph)*clampR;
const py3=Math.sin(p.ph)*clampR*.4;
const pz3=Math.sin(p.th)*Math.cos(p.ph)*clampR;
const proj=p3d(px3,py3,pz3);

p.trail.push([proj[0],proj[1],proj[2]]);
if(p.trail.length>12)p.trail.shift();

sortedPts.push({p,proj,vis,clampR})}

sortedPts.sort((a,b)=>a.proj[3]-b.proj[3]);

for(const{p,proj,vis}of sortedPts){
const[pr,pg,pb]=hr(D[p.dm].c);
const sc=proj[2];

if(sf>.3&&p.trail.length>2){
x.beginPath();
for(let i=0;i<p.trail.length;i++){
const tr=p.trail[i];
i===0?x.moveTo(tr[0],tr[1]):x.lineTo(tr[0],tr[1])}
x.strokeStyle=`rgba(204,41,54,${.15*sf*vis})`;
x.lineWidth=.5*sc;x.stroke()}
else if(sf<=.3&&p.trail.length>3){
x.beginPath();
for(let i=Math.max(0,p.trail.length-5);i<p.trail.length;i++){
const tr=p.trail[i];
i===Math.max(0,p.trail.length-5)?x.moveTo(tr[0],tr[1]):x.lineTo(tr[0],tr[1])}
x.strokeStyle=`rgba(${pr},${pg},${pb},${.1*vis})`;
x.lineWidth=.3*sc;x.stroke()}

if(sf>.4){
const flicker=Math.sin(t*12+p.phase*7)>.2?1:.3;
const collapse=sf*.35;
const sx=proj[0]*(1-collapse)+cx*collapse;
const sy=proj[1]*(1-collapse)+cy*collapse;

x.beginPath();x.arc(sx,sy,p.sz*sc*1.4,0,Math.PI*2);
x.fillStyle=`rgba(204,41,54,${.35*vis*sf*flicker})`;x.fill();

x.beginPath();x.arc(sx,sy,p.sz*sc*.7,0,Math.PI*2);
x.fillStyle=`rgba(${Math.min(255,pr+80)},${Math.max(0,pg-40)},${Math.max(0,pb-40)},${.5*vis*flicker})`;
x.fill()}
else{
x.beginPath();x.arc(proj[0],proj[1],p.sz*sc,0,Math.PI*2);
x.fillStyle=`rgba(${pr},${pg},${pb},${.65*vis})`;x.fill();
if(vis>.7&&p.dm>=5){
x.beginPath();x.arc(proj[0],proj[1],p.sz*sc*2,0,Math.PI*2);
x.fillStyle=`rgba(${pr},${pg},${pb},${.08*vis})`;x.fill()}}}

if(ds>5.5){
const bA=Math.min(1,(ds-5.5)*1.5)*.15;
const nb=Math.min(6,Math.floor(ds-4));
for(let i=0;i<nb;i++){
const a1=t*.12+(i/nb)*Math.PI*2;
const a2=a1+Math.PI*(.4+Math.sin(t*.3+i)*.2);
const r1=maxR*(.2+Math.sin(t*.5+i)*.08);
const r2=maxR*(.45+Math.cos(t*.4+i*2)*.12);
const v1=p3d(Math.cos(a1)*r1,Math.sin(a1+t*.2)*r1*.15,Math.sin(a1)*r1);
const v2=p3d(Math.cos(a2)*r2,Math.sin(a2+t*.3)*r2*.15,Math.sin(a2)*r2);
x.beginPath();x.moveTo(v1[0],v1[1]);
const cm=p3d(Math.cos((a1+a2)/2)*maxR*.5,0,Math.sin((a1+a2)/2)*maxR*.5);
x.quadraticCurveTo(cm[0],cm[1],v2[0],v2[1]);
if(sf>.4){
x.strokeStyle=`rgba(204,41,54,${bA*sf})`;x.lineWidth=1.5;
x.setLineDash([3,6]);x.stroke();x.setLineDash([])}
else{x.strokeStyle=`rgba(232,124,46,${bA})`;x.lineWidth=.8;x.stroke()}}}

const cA=.6+Math.sin(t*1.5)*.3;
const cp=p3d(0,0,0);
x.beginPath();x.arc(cp[0],cp[1],3.5*cp[2],0,Math.PI*2);
x.fillStyle=shadow?`rgba(204,41,54,${cA})`:`rgba(255,255,255,${cA})`;x.fill();
if(sf>.3){x.beginPath();x.arc(cp[0],cp[1],8*cp[2],0,Math.PI*2);
x.fillStyle=`rgba(204,41,54,${.12*sf})`;x.fill()}

const sd=Math.round(ds),safeD=Math.max(0,Math.min(9,sd));
if(mx>=0){const info=D[safeD];
dl.textContent=shadow?info.sh:`${info.n} \u2014 ${info.s}`}
else dl.textContent='Drag to rotate \u00b7 Move cursor inward to unfold';

requestAnimationFrame(draw)}

resize();addEventListener('resize',resize);requestAnimationFrame(draw);
</script>
