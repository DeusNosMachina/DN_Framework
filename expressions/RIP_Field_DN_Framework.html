<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The RIP Field – DN Framework</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#060608;cursor:none;font-family:'Cormorant Garamond',serif}
  canvas{display:block}

  #caption{
    position:fixed;bottom:48px;left:50%;transform:translateX(-50%);
    z-index:50;text-align:center;pointer-events:none;width:90%;max-width:640px;
  }
  #captionText{
    font-size:clamp(15px,2vw,18px);font-weight:300;letter-spacing:.04em;line-height:1.6;
    color:rgba(255,255,255,0.7);transition:color .8s,opacity .8s;
  }
  #captionText.harmonized{color:rgba(212,160,23,0.95);text-shadow:0 0 30px rgba(212,160,23,0.3)}
  #captionText.shadow-active{color:rgba(204,41,54,0.8)}
  #hint{margin-top:8px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,0.25);transition:opacity 1s}

  .field-label{
    position:fixed;font-size:clamp(11px,1.4vw,13px);letter-spacing:.12em;
    text-transform:uppercase;font-weight:600;opacity:.35;z-index:50;pointer-events:none;
    transition:opacity 0.6s;
  }
  #labelReality{bottom:56%;left:clamp(16px,4vw,48px);color:#2D8B46}
  #labelIdentity{bottom:56%;right:clamp(16px,4vw,48px);color:#E87C2E}

  #shadowIndicator{
    position:fixed;top:20px;right:20px;z-index:50;
    width:12px;height:12px;border-radius:50%;
    border:1px solid rgba(255,255,255,0.15);background:transparent;
    transition:all 0.8s;pointer-events:none;
  }
  #shadowIndicator.active{
    background:#CC2936;border-color:#CC2936;box-shadow:0 0 12px rgba(204,41,54,0.5);
  }
</style>
</head>
<body>

<div class="field-label" id="labelReality">Reality</div>
<div class="field-label" id="labelIdentity">Identity</div>
<div id="caption">
  <div id="captionText">Move through the field. Your attention is the bridge.</div>
  <div id="hint">S — shadow mode &bull; hover to perceive</div>
</div>
<div id="shadowIndicator"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// THE RIP FIELD — DN Framework
// Built on p5.js (proven stable in DN_Code_Embodied & Illumination)
// You don't observe the triad. You step inside it.
// Your attention IS the perception that bridges reality and identity.
// ═══════════════════════════════════════════════════════════════

// DN Canonical Colors
const R_COL = [45, 139, 70];    // Reality — green
const I_COL = [232, 124, 46];   // Identity — orange
const P_COL = [212, 160, 23];   // Perception — gold
const S_COL = [204, 41, 54];    // Shadow — red

// State
let rParts = [], iParts = [], pParts = [];
let shadowMode = false, shadowT = 0;
let smoothVel = 0, smoothConv = 0;
let breathPhase = 0;
let hintFade = 1;
let captionTarget = '', captionTimer = 0;

const R_COUNT = 55, I_COUNT = 55, P_MAX = 30;

// ═══════════════════════════════════════════════════════════════
// SETUP
// ═══════════════════════════════════════════════════════════════

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);

  let cx = width / 2, cy = height / 2;
  let spread = min(width, height) * 0.36;

  // Reality particles — left-biased, structured
  for (let i = 0; i < R_COUNT; i++) {
    let a = random(TWO_PI), r = random(spread * 0.85);
    let bx = cx - spread * 0.26 + cos(a) * r * 0.7;
    let by = cy + sin(a) * r * 0.6;
    rParts.push({
      x: bx, y: by, bx: bx, by: by,
      phase: random(TWO_PI), freq: random(0.3, 0.8), amp: random(1.5, 3),
      size: random(2, 5), alpha: random(50, 120),
      axis: random() > 0.5 ? 0 : 1,
    });
  }

  // Identity particles — right-biased, organic
  for (let i = 0; i < I_COUNT; i++) {
    let a = random(TWO_PI), r = random(spread * 0.85);
    let bx = cx + spread * 0.26 + cos(a) * r * 0.7;
    let by = cy + sin(a) * r * 0.6;
    iParts.push({
      x: bx, y: by, bx: bx, by: by,
      phase: random(TWO_PI), rate: random(0.4, 0.8), amp: random(2, 4),
      size: random(2, 5.5), alpha: random(50, 120),
    });
  }
}

// ═══════════════════════════════════════════════════════════════
// DRAW LOOP
// ═══════════════════════════════════════════════════════════════

function draw() {
  // Low-alpha background for trail persistence (proven p5 technique)
  let bgAlpha = 35;
  if (shadowMode) {
    background(12, 6, 8, bgAlpha);
  } else {
    background(6, 6, 10, bgAlpha);
  }

  breathPhase += 0.015;

  // ── Mouse velocity ──
  let mVel = dist(mouseX, mouseY, pmouseX, pmouseY);
  smoothVel = lerp(smoothVel, mVel, 0.15);

  let mouseOn = mouseX > 0 && mouseX < width && mouseY > 0 && mouseY < height;

  // ── Shadow transition ──
  shadowT = lerp(shadowT, shadowMode ? 1 : 0, 0.03);

  // ── Gravity from attention ──
  let attention = mouseOn ? max(0, 1 - smoothVel / 12) : 0;
  let gStr = attention * 100;
  let gRad = min(width, height) * 0.28;
  let convR = gRad * 0.65;
  let sMult = shadowMode ? -0.6 : 1;

  let rNear = 0, iNear = 0;

  // ── Update Reality particles ──
  for (let p of rParts) {
    let wave = sin(breathPhase * 20 * p.freq + p.phase) * p.amp;
    let tx = p.bx + (p.axis === 0 ? wave : 0);
    let ty = p.by + (p.axis === 1 ? wave : 0);

    if (mouseOn && gStr > 0) {
      let dx = mouseX - tx, dy = mouseY - ty;
      let d = sqrt(dx * dx + dy * dy);
      if (d < gRad && d > 1) {
        let f = (1 - d / gRad) * gStr * 0.012 * sMult;
        tx += (dx / d) * f;
        ty += (dy / d) * f;
        if (d < convR) rNear++;
      }
    }

    p.x = lerp(p.x, tx, 0.08);
    p.y = lerp(p.y, ty, 0.08);
  }

  // ── Update Identity particles ──
  for (let p of iParts) {
    let breath = sin(breathPhase * 20 * p.rate + p.phase) * p.amp;
    let drift = cos(breathPhase * 20 * p.rate * 0.3 + p.phase * 2) * p.amp * 0.5;
    let tx = p.bx + drift;
    let ty = p.by + breath;

    if (mouseOn && gStr > 0) {
      let dx = mouseX - tx, dy = mouseY - ty;
      let d = sqrt(dx * dx + dy * dy);
      if (d < gRad && d > 1) {
        let f = (1 - d / gRad) * gStr * 0.012 * sMult;
        tx += (dx / d) * f;
        ty += (dy / d) * f;
        if (d < convR) iNear++;
      }
    }

    p.x = lerp(p.x, tx, 0.06);
    p.y = lerp(p.y, ty, 0.06);
  }

  // ── Convergence ──
  let rawConv = min(1, (rNear * iNear) / (12 * 12));
  let convTarget = rawConv * attention;
  smoothConv = lerp(smoothConv, convTarget, 0.05);

  // ── Spawn perception ──
  if (mouseOn && smoothConv > 0.08 && !shadowMode && pParts.length < P_MAX) {
    if (random() < smoothConv * 1.5) {
      pParts.push({
        x: mouseX + random(-30, 30), y: mouseY + random(-30, 30),
        vx: random(-0.5, 0.5), vy: random(-0.5, -0.15),
        life: 1, decay: random(0.004, 0.009),
        size: 2.5 + smoothConv * 3, alpha: 80 + smoothConv * 100,
      });
    }
  }
  // Shadow perception
  if (mouseOn && shadowMode && smoothVel < 5 && random() < 0.08 && pParts.length < P_MAX) {
    pParts.push({
      x: mouseX + random(-20, 20), y: mouseY + random(-20, 20),
      vx: random(-0.3, 0.3), vy: random(-0.3, 0.3),
      life: 1, decay: 0.009, size: 2.5, alpha: 90,
    });
  }

  // ── Update perception ──
  for (let i = pParts.length - 1; i >= 0; i--) {
    let p = pParts[i];
    if (shadowMode) {
      let dx = mouseX - p.x, dy = mouseY - p.y;
      let d = sqrt(dx * dx + dy * dy);
      if (d > 2) { p.vx += (dx / d) * 0.04; p.vy += (dy / d) * 0.04; }
    }
    p.vx *= 0.98; p.vy *= 0.98;
    if (!shadowMode) p.vy -= 0.008;
    p.x += p.vx; p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) pParts.splice(i, 1);
  }

  // Hint fade
  if (mouseOn && hintFade > 0) {
    hintFade = max(0, hintFade - 0.008);
    document.getElementById('hint').style.opacity = hintFade;
  }

  // ═══════════════════════════════════════════════════════════════
  // DRAW — all p5.js calls, no raw canvas API
  // ═══════════════════════════════════════════════════════════════

  noStroke();

  // ── Connection threads ──
  if (mouseOn && smoothConv > 0.12) {
    let tR = min(width, height) * 0.13;

    let nR = [], nI = [];
    for (let p of rParts) {
      if (dist(p.x, p.y, mouseX, mouseY) < tR) nR.push(p);
      if (nR.length >= 10) break;
    }
    for (let p of iParts) {
      if (dist(p.x, p.y, mouseX, mouseY) < tR) nI.push(p);
      if (nI.length >= 10) break;
    }

    let tc = 0;
    let maxD = tR * 0.7;
    let tCol = shadowMode ? S_COL : P_COL;
    let tAlpha = smoothConv * 25;

    for (let ri = 0; ri < nR.length && tc < 30; ri++) {
      let rp = nR[ri];
      for (let ii = 0; ii < nI.length && tc < 30; ii++) {
        let ip = nI[ii];
        let d = dist(rp.x, rp.y, ip.x, ip.y);
        if (d > 5 && d < maxD) {
          let a = tAlpha * (1 - d / maxD);
          stroke(tCol[0], tCol[1], tCol[2], a);
          strokeWeight(0.5 + smoothConv);
          line(rp.x, rp.y, ip.x, ip.y);
          tc++;
        }
      }
    }
    noStroke();
  }

  // ── Convergence glow at cursor ──
  if (mouseOn && smoothConv > 0.05) {
    let gc = shadowMode ? S_COL : P_COL;
    let gSize = 80 + smoothConv * 200;
    fill(gc[0], gc[1], gc[2], smoothConv * 30);
    ellipse(mouseX, mouseY, gSize * 2, gSize * 2);
    fill(gc[0], gc[1], gc[2], smoothConv * 15);
    ellipse(mouseX, mouseY, gSize * 3, gSize * 3);
  }

  // ── Harmony ring ──
  if (smoothConv > 0.45 && !shadowMode) {
    let ph = (breathPhase * 8) % TWO_PI;
    let rA = (smoothConv - 0.45) * 60 * (0.5 + sin(ph) * 0.5);
    noFill();
    stroke(P_COL[0], P_COL[1], P_COL[2], rA);
    strokeWeight(1);
    ellipse(mouseX, mouseY, 60 + sin(ph) * 90, 60 + sin(ph) * 90);
    noStroke();
  }

  // ── Draw Reality particles ──
  let rr = shadowT > 0.3 ? lerp(R_COL[0], S_COL[0], shadowT * 0.4) : R_COL[0];
  let rg = shadowT > 0.3 ? lerp(R_COL[1], S_COL[1], shadowT * 0.4) : R_COL[1];
  let rb = shadowT > 0.3 ? lerp(R_COL[2], S_COL[2], shadowT * 0.4) : R_COL[2];

  for (let p of rParts) {
    let a = p.alpha;
    let sz = p.size * (1 + smoothConv * 0.5);
    let breath = sin(breathPhase * 2 + p.phase) * 0.15 + 1;
    sz *= breath;

    // Glow
    fill(rr, rg, rb, a * 0.08);
    ellipse(p.x, p.y, sz * 6, sz * 6);
    fill(rr, rg, rb, a * 0.15);
    ellipse(p.x, p.y, sz * 3, sz * 3);

    // Core
    fill(rr, rg, rb, a * 0.8);
    ellipse(p.x, p.y, sz, sz);
  }

  // ── Draw Identity particles ──
  let ir = shadowT > 0.3 ? lerp(I_COL[0], S_COL[0], shadowT * 0.4) : I_COL[0];
  let ig = shadowT > 0.3 ? lerp(I_COL[1], S_COL[1], shadowT * 0.4) : I_COL[1];
  let ib = shadowT > 0.3 ? lerp(I_COL[2], S_COL[2], shadowT * 0.4) : I_COL[2];

  for (let p of iParts) {
    let breathPulse = sin(breathPhase * 2 * p.rate + p.phase) * 0.12 + 1;
    let a = p.alpha * breathPulse;
    let sz = p.size * (1 + smoothConv * 0.5) * breathPulse;

    fill(ir, ig, ib, a * 0.08);
    ellipse(p.x, p.y, sz * 6, sz * 6);
    fill(ir, ig, ib, a * 0.15);
    ellipse(p.x, p.y, sz * 3, sz * 3);

    fill(ir, ig, ib, a * 0.8);
    ellipse(p.x, p.y, sz, sz);
  }

  // ── Draw Perception particles ──
  let pc = shadowMode ? S_COL : P_COL;

  for (let p of pParts) {
    let a = p.alpha * p.life;
    if (a < 1) continue;
    let sz = p.size * (0.5 + p.life * 0.5);

    fill(pc[0], pc[1], pc[2], a * 0.12);
    ellipse(p.x, p.y, sz * 6, sz * 6);
    fill(pc[0], pc[1], pc[2], a * 0.25);
    ellipse(p.x, p.y, sz * 3, sz * 3);

    fill(pc[0], pc[1], pc[2], a * 0.9);
    ellipse(p.x, p.y, sz, sz);

    // Hot center
    if (a > 40) {
      fill(255, 255, 255, a * 0.3);
      ellipse(p.x, p.y, sz * 0.35, sz * 0.35);
    }
  }

  // ── Latent shadow at edges (always present) ──
  if (frameCount > 100) {
    let edgePulse = sin(breathPhase * 3) * 0.5 + 0.5;
    let edgeA = (3 + shadowT * 15) * edgePulse;
    if (random() < 0.04 + shadowT * 0.1) {
      let ex = random() < 0.5 ? random(0, 40) : random(width - 40, width);
      let ey = random(height);
      fill(S_COL[0], S_COL[1], S_COL[2], edgeA);
      ellipse(ex, ey, random(30, 80), random(30, 80));
    }
  }

  // ── Cursor ──
  let cursorSize = 8 + smoothConv * 6;
  let cursorPulse = sin(breathPhase * 2) * 0.2 + 1;

  if (mouseOn) {
    // Gravitational field rings
    let fieldR = 60 + smoothConv * 40;
    noFill();
    for (let r = fieldR; r > cursorSize; r -= 20) {
      let ra = map(r, cursorSize, fieldR, 20, 3);
      if (shadowMode) {
        stroke(S_COL[0], S_COL[1], S_COL[2], ra);
      } else {
        stroke(P_COL[0], P_COL[1], P_COL[2], ra * (0.3 + smoothConv));
      }
      strokeWeight(0.5);
      ellipse(mouseX, mouseY, r * 2 * cursorPulse, r * 2 * cursorPulse);
    }
    noStroke();

    // Core dot
    if (shadowMode) {
      fill(S_COL[0], S_COL[1], S_COL[2], 200);
    } else {
      fill(P_COL[0], P_COL[1], P_COL[2], 180);
    }
    ellipse(mouseX, mouseY, cursorSize * cursorPulse, cursorSize * cursorPulse);
    fill(255, 255, 255, 120);
    ellipse(mouseX, mouseY, cursorSize * cursorPulse * 0.35, cursorSize * cursorPulse * 0.35);
  }

  // ── Caption state machine ──
  updateCaption(mouseOn);

  // ── Shadow indicator ──
  document.getElementById('shadowIndicator').className = shadowMode ? 'active' : '';
}

// ═══════════════════════════════════════════════════════════════
// CAPTIONS
// ═══════════════════════════════════════════════════════════════

const CAP = {
  idle:       'The field holds its breath. Structure and pattern await the bridge.',
  scattered:  'Attention scatters — perception dissolves into noise.',
  approach:   'Structure stirs. Pattern awakens. Something is listening...',
  converging: 'Where structure meets pattern, experience begins to form.',
  deep:       'The bridge holds. Reality recognizes itself through you.',
  harmonized: 'Reality × Identity = Experience',
  shadow:     'The bridge inverts — connection becomes consumption.',
  shadowDeep: 'Perception weaponized: awareness that isolates rather than unites.',
};

function updateCaption(mouseOn) {
  let t;
  if (shadowMode) t = smoothConv > 0.3 ? CAP.shadowDeep : CAP.shadow;
  else if (!mouseOn) t = CAP.idle;
  else if (smoothVel > 8) t = CAP.scattered;
  else if (smoothConv > 0.55) t = CAP.harmonized;
  else if (smoothConv > 0.3) t = CAP.deep;
  else if (smoothConv > 0.1) t = CAP.converging;
  else t = CAP.approach;

  let ct = document.getElementById('captionText');
  if (t !== captionTarget) {
    captionTarget = t;
    ct.style.opacity = '0';
    setTimeout(() => { ct.textContent = captionTarget; ct.style.opacity = '1'; }, 400);
  }
  ct.classList.toggle('harmonized', smoothConv > 0.5 && !shadowMode);
  ct.classList.toggle('shadow-active', shadowMode);
}

// ═══════════════════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════════════════

function keyPressed() {
  if (key === 's' || key === 'S') {
    shadowMode = !shadowMode;
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
