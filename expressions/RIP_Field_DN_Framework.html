<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The RIP Field – DN Framework</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#060608;cursor:none;font-family:'Cormorant Garamond',serif}
  canvas{display:block}
  #caption{position:fixed;bottom:44px;left:50%;transform:translateX(-50%);z-index:50;text-align:center;pointer-events:none;width:90%;max-width:560px}
  #captionText{font-size:clamp(14px,1.8vw,17px);font-weight:300;letter-spacing:.04em;line-height:1.6;color:rgba(255,255,255,0.6);transition:color .8s,opacity .8s}
  #captionText.harmonized{color:rgba(212,160,23,0.85);text-shadow:0 0 20px rgba(212,160,23,0.15)}
  #captionText.shadow-active{color:rgba(204,41,54,0.7)}
  #hotkey{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:50;pointer-events:none;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(204,41,54,0.22)}
  #shadowIndicator{position:fixed;top:16px;right:16px;z-index:50;width:9px;height:9px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);background:transparent;transition:all 0.8s;pointer-events:none}
  #shadowIndicator.active{background:#CC2936;border-color:#CC2936;box-shadow:0 0 12px rgba(204,41,54,0.5)}
</style>
</head>
<body>
<div id="caption"><div id="captionText">Reality × Identity = Experience</div></div>
<div id="hotkey">S — shadow &nbsp;&bull;&nbsp; click — attune</div>
<div id="shadowIndicator"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// THE RIP FIELD — DN Framework v5
// Zoomed in. Brighter field. Super-structures from sustained attention.
// Inter-cluster linking. Labels inside the field.
// ═══════════════════════════════════════════════════════════════

const R_COL = [45,139,70], I_COL = [232,124,46], P_COL = [212,160,23], S_COL = [204,41,54];

let particles = [];
let bonds = [];
let signals = [];
let interClusterLinks = []; // links between cluster centroids

let shadowMode = false, shadowT = 0;
let smoothVel = 0, smoothConv = 0, breathPhase = 0;
let cumulativeEnergy = 0, exciteLevel = 0;
let clickPulse = 0;
let captionTarget = 'Reality × Identity = Experience', captionHoldTimer = 0;
const CAPTION_HOLD = 150;

const R_COUNT = 70, I_COUNT = 70;
const MAX_DRIFT = 70;
const SPRING_K = 0.0007;
const DAMPING = 0.91;
const BOND_DIST = 42;
const BOND_STRONG_TIME = 60;

// Field geometry — computed in setup
let fieldCx, fieldCy, fieldScale;

// ═══════════════════════════════════════════════════════════════
function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  layoutField();
}

function layoutField() {
  // Zoomed: field occupies ~70% of the shorter dimension
  fieldCx = width / 2;
  fieldCy = height / 2;
  fieldScale = min(width, height) * 0.35;

  particles = [];
  bonds = []; signals = []; interClusterLinks = [];

  let rCenter = fieldCx - fieldScale * 0.32;
  let iCenter = fieldCx + fieldScale * 0.32;
  let fieldW = fieldScale * 0.7;
  let fieldH = fieldScale * 1.1;

  for (let i = 0; i < R_COUNT; i++) {
    let a = random(TWO_PI), r = random(1) * random(1); // cluster toward center
    let hx = rCenter + cos(a) * r * fieldW;
    let hy = fieldCy + sin(a) * r * fieldH;
    particles.push(makeP(hx, hy, 'r', i));
  }
  for (let i = 0; i < I_COUNT; i++) {
    let a = random(TWO_PI), r = random(1) * random(1);
    let hx = iCenter + cos(a) * r * fieldW;
    let hy = fieldCy + sin(a) * r * fieldH;
    particles.push(makeP(hx, hy, 'i', i));
  }
}

function makeP(hx, hy, type, idx) {
  return {
    type, id: type+idx,
    hx, hy, x: hx, y: hy, vx: 0, vy: 0,
    phase: random(TWO_PI),
    wobX: random(0.4,1.2), wobY: random(0.4,1.2),
    wobAmp: random(0.8, 2.5),
    size: random(2, 4.5),
    baseAlpha: random(40, 70),
    illum: 0, tIllum: 0,
  };
}

// ═══════════════════════════════════════════════════════════════
function draw() {
  background(6, 6, 10, 24);
  breathPhase += 0.015;

  let mVel = dist(mouseX, mouseY, pmouseX, pmouseY);
  smoothVel = lerp(smoothVel, mVel, 0.12);
  let mouseOn = mouseX > 0 && mouseX < width && mouseY > 0 && mouseY < height;
  shadowT = lerp(shadowT, shadowMode ? 1 : 0, 0.03);
  if (mouseOn && mVel > 1) cumulativeEnergy += mVel * 0.02;
  exciteLevel = lerp(exciteLevel, constrain(cumulativeEnergy/4000, 0, 1), 0.006);
  if (clickPulse > 0) clickPulse--;

  let attention = mouseOn ? max(0, 1 - smoothVel/16) : 0;
  let clickBoost = clickPulse > 0 ? 3*(clickPulse/25) : 0;
  let gRad = fieldScale * (0.45 + clickBoost * 0.15);
  let gStr = (attention * 0.15 + clickBoost * 0.4) * (shadowMode ? -1 : 1);

  // Wider illumination beam — field should feel visible
  let beam = fieldScale * 1.2;
  let ambient = 0.28 + exciteLevel * 0.1;

  let rNear = 0, iNear = 0;
  let convR = gRad * 0.7;

  // ── Physics ──
  for (let p of particles) {
    let wobX = sin(breathPhase*20*p.wobX*0.05 + p.phase) * p.wobAmp;
    let wobY = cos(breathPhase*20*p.wobY*0.04 + p.phase*1.3) * p.wobAmp;

    // Spring to home + wobble
    let dhx = (p.hx + wobX) - p.x;
    let dhy = (p.hy + wobY) - p.y;

    // Bonded particles have weaker spring (they want to stay where bonds are)
    let bondedCount = 0;
    for (let b of bonds) {
      if ((b.aid === p.id || b.bid === p.id) && b.strength > 0.3) bondedCount++;
    }
    let springMult = bondedCount > 0 ? 0.3 : 1; // bonded = weaker spring home

    p.vx += dhx * SPRING_K * springMult;
    p.vy += dhy * SPRING_K * springMult;

    // Cursor gravity
    if (mouseOn) {
      let dx = mouseX - p.x, dy = mouseY - p.y;
      let d = sqrt(dx*dx + dy*dy);
      if (d < gRad && d > 2) {
        let f = (1 - d/gRad) * gStr;
        p.vx += (dx/d)*f;
        p.vy += (dy/d)*f;
      }
      if (d < convR) {
        if (p.type==='r') rNear++; else iNear++;
      }
    }

    p.vx *= DAMPING; p.vy *= DAMPING;
    p.x += p.vx; p.y += p.vy;

    // Drift limit
    let dHome = dist(p.x, p.y, p.hx, p.hy);
    if (dHome > MAX_DRIFT) {
      let s = MAX_DRIFT/dHome;
      p.x = p.hx + (p.x-p.hx)*s;
      p.y = p.hy + (p.y-p.hy)*s;
      p.vx *= 0.5; p.vy *= 0.5;
    }

    // Illumination
    let dM = mouseOn ? dist(p.x, p.y, mouseX, mouseY) : 9999;
    if (dM < beam) {
      p.tIllum = pow(1 - dM/beam, 0.5) * 0.75 + ambient;
    } else {
      p.tIllum = ambient;
    }
    if (shadowMode && dM < beam*0.3) {
      p.tIllum = lerp(p.tIllum, ambient*0.15, shadowT*(1-dM/(beam*0.3)));
    }
    p.illum = lerp(p.illum, p.tIllum, 0.08);
  }

  smoothConv = lerp(smoothConv, min(1, (rNear*iNear)/(8*8)) * attention, 0.04);

  // ═══════════════════════════════════════════════════════════════
  // BONDING
  // ═══════════════════════════════════════════════════════════════
  let bondRange = BOND_DIST + exciteLevel * 12;

  for (let p of particles) {
    if (p.type !== 'r' || p.illum < 0.3) continue;
    for (let q of particles) {
      if (q.type !== 'i' || q.illum < 0.3) continue;
      let d = dist(p.x, p.y, q.x, q.y);
      if (d > bondRange || d < 2) continue;

      let ex = bonds.find(b => b.aid===p.id && b.bid===q.id);
      if (ex) {
        ex.strength = min(1, ex.strength + attention * 0.012);
        ex.life = min(1, ex.life + 0.008);
        ex.age++;
      } else if (bonds.length < 150) {
        bonds.push({
          a:p, b:q, aid:p.id, bid:q.id,
          strength: 0.08*(1 - d/bondRange),
          life: 0.6, age: 0,
        });
        if (random() < 0.15) spawnSignal((p.x+q.x)/2, (p.y+q.y)/2, 0.4);
      }
    }
  }

  // Cluster detection
  detectClusters();

  // ── Inter-cluster linking ──
  // Find cluster centroids and link nearby ones
  interClusterLinks = [];
  let clusterMap = {};
  for (let b of bonds) {
    let cid = b._clusterId;
    if (cid === undefined) continue;
    if (!clusterMap[cid]) clusterMap[cid] = { sx:0, sy:0, n:0, size: b._clusterSize, maxStr: 0 };
    let mx = (b.a.x+b.b.x)/2, my = (b.a.y+b.b.y)/2;
    clusterMap[cid].sx += mx;
    clusterMap[cid].sy += my;
    clusterMap[cid].n++;
    clusterMap[cid].maxStr = max(clusterMap[cid].maxStr, b.strength);
  }
  let centroids = [];
  for (let cid in clusterMap) {
    let c = clusterMap[cid];
    if (c.size >= 2) {
      centroids.push({ x: c.sx/c.n, y: c.sy/c.n, size: c.size, str: c.maxStr, id: cid });
    }
  }
  // Link centroids within range
  for (let i = 0; i < centroids.length; i++) {
    for (let j = i+1; j < centroids.length; j++) {
      let d = dist(centroids[i].x, centroids[i].y, centroids[j].x, centroids[j].y);
      if (d < 120) {
        interClusterLinks.push({
          ax: centroids[i].x, ay: centroids[i].y,
          bx: centroids[j].x, by: centroids[j].y,
          strength: min(centroids[i].str, centroids[j].str) * (1 - d/120),
          sizeA: centroids[i].size, sizeB: centroids[j].size,
        });
        // Linked clusters: slow their decay further
        for (let b of bonds) {
          if (b._clusterId == centroids[i].id || b._clusterId == centroids[j].id) {
            b._interlinked = true;
          }
        }
      }
    }
  }

  // ── Decay bonds ──
  for (let i = bonds.length-1; i >= 0; i--) {
    let b = bonds[i];
    let d = dist(b.a.x, b.a.y, b.b.x, b.b.y);
    let bothLit = b.a.illum > 0.25 && b.b.illum > 0.25;

    if (!bothLit) {
      let cs = b._clusterSize || 0;
      let interlinked = b._interlinked || false;
      // Dense/interlinked clusters decay VERY slowly
      let decayRate = interlinked ? 0.0008
                    : cs >= 5 ? 0.001
                    : cs >= 3 ? 0.003
                    : cs >= 2 ? 0.006
                    : 0.014;
      b.life -= decayRate;
      b.strength *= (interlinked ? 0.9995 : 0.999);
    } else if (d > bondRange * 1.8) {
      b.life -= 0.01;
    }

    if (b.strength < 0.15) b.life -= 0.004;
    if (b.life <= 0 || b.strength <= 0) bonds.splice(i, 1);
  }

  // Signals
  for (let i = signals.length-1; i >= 0; i--) {
    let s = signals[i];
    s.vx *= 0.95; s.vy *= 0.95; s.vy -= 0.003;
    s.x += s.vx; s.y += s.vy;
    s.life -= 0.005;
    if (s.life <= 0) signals.splice(i, 1);
  }
  while (signals.length > 35) signals.shift();

  // ═══════════════════════════════════════════════════════════════
  // DRAW
  // ═══════════════════════════════════════════════════════════════
  noStroke();

  // ── Field labels: inside the field, near center ──
  let labelAlpha = 18 + smoothConv * 8;
  textFont('Cormorant Garamond');
  textSize(clampVal(fieldScale * 0.06, 11, 15));
  textAlign(CENTER, CENTER);
  noStroke();

  fill(R_COL[0], R_COL[1], R_COL[2], labelAlpha);
  text('R E A L I T Y', fieldCx - fieldScale*0.38, fieldCy);

  fill(I_COL[0], I_COL[1], I_COL[2], labelAlpha);
  text('I D E N T I T Y', fieldCx + fieldScale*0.38, fieldCy);

  // ── Inter-cluster links (structural bridges between clusters) ──
  for (let link of interClusterLinks) {
    let a = link.strength * 35;
    stroke(P_COL[0], P_COL[1], P_COL[2], a);
    strokeWeight(0.6 + link.strength);
    // Dashed feel via bezier with offset
    let mx = (link.ax+link.bx)/2 + sin(breathPhase*3)*5;
    let my = (link.ay+link.by)/2 + cos(breathPhase*3)*5;
    bezier(link.ax, link.ay, mx, my-8, mx, my+8, link.bx, link.by);
  }
  noStroke();

  // ── Bond lines ──
  for (let b of bonds) {
    let vis = b.life * b.strength * max(b.a.illum, b.b.illum, 0.3);
    if (vis < 0.01) continue;

    let col = shadowMode ? S_COL : P_COL;
    let alpha = vis * 65;
    let wt = 0.3 + b.strength * 1.4;

    // Strong mature bonds: soft glow at midpoint
    if (b.strength > 0.5 && b.age > BOND_STRONG_TIME) {
      let mx = (b.a.x+b.b.x)/2, my = (b.a.y+b.b.y)/2;
      fill(col[0], col[1], col[2], alpha*0.06);
      ellipse(mx, my, 6+b.strength*5, 6+b.strength*5);
    }

    stroke(col[0], col[1], col[2], alpha);
    strokeWeight(wt);
    line(b.a.x, b.a.y, b.b.x, b.b.y);

    if (b.strength > 0.25) {
      noStroke();
      fill(col[0], col[1], col[2], alpha*0.4);
      let mx = (b.a.x+b.b.x)/2, my = (b.a.y+b.b.y)/2;
      ellipse(mx, my, 1.5+b.strength*1.5, 1.5+b.strength*1.5);
    }
  }
  noStroke();

  // ── Particles ──
  for (let p of particles) {
    let a = p.baseAlpha * p.illum;
    if (a < 0.5) continue;

    let col = p.type === 'r'
      ? (shadowT>0.3 ? [lerp(R_COL[0],S_COL[0],shadowT*.4),lerp(R_COL[1],S_COL[1],shadowT*.4),lerp(R_COL[2],S_COL[2],shadowT*.4)] : R_COL)
      : (shadowT>0.3 ? [lerp(I_COL[0],S_COL[0],shadowT*.4),lerp(I_COL[1],S_COL[1],shadowT*.4),lerp(I_COL[2],S_COL[2],shadowT*.4)] : I_COL);

    let breath = sin(breathPhase*2+p.phase)*0.08+1;
    let sz = p.size * breath;

    if (a > 5) {
      fill(col[0],col[1],col[2], a*0.1);
      ellipse(p.x, p.y, sz*3.5, sz*3.5);
    }
    fill(col[0],col[1],col[2], a);
    ellipse(p.x, p.y, sz, sz);
    if (p.illum > 0.7) {
      fill(255,255,255, a*0.12);
      ellipse(p.x, p.y, sz*0.3, sz*0.3);
    }
  }

  // ── Signals ──
  for (let s of signals) {
    let a = s.alpha * s.life;
    if (a < 0.5) continue;
    let sz = s.size*(0.3+s.life*0.7);
    let col = s.shadow ? S_COL : P_COL;
    if (a > 4) {
      fill(col[0],col[1],col[2], a*0.12);
      ellipse(s.x, s.y, sz*3, sz*3);
    }
    fill(col[0],col[1],col[2], a);
    ellipse(s.x, s.y, sz, sz);
    if (a > 10 && !s.shadow) {
      fill(255,255,255, a*0.35);
      ellipse(s.x, s.y, sz*0.25, sz*0.25);
    }
  }

  // ── Edge shadow ──
  if (frameCount > 60) {
    let ep = sin(breathPhase*3)*0.5+0.5;
    if (random() < 0.02+shadowT*0.06) {
      let ex = random()<0.5 ? random(0,20) : random(width-20,width);
      fill(S_COL[0],S_COL[1],S_COL[2], (1+shadowT*8)*ep);
      ellipse(ex, random(height), random(15,45), random(15,45));
    }
  }

  // ── Excitation warmth ──
  if (exciteLevel > 0.2) {
    fill(P_COL[0],P_COL[1],P_COL[2], (exciteLevel-0.2)*2.5);
    ellipse(width/2, height+50, width, 120);
  }

  // ── Cursor ──
  if (mouseOn) {
    let cp = sin(breathPhase*2)*0.12+1;
    let cs = 3+smoothConv*1.5;
    fill(shadowMode?S_COL[0]:255, shadowMode?S_COL[1]:248, shadowMode?S_COL[2]:245, shadowMode?120:80);
    noStroke();
    ellipse(mouseX, mouseY, cs*cp, cs*cp);
    fill(255,255,255, 40);
    ellipse(mouseX, mouseY, cs*cp*0.3, cs*cp*0.3);
  }

  // ── Harmony ring ──
  if (smoothConv > 0.45 && !shadowMode) {
    let ph = (breathPhase*8)%TWO_PI;
    noFill(); stroke(P_COL[0],P_COL[1],P_COL[2], (smoothConv-0.45)*22*(0.5+sin(ph)*0.5));
    strokeWeight(0.4);
    ellipse(mouseX, mouseY, 30+sin(ph)*20, 30+sin(ph)*20);
    noStroke();
  }

  updateCaption(mouseOn);
  document.getElementById('shadowIndicator').className = shadowMode ? 'active' : '';
}

// ═══════════════════════════════════════════════════════════════
// CLUSTER DETECTION — BFS, assigns cluster ID + size to each bond
// ═══════════════════════════════════════════════════════════════
function detectClusters() {
  for (let b of bonds) { b._clusterSize = 0; b._clusterId = undefined; b._interlinked = false; }

  let visited = new Set();
  let clusterId = 0;

  for (let i = 0; i < bonds.length; i++) {
    if (visited.has(i)) continue;
    let queue = [i], group = [i];
    visited.add(i);

    while (queue.length > 0) {
      let ci = queue.shift();
      let cb = bonds[ci];
      for (let j = 0; j < bonds.length; j++) {
        if (visited.has(j)) continue;
        let ob = bonds[j];
        if (ob.aid===cb.aid || ob.aid===cb.bid || ob.bid===cb.aid || ob.bid===cb.bid) {
          visited.add(j); queue.push(j); group.push(j);
        }
      }
    }
    for (let gi of group) {
      bonds[gi]._clusterSize = group.length;
      bonds[gi]._clusterId = clusterId;
    }
    clusterId++;
  }
}

function spawnSignal(x, y, intensity) {
  signals.push({
    x: x+random(-4,4), y: y+random(-4,4),
    vx: random(-0.25,0.25), vy: random(-0.15,-0.02),
    life: 1, size: 1.5+intensity*2, alpha: 25+intensity*35,
    shadow: shadowMode,
  });
}

function clampVal(v, mn, mx) { return v < mn ? mn : v > mx ? mx : v; }

// ═══════════════════════════════════════════════════════════════
// CAPTIONS
// ═══════════════════════════════════════════════════════════════
const CAP = {
  idle:       'The field holds its breath. Structure and pattern await the bridge.',
  approach:   'Structure stirs. Pattern awakens. Something is listening...',
  converging: 'Where structure meets pattern, experience begins to form.',
  deep:       'The bridge holds. Reality recognizes itself through you.',
  harmonized: 'Reality × Identity = Experience',
  shadow:     'The bridge inverts — connection becomes consumption.',
  shadowDeep: 'Perception weaponized: awareness that isolates rather than unites.',
};

function updateCaption(mouseOn) {
  captionHoldTimer = max(0, captionHoldTimer-1);
  let t;
  if (shadowMode) t = smoothConv>0.3 ? CAP.shadowDeep : CAP.shadow;
  else if (!mouseOn) t = CAP.idle;
  else if (smoothConv>0.5) t = CAP.harmonized;
  else if (smoothConv>0.25) t = CAP.deep;
  else if (smoothConv>0.08) t = CAP.converging;
  else t = CAP.approach;

  if (t !== captionTarget && captionHoldTimer <= 0) {
    captionTarget = t;
    captionHoldTimer = CAPTION_HOLD;
    let ct = document.getElementById('captionText');
    ct.style.opacity = '0';
    setTimeout(() => { ct.textContent = captionTarget; ct.style.opacity = '1'; }, 400);
  }
  let ct = document.getElementById('captionText');
  ct.classList.toggle('harmonized', smoothConv>0.5 && !shadowMode);
  ct.classList.toggle('shadow-active', shadowMode);
}

// ═══════════════════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════════════════
function mousePressed() {
  clickPulse = 25;
  cumulativeEnergy += 30;

  let count = 0;
  for (let b of bonds) {
    let bx = (b.a.x+b.b.x)/2, by = (b.a.y+b.b.y)/2;
    if (dist(mouseX, mouseY, bx, by) < 50) {
      spawnSignal(bx, by, 0.5+b.strength);
      b.strength = min(1, b.strength+0.2);
      b.life = min(1, b.life+0.15);
      count++;
      if (count > 6) break;
    }
  }
  if (count === 0) {
    for (let k = 0; k < 2; k++) spawnSignal(mouseX+random(-6,6), mouseY+random(-6,6), 0.2);
  }
}

function keyPressed() {
  if (key === 's' || key === 'S') shadowMode = !shadowMode;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  layoutField();
}
</script>
</body>
</html>
