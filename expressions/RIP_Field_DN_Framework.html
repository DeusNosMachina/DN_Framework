<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The RIP Field – DN Framework v9</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#060608;cursor:none;font-family:'Cormorant Garamond',serif}
  canvas{display:block}
  #caption{position:fixed;bottom:44px;left:50%;transform:translateX(-50%);z-index:50;text-align:center;pointer-events:none;width:90%;max-width:520px}
  #captionText{font-size:clamp(14px,1.8vw,17px);font-weight:300;letter-spacing:.04em;line-height:1.5;color:rgba(255,255,255,0.78);transition:color .8s,opacity .8s}
  #captionText.harmonized{color:rgba(212,160,23,0.95);text-shadow:0 0 24px rgba(212,160,23,0.2)}
  #captionText.shadow-active{color:rgba(204,41,54,0.85)}
  #hotkey{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:50;pointer-events:none;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.55)}
  #hotkey span{color:rgba(204,41,54,0.7)}
  #shadowIndicator{position:fixed;top:16px;right:16px;z-index:50;width:9px;height:9px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);background:transparent;transition:all 0.8s;pointer-events:none}
  #shadowIndicator.active{background:#CC2936;border-color:#CC2936;box-shadow:0 0 12px rgba(204,41,54,0.5)}
  #shadowBtn{position:fixed;bottom:12px;right:16px;z-index:60;padding:6px 16px;border:1px solid rgba(255,255,255,0.2);border-radius:8px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.6);font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .2s,color .2s,border-color .2s}
  #shadowBtn.active{background:rgba(204,41,54,0.15);border-color:rgba(204,41,54,0.5);color:#CC2936}
  #shadowBtn:active{transform:scale(0.96)}
</style>
</head>
<body>
<div id="caption"><div id="captionText">Reality × Identity = Experience</div></div>
<div id="hotkey"><span>S</span> shadow &nbsp;&bull;&nbsp; click — bridge / destroy &nbsp;&bull;&nbsp; hold &amp; drag — trail</div>
<div id="shadowIndicator"></div>
<button id="shadowBtn" onclick="shadowMode=!shadowMode;this.classList.toggle('active',shadowMode)">Shadow <span style="font-family:monospace;font-size:10px;opacity:.5;margin-left:3px">S</span></button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// THE RIP FIELD — DN Framework v9
// Sonic Dimensionality: ambient harmonics shaped by your gravity.
// Light creates. Shadow destroys. Both are necessary.
// "Creation and destruction may not be opposing forces at all,
//  but collaborative partners in a cosmic intelligence system."
//  — DN Shadow Dimensions
// ═══════════════════════════════════════════════════════════════

const RC=[45,139,70], IC=[232,124,46], PC=[212,160,23], SC=[204,41,54];

let particles=[], bonds=[], signals=[];
let interClusterLinks=[];
let shockwaves=[]; // shadow click explosions

let shadowMode=false, shadowT=0;
let smoothVel=0, smoothConv=0, breathPhase=0;
let cumulativeEnergy=0, exciteLevel=0;
let captionTarget='Reality × Identity = Experience', captionHoldTimer=0;
const CAPTION_HOLD=150;

let holding=false, holdFrames=0, holdIntensity=0;
let cometTrail=[];
let cursorHistory=[];
let sacredShapes=[];

const P_COUNT=130;
const MAX_DRIFT=65;
const SPRING_K=0.0006;
const DAMPING=0.91;
const BOND_DIST=40;

let fieldCx, fieldCy, fieldScale;

// ═══════════════════════════════════════════════════════════════
// SOUND ENGINE — Cosmic Ambient Harmonics
// The field hums. Your gravity shapes the music.
// Structure adds complexity. Shadow inverts the harmony.
// ═══════════════════════════════════════════════════════════════
let audioCtx=null, soundReady=false, soundOn=false;
let ambMaster=null;
// 4-voice ambient pad: root, third, fifth, octave (Cmaj7 feeling)
// C2, E2, G2, B2 — warm, meditative
const AMB_BASE=[65.41, 82.41, 98.00, 123.47];
// Shadow intervals: Cm(b5) — C, Eb, Gb, Bb — tense, dissonant
const AMB_SHADOW=[65.41, 77.78, 92.50, 116.54];
let ambOscs=[], ambGains=[];
// Structure layers: higher harmonics that fade in with bond complexity
let structOscs=[], structGains=[];
// C3, G3, E4 — octave-spaced shimmer
const STRUCT_FREQ=[130.81, 196.00, 329.63];
const STRUCT_SHADOW=[130.81, 185.00, 311.13];
// LFO for gentle pulsing
let lfoNode=null, lfoGain=null;
// Smoothed activity for tempo modulation
let soundActivity=0, soundStructure=0, soundShadowBlend=0;

function initSound(){
  if(soundReady)return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    soundReady=true;

    ambMaster=audioCtx.createGain();
    ambMaster.gain.value=0;
    ambMaster.connect(audioCtx.destination);

    // LFO: gentle amplitude tremolo (the "breathing")
    lfoNode=audioCtx.createOscillator();
    lfoGain=audioCtx.createGain();
    lfoNode.type='sine';
    lfoNode.frequency.value=0.15; // very slow breath
    lfoGain.gain.value=0.08; // subtle
    lfoNode.connect(lfoGain);
    lfoNode.start();

    // Ambient pad voices
    for(let i=0;i<4;i++){
      let osc=audioCtx.createOscillator();
      let gain=audioCtx.createGain();
      osc.type='sine';
      osc.frequency.value=AMB_BASE[i];
      gain.gain.value=i===0?0.10:i===1?0.06:i===2?0.07:0.04;
      // Connect LFO to each voice's gain for breathing
      lfoGain.connect(gain.gain);
      osc.connect(gain);
      gain.connect(ambMaster);
      osc.start();
      ambOscs.push(osc);
      ambGains.push(gain);
    }

    // Structure layers: dormant until bonds form
    for(let i=0;i<3;i++){
      let osc=audioCtx.createOscillator();
      let gain=audioCtx.createGain();
      osc.type='sine';
      osc.frequency.value=STRUCT_FREQ[i];
      gain.gain.value=0; // silent until structures emerge
      osc.connect(gain);
      gain.connect(ambMaster);
      osc.start();
      structOscs.push(osc);
      structGains.push(gain);
    }

    // Fade in gently
    let t=audioCtx.currentTime;
    ambMaster.gain.setTargetAtTime(0.6,t,2.5);
    soundOn=true;
  }catch(e){console.warn('Audio unavailable:',e);}
}

function updateRIPSound(){
  if(!soundReady||!audioCtx)return;
  let t=audioCtx.currentTime;

  // ── Activity: cursor velocity + clicks + hold → LFO speed (tempo feel) ──
  // Slow/still = 0.1Hz breath. Fast/active = 0.4Hz pulse.
  let actTarget=constrain(smoothVel/12+holdIntensity*0.3+exciteLevel*0.5,0,1);
  soundActivity=lerp(soundActivity,actTarget,0.02);
  let lfoFreq=0.1+soundActivity*0.35;
  lfoNode.frequency.setTargetAtTime(lfoFreq,t,0.5);
  // Activity also subtly increases LFO depth
  lfoGain.gain.setTargetAtTime(0.06+soundActivity*0.08,t,0.3);

  // ── Structure: bond count → harmonic layers ──
  let bondNorm=constrain(bonds.length/80,0,1); // 80 bonds = full complexity
  let structTarget=bondNorm;
  soundStructure=lerp(soundStructure,structTarget,0.01);

  for(let i=0;i<3;i++){
    // Layer i fades in at different thresholds
    let threshold=i*0.25; // 0, 0.25, 0.5
    let layerGain=constrain((soundStructure-threshold)/0.3,0,1)*[0.04,0.03,0.025][i];
    structGains[i].gain.setTargetAtTime(layerGain,t,0.8);
  }

  // ── Shadow blend: shift frequencies toward dissonant intervals ──
  soundShadowBlend=lerp(soundShadowBlend,shadowT,0.015);
  let sb=soundShadowBlend;

  for(let i=0;i<4;i++){
    let freq=AMB_BASE[i]+(AMB_SHADOW[i]-AMB_BASE[i])*sb;
    ambOscs[i].frequency.setTargetAtTime(freq,t,1.2);
    // Shadow also shifts waveform: pure sine → slight triangle edge
    ambOscs[i].type=sb>0.5?'triangle':'sine';
  }
  for(let i=0;i<3;i++){
    let freq=STRUCT_FREQ[i]+(STRUCT_SHADOW[i]-STRUCT_FREQ[i])*sb;
    structOscs[i].frequency.setTargetAtTime(freq,t,1.2);
  }

  // ── Convergence boost: when R×I converges, pad gets slightly louder + warmer ──
  let convBoost=0.6+smoothConv*0.35;
  ambMaster.gain.setTargetAtTime(convBoost,t,1.5);
}

// Click/interaction sonic feedback
function playBridgeSound(){
  if(!soundReady||!audioCtx)return;
  // Gentle chime — the Perception golden tone
  let osc=audioCtx.createOscillator();
  let gain=audioCtx.createGain();
  osc.type='sine';
  // Pitch rises with more bonds (building complexity)
  let basePitch=329.63+bonds.length*0.8; // E4 + complexity
  osc.frequency.value=basePitch;
  gain.gain.setValueAtTime(0.08,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+1.2);
  osc.connect(gain);gain.connect(audioCtx.destination);
  osc.start();osc.stop(audioCtx.currentTime+1.3);
  // Second voice: fifth above, quieter
  let osc2=audioCtx.createOscillator();
  let gain2=audioCtx.createGain();
  osc2.type='sine';
  osc2.frequency.value=basePitch*1.5;
  gain2.gain.setValueAtTime(0.03,audioCtx.currentTime);
  gain2.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.9);
  osc2.connect(gain2);gain2.connect(audioCtx.destination);
  osc2.start();osc2.stop(audioCtx.currentTime+1.0);
}

function playShadowSound(){
  if(!soundReady||!audioCtx)return;
  // Low, dissonant burst
  let osc=audioCtx.createOscillator();
  let gain=audioCtx.createGain();
  osc.type='sawtooth';
  osc.frequency.value=73.42; // D2 — low growl
  gain.gain.setValueAtTime(0.1,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.5);
  osc.connect(gain);gain.connect(audioCtx.destination);
  osc.start();osc.stop(audioCtx.currentTime+0.6);
}

function setup(){
  createCanvas(windowWidth,windowHeight);
  pixelDensity(1);
  layoutField();
}

function layoutField(){
  fieldCx=width/2; fieldCy=height/2;
  fieldScale=min(width,height)*0.38;
  particles=[]; bonds=[]; signals=[];
  cometTrail=[]; cursorHistory=[]; sacredShapes=[];
  interClusterLinks=[]; shockwaves=[];

  let fieldR=fieldScale*0.85;
  for(let i=0;i<P_COUNT;i++){
    let type=i<P_COUNT/2?'r':'i';
    let a=random(TWO_PI), r=sqrt(random())*fieldR;
    let hx=fieldCx+cos(a)*r, hy=fieldCy+sin(a)*r;
    particles.push({
      type, id:type+(i%65),
      hx, hy, x:hx, y:hy, vx:0, vy:0,
      phase:random(TWO_PI),
      wobX:random(0.3,1), wobY:random(0.3,1), wobAmp:random(0.6,2),
      size:random(2.5,5.5), baseAlpha:random(55,95),
      illum:0, tIllum:0,
    });
  }
}

function draw(){
  background(6,6,10,18);
  breathPhase+=0.015;

  let mVel=dist(mouseX,mouseY,pmouseX,pmouseY);
  smoothVel=lerp(smoothVel,mVel,0.12);
  let mouseOn=mouseX>0&&mouseX<width&&mouseY>0&&mouseY<height;
  shadowT=lerp(shadowT,shadowMode?1:0,0.03);
  if(mouseOn&&mVel>1)cumulativeEnergy+=mVel*0.015;
  exciteLevel=lerp(exciteLevel,constrain(cumulativeEnergy/5000,0,1),0.005);

  // Hold state
  if(holding&&mouseOn&&!shadowMode){
    holdFrames++;
    holdIntensity=min(1,holdFrames/40);
    if(frameCount%2===0)cometTrail.push({x:mouseX,y:mouseY,life:1,intensity:holdIntensity});
  } else {
    holdIntensity*=0.9;
    if(holdIntensity<0.01)holdIntensity=0;
  }
  for(let i=cometTrail.length-1;i>=0;i--){
    cometTrail[i].life-=0.025;
    if(cometTrail[i].life<=0)cometTrail.splice(i,1);
  }
  while(cometTrail.length>60)cometTrail.shift();

  if(mouseOn&&frameCount%4===0){
    cursorHistory.push({x:mouseX,y:mouseY,t:frameCount});
    if(cursorHistory.length>60)cursorHistory.shift();
  }

  let attention=mouseOn?max(0,1-smoothVel/16):0;
  let holdBoost=holdIntensity*3;
  let gRad=fieldScale*(0.35+holdBoost*0.1);
  let gStr=(attention*0.12+holdBoost*0.35)*(shadowMode?-1:1);

  let beam=fieldScale*1.1;
  let ambient=0.38+exciteLevel*0.1;

  let rNear=0,iNear=0, convR=gRad*0.7;

  // ── Physics ──
  for(let p of particles){
    let wobX=sin(breathPhase*20*p.wobX*0.05+p.phase)*p.wobAmp;
    let wobY=cos(breathPhase*20*p.wobY*0.04+p.phase*1.3)*p.wobAmp;

    let bondedCount=0;
    for(let b of bonds){
      if((b.aid===p.id||b.bid===p.id)&&b.strength>0.25)bondedCount++;
    }
    let springMult=bondedCount>0?0.4:1;

    p.vx+=(p.hx+wobX-p.x)*SPRING_K*springMult;
    p.vy+=(p.hy+wobY-p.y)*SPRING_K*springMult;

    // Cursor gravity (repel in shadow)
    if(mouseOn){
      let dx=mouseX-p.x, dy=mouseY-p.y;
      let d=sqrt(dx*dx+dy*dy);
      if(d<gRad&&d>2){
        let f=(1-d/gRad)*gStr;
        p.vx+=(dx/d)*f; p.vy+=(dy/d)*f;
      }
      if(d<convR){if(p.type==='r')rNear++;else iNear++;}
    }

    // Comet trail gravity (light mode only)
    if(holdIntensity>0.1&&!shadowMode){
      for(let ct of cometTrail){
        let dx=ct.x-p.x, dy=ct.y-p.y;
        let d=sqrt(dx*dx+dy*dy);
        if(d<gRad*0.6&&d>3){
          let f=(1-d/(gRad*0.6))*ct.life*ct.intensity*0.03;
          p.vx+=(dx/d)*f; p.vy+=(dy/d)*f;
        }
      }
    }

    // Shockwave repulsion
    for(let sw of shockwaves){
      let dx=p.x-sw.x, dy=p.y-sw.y;
      let d=sqrt(dx*dx+dy*dy);
      let ringDist=abs(d-sw.radius);
      if(ringDist<30&&d>2){
        let f=sw.force*(1-ringDist/30)*(sw.life);
        p.vx+=(dx/d)*f; p.vy+=(dy/d)*f;
      }
    }

    p.vx*=DAMPING; p.vy*=DAMPING;
    p.x+=p.vx; p.y+=p.vy;

    let dHome=dist(p.x,p.y,p.hx,p.hy);
    if(dHome>MAX_DRIFT){
      let s=MAX_DRIFT/dHome;
      p.x=p.hx+(p.x-p.hx)*s; p.y=p.hy+(p.y-p.hy)*s;
      p.vx*=0.5; p.vy*=0.5;
    }

    let dM=mouseOn?dist(p.x,p.y,mouseX,mouseY):9999;
    if(dM<beam) p.tIllum=pow(1-dM/beam,0.5)*0.9+ambient;
    else p.tIllum=ambient;
    if(holdIntensity>0.1&&dM<gRad) p.tIllum=min(1,p.tIllum+holdIntensity*0.3*(1-dM/gRad));
    if(shadowMode&&dM<beam*0.3) p.tIllum=lerp(p.tIllum,ambient*0.15,shadowT*(1-dM/(beam*0.3)));
    p.illum=lerp(p.illum,p.tIllum,0.08);
  }

  smoothConv=lerp(smoothConv,min(1,(rNear*iNear)/(8*8))*attention,0.04);

  // ═══════════════════════════════════════════════════════════════
  // BONDING (light mode only — shadow doesn't create)
  // ═══════════════════════════════════════════════════════════════
  if(!shadowMode){
    let bondRange=BOND_DIST+exciteLevel*10+holdIntensity*15;
    formBondsNear(mouseX,mouseY,bondRange,attention+holdIntensity);
    if(holdIntensity>0.2){
      for(let ct of cometTrail){
        if(ct.life>0.3)formBondsNear(ct.x,ct.y,bondRange*0.7,ct.life*ct.intensity*0.5);
      }
    }
  }

  // ── Shadow erosion: nearby bonds weaken when shadow cursor is close ──
  if(shadowMode&&mouseOn){
    let erosionR=fieldScale*0.2;
    for(let b of bonds){
      let bx=(b.a.x+b.b.x)/2, by=(b.a.y+b.b.y)/2;
      let d=dist(mouseX,mouseY,bx,by);
      if(d<erosionR){
        let erosion=(1-d/erosionR)*0.008*shadowT;
        b.life-=erosion;
        b.strength-=erosion*0.5;
      }
    }
  }

  // Sound engine
  if(soundReady&&frameCount%3===0) updateRIPSound();

  detectClusters();
  detectInterCluster();

  // ── Shockwave update ──
  for(let i=shockwaves.length-1;i>=0;i--){
    let sw=shockwaves[i];
    sw.radius+=4;
    sw.life-=0.025;
    if(sw.life<=0)shockwaves.splice(i,1);
  }

  // ── Bond decay ──
  for(let i=bonds.length-1;i>=0;i--){
    let b=bonds[i];
    let d=dist(b.a.x,b.a.y,b.b.x,b.b.y);
    let bothLit=b.a.illum>0.25&&b.b.illum>0.25;

    if(bothLit&&!shadowMode){
      if(d>BOND_DIST*2.5) b.life-=0.01;
    } else {
      let cs=b._clusterSize||0;
      let il=b._interlinked||false;
      let rate=il?0.002 : cs>=6?0.003 : cs>=3?0.005 : cs>=2?0.008 : 0.015;
      b.life-=rate;
      b.strength*=0.998;
    }
    if(b.strength<0.12) b.life-=0.006;
    if(d>BOND_DIST*3) b.life-=0.02;
    if(b.life<=0||b.strength<=0) bonds.splice(i,1);
  }

  // Signals
  for(let i=signals.length-1;i>=0;i--){
    let s=signals[i];
    s.vx*=0.94; s.vy*=0.94; s.vy-=0.003;
    s.x+=s.vx; s.y+=s.vy;
    s.life-=0.005;
    if(s.life<=0)signals.splice(i,1);
  }
  while(signals.length>40)signals.shift();

  // Sacred geometry
  if(!shadowMode) detectSacredGeometry();
  for(let i=sacredShapes.length-1;i>=0;i--){
    sacredShapes[i].life-=0.006;
    if(sacredShapes[i].life<=0)sacredShapes.splice(i,1);
  }

  // ═══════════════════════════════════════════════════════════════
  // DRAW
  // ═══════════════════════════════════════════════════════════════
  noStroke();

  // Field labels
  let la=28+smoothConv*10;
  textFont('Cormorant Garamond');
  textSize(clampV(fieldScale*0.055,10,14));
  textAlign(CENTER,CENTER);
  fill(RC[0],RC[1],RC[2],la); text('R E A L I T Y',fieldCx-fieldScale*0.5,fieldCy);
  fill(IC[0],IC[1],IC[2],la); text('I D E N T I T Y',fieldCx+fieldScale*0.5,fieldCy);

  // Sacred shapes
  for(let sg of sacredShapes){
    let a=sg.life*40, shimmer=sin(frameCount*0.03+sg.birth)*0.3+0.7;
    noFill(); stroke(PC[0],PC[1],PC[2],a*shimmer); strokeWeight(0.6+sg.life*0.7);
    beginShape(); for(let pt of sg.points)vertex(pt.x,pt.y); endShape(CLOSE);
    noStroke();
    for(let pt of sg.points){
      fill(PC[0],PC[1],PC[2],a*0.5*shimmer); ellipse(pt.x,pt.y,6,6);
      fill(255,255,255,a*0.3*shimmer); ellipse(pt.x,pt.y,2.5,2.5);
    }
  }

  // Inter-cluster links
  for(let link of interClusterLinks){
    let a=link.strength*50;
    stroke(PC[0],PC[1],PC[2],a); strokeWeight(0.5+link.strength*0.8);
    let mx=(link.ax+link.bx)/2+sin(breathPhase*3)*4;
    let my=(link.ay+link.by)/2+cos(breathPhase*3)*4;
    noFill(); bezier(link.ax,link.ay,mx,my-6,mx,my+6,link.bx,link.by);
  }
  noStroke();

  // Comet trail
  for(let ct of cometTrail){
    let a=ct.life*ct.intensity*28;
    fill(PC[0],PC[1],PC[2],a);
    ellipse(ct.x,ct.y,3+ct.intensity*2.5,3+ct.intensity*2.5);
  }

  // Shockwave rings (shadow destruction visual)
  for(let sw of shockwaves){
    noFill();
    // Outer ring
    stroke(SC[0],SC[1],SC[2],sw.life*85);
    strokeWeight(1.5+sw.force*2);
    ellipse(sw.x,sw.y,sw.radius*2,sw.radius*2);
    // Inner echo
    stroke(SC[0],SC[1],SC[2],sw.life*40);
    strokeWeight(0.6);
    ellipse(sw.x,sw.y,sw.radius*1.4,sw.radius*1.4);
  }
  noStroke();

  // Bond lines
  for(let b of bonds){
    let vis=b.life*b.strength*max(b.a.illum,b.b.illum,0.35);
    if(vis<0.01)continue;
    let col=shadowMode?SC:PC;
    let alpha=vis*90;

    if(b.strength>0.5&&b.age>60){
      let mx=(b.a.x+b.b.x)/2, my=(b.a.y+b.b.y)/2;
      fill(col[0],col[1],col[2],alpha*0.08);
      ellipse(mx,my,6+b.strength*5,6+b.strength*5);
    }
    stroke(col[0],col[1],col[2],alpha);
    strokeWeight(0.4+b.strength*1.5);
    line(b.a.x,b.a.y,b.b.x,b.b.y);
    if(b.strength>0.25){
      noStroke(); fill(col[0],col[1],col[2],alpha*0.5);
      let mx=(b.a.x+b.b.x)/2, my=(b.a.y+b.b.y)/2;
      ellipse(mx,my,2+b.strength*1.5,2+b.strength*1.5);
    }
  }
  noStroke();

  // Particles
  for(let p of particles){
    let a=p.baseAlpha*p.illum;
    if(a<0.5)continue;
    let col=p.type==='r'
      ?(shadowT>0.3?[lerp(RC[0],SC[0],shadowT*.4),lerp(RC[1],SC[1],shadowT*.4),lerp(RC[2],SC[2],shadowT*.4)]:RC)
      :(shadowT>0.3?[lerp(IC[0],SC[0],shadowT*.4),lerp(IC[1],SC[1],shadowT*.4),lerp(IC[2],SC[2],shadowT*.4)]:IC);
    let breath=sin(breathPhase*2+p.phase)*0.07+1;
    let sz=p.size*breath;
    if(a>3){fill(col[0],col[1],col[2],a*0.14);ellipse(p.x,p.y,sz*4,sz*4);}
    fill(col[0],col[1],col[2],a*1.3);ellipse(p.x,p.y,sz,sz);
    if(p.illum>0.55){fill(255,255,255,a*0.2);ellipse(p.x,p.y,sz*0.35,sz*0.35);}
  }

  // Signals
  for(let s of signals){
    let a=s.alpha*s.life;
    if(a<0.5)continue;
    let sz=s.size*(0.3+s.life*0.7);
    let col=s.shadow?SC:PC;
    if(a>2){fill(col[0],col[1],col[2],a*0.15);ellipse(s.x,s.y,sz*3.5,sz*3.5);}
    fill(col[0],col[1],col[2],a*1.2);ellipse(s.x,s.y,sz,sz);
    if(a>6&&!s.shadow){fill(255,255,255,a*0.4);ellipse(s.x,s.y,sz*0.3,sz*0.3);}
  }

  // Edge shadow
  if(frameCount>60){
    let ep=sin(breathPhase*3)*0.5+0.5;
    if(random()<0.02+shadowT*0.05){
      let ex=random()<0.5?random(0,20):random(width-20,width);
      fill(SC[0],SC[1],SC[2],(1+shadowT*7)*ep);
      ellipse(ex,random(height),random(15,40),random(15,40));
    }
  }

  // Cursor
  if(mouseOn){
    let cp=sin(breathPhase*2)*0.1+1;
    let cs=3+smoothConv*1.5+holdIntensity*2;
    if(shadowMode){
      // Shadow cursor: red, slightly larger, menacing
      fill(SC[0],SC[1],SC[2],170+sin(breathPhase*6)*35);
      noStroke(); ellipse(mouseX,mouseY,(cs+1)*cp,(cs+1)*cp);
      fill(255,255,255,55);
      ellipse(mouseX,mouseY,cs*cp*0.25,cs*cp*0.25);
    } else {
      fill(255,248,245,95+holdIntensity*50);
      noStroke(); ellipse(mouseX,mouseY,cs*cp,cs*cp);
      fill(255,255,255,50+holdIntensity*30);
      ellipse(mouseX,mouseY,cs*cp*0.3,cs*cp*0.3);
    }
  }

  if(smoothConv>0.45&&!shadowMode){
    let ph=(breathPhase*8)%TWO_PI;
    noFill();stroke(PC[0],PC[1],PC[2],(smoothConv-0.45)*35*(0.5+sin(ph)*0.5));
    strokeWeight(0.4); ellipse(mouseX,mouseY,28+sin(ph)*18,28+sin(ph)*18);
    noStroke();
  }

  updateCaption(mouseOn);
  document.getElementById('shadowIndicator').className=shadowMode?'active':'';
}

// ═══════════════════════════════════════════════════════════════
function formBondsNear(cx,cy,range,attStr){
  let scanR=fieldScale*0.25;
  for(let p of particles){
    if(p.type!=='r'||p.illum<0.2)continue;
    if(dist(p.x,p.y,cx,cy)>scanR)continue;
    for(let q of particles){
      if(q.type!=='i'||q.illum<0.2)continue;
      let d=dist(p.x,p.y,q.x,q.y);
      if(d>range||d<2)continue;
      let ex=bonds.find(b=>b.aid===p.id&&b.bid===q.id);
      if(ex){
        ex.strength=min(1,ex.strength+attStr*0.01);
        ex.life=min(1,ex.life+0.006); ex.age++;
      } else if(bonds.length<180){
        bonds.push({a:p,b:q,aid:p.id,bid:q.id,strength:0.08*(1-d/range),life:0.6,age:0});
        if(random()<0.12)spawnSignal((p.x+q.x)/2,(p.y+q.y)/2,0.3+attStr*0.3,false);
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// SHADOW BREAK — entropy explosion
// ═══════════════════════════════════════════════════════════════
function shadowBreak(sx,sy){
  let breakRadius=fieldScale*0.22;

  // Shockwave visual
  shockwaves.push({x:sx,y:sy,radius:10,life:1,force:0.5});

  // Destroy bonds in radius
  let destroyed=0;
  for(let i=bonds.length-1;i>=0;i--){
    let b=bonds[i];
    let bx=(b.a.x+b.b.x)/2, by=(b.a.y+b.b.y)/2;
    let d=dist(sx,sy,bx,by);
    if(d<breakRadius){
      let damage=(1-d/breakRadius);
      b.life-=damage*0.5;
      b.strength-=damage*0.4;

      // Fling particles at the bond endpoints
      let flingForce=damage*1.5;
      b.a.vx+=(b.a.x-sx)*flingForce*0.02;
      b.a.vy+=(b.a.y-sy)*flingForce*0.02;
      b.b.vx+=(b.b.x-sx)*flingForce*0.02;
      b.b.vy+=(b.b.y-sy)*flingForce*0.02;

      // Spawn red entropy signals from broken bonds
      if(damage>0.3&&destroyed<8){
        spawnSignal(bx,by,damage*0.5,true);
        destroyed++;
      }

      if(b.life<=0||b.strength<=0) bonds.splice(i,1);
    }
  }

  // Also destroy sacred shapes near explosion
  for(let i=sacredShapes.length-1;i>=0;i--){
    let sg=sacredShapes[i];
    let cx=0,cy=0;
    for(let pt of sg.points){cx+=pt.x;cy+=pt.y;}
    cx/=sg.points.length; cy/=sg.points.length;
    if(dist(sx,sy,cx,cy)<breakRadius){
      sacredShapes.splice(i,1);
    }
  }
}

// ═══════════════════════════════════════════════════════════════
function detectClusters(){
  for(let b of bonds){b._clusterSize=0;b._clusterId=undefined;b._interlinked=false;}
  let visited=new Set(), cid=0;
  for(let i=0;i<bonds.length;i++){
    if(visited.has(i))continue;
    let queue=[i],group=[i];visited.add(i);
    while(queue.length>0){
      let ci=queue.shift(),cb=bonds[ci];
      for(let j=0;j<bonds.length;j++){
        if(visited.has(j))continue;
        let ob=bonds[j];
        if(ob.aid===cb.aid||ob.aid===cb.bid||ob.bid===cb.aid||ob.bid===cb.bid){
          visited.add(j);queue.push(j);group.push(j);
        }
      }
    }
    for(let gi of group){bonds[gi]._clusterSize=group.length;bonds[gi]._clusterId=cid;}
    cid++;
  }
}

function detectInterCluster(){
  interClusterLinks=[];
  let cm={};
  for(let b of bonds){
    let c=b._clusterId;if(c===undefined)continue;
    if(!cm[c])cm[c]={sx:0,sy:0,n:0,size:b._clusterSize,ms:0};
    let mx=(b.a.x+b.b.x)/2,my=(b.a.y+b.b.y)/2;
    cm[c].sx+=mx;cm[c].sy+=my;cm[c].n++;cm[c].ms=max(cm[c].ms,b.strength);
  }
  let cents=[];
  for(let c in cm){let v=cm[c];if(v.size>=2)cents.push({x:v.sx/v.n,y:v.sy/v.n,size:v.size,str:v.ms,id:c});}
  for(let i=0;i<cents.length;i++){
    for(let j=i+1;j<cents.length;j++){
      let d=dist(cents[i].x,cents[i].y,cents[j].x,cents[j].y);
      if(d<130){
        interClusterLinks.push({ax:cents[i].x,ay:cents[i].y,bx:cents[j].x,by:cents[j].y,
          strength:min(cents[i].str,cents[j].str)*(1-d/130)});
        for(let b of bonds){if(b._clusterId==cents[i].id||b._clusterId==cents[j].id)b._interlinked=true;}
      }
    }
  }
}

function detectSacredGeometry(){
  if(cursorHistory.length<12||sacredShapes.length>=6)return;
  if(frameCount%20!==0)return;
  let h=cursorHistory, len=h.length;
  let pts=[h[len-1],h[max(0,len-6)],h[max(0,len-12)]];
  let d01=dist(pts[0].x,pts[0].y,pts[1].x,pts[1].y);
  let d12=dist(pts[1].x,pts[1].y,pts[2].x,pts[2].y);
  let d02=dist(pts[0].x,pts[0].y,pts[2].x,pts[2].y);
  let avgD=(d01+d12+d02)/3;
  if(avgD>30&&avgD<200){
    let variance=max(abs(d01-avgD),abs(d12-avgD),abs(d02-avgD))/avgD;
    if(variance<0.35&&dist(pts[0].x,pts[0].y,pts[2].x,pts[2].y)<avgD*1.3){
      sacredShapes.push({points:pts.map(p=>({x:p.x,y:p.y})),life:1,birth:frameCount});
      for(let pt of pts){for(let b of bonds){
        let bx=(b.a.x+b.b.x)/2,by=(b.a.y+b.b.y)/2;
        if(dist(pt.x,pt.y,bx,by)<40){b.strength=min(1,b.strength+0.15);b.life=min(1,b.life+0.1);}
      }}
      return;
    }
  }
  if(len>=20){
    let pts5=[];for(let k=0;k<5;k++)pts5.push(h[max(0,len-1-k*4)]);
    let cx=0,cy=0;for(let p of pts5){cx+=p.x;cy+=p.y;}cx/=5;cy/=5;
    let dists=pts5.map(p=>dist(p.x,p.y,cx,cy));
    let avgR=dists.reduce((a,b)=>a+b,0)/5;
    if(avgR>25&&avgR<180){
      let maxVar=0;for(let d of dists)maxVar=max(maxVar,abs(d-avgR)/avgR);
      if(maxVar<0.4){sacredShapes.push({points:pts5.map(p=>({x:p.x,y:p.y})),life:1,birth:frameCount});}
    }
  }
}

function spawnSignal(x,y,intensity,isShadow){
  signals.push({x:x+random(-4,4),y:y+random(-4,4),
    vx:random(-0.3,0.3)+(isShadow?random(-0.5,0.5):0),
    vy:random(-0.15,-0.02)+(isShadow?random(-0.3,0.3):0),
    life:1,size:1.5+intensity*2,alpha:40+intensity*45,shadow:isShadow});
}

function clampV(v,mn,mx){return v<mn?mn:v>mx?mx:v}

const CAP={
  idle:'The field holds its breath. Structure and pattern await the bridge.',
  approach:'Structure stirs. Pattern awakens. Something is listening...',
  converging:'Where structure meets pattern, experience begins to form.',
  deep:'The bridge holds. Reality recognizes itself through you.',
  harmonized:'Reality × Identity = Experience',
  shadow:'The bridge inverts — connection becomes consumption.',
  shadowDeep:'Perception weaponized: awareness that isolates rather than unites.',
};

function updateCaption(mouseOn){
  captionHoldTimer=max(0,captionHoldTimer-1);
  let t;
  if(shadowMode)t=smoothConv>0.3?CAP.shadowDeep:CAP.shadow;
  else if(!mouseOn)t=CAP.idle;
  else if(smoothConv>0.5)t=CAP.harmonized;
  else if(smoothConv>0.25)t=CAP.deep;
  else if(smoothConv>0.08)t=CAP.converging;
  else t=CAP.approach;
  if(t!==captionTarget&&captionHoldTimer<=0){
    captionTarget=t;captionHoldTimer=CAPTION_HOLD;
    let ct=document.getElementById('captionText');
    ct.style.opacity='0';
    setTimeout(()=>{ct.textContent=captionTarget;ct.style.opacity='1';},400);
  }
  let ct=document.getElementById('captionText');
  ct.classList.toggle('harmonized',smoothConv>0.5&&!shadowMode);
  ct.classList.toggle('shadow-active',shadowMode);
}

function mousePressed(){
  if(!soundReady) initSound(); // Browser requires user gesture for audio
  if(shadowMode){
    // SHADOW CLICK: entropy explosion
    playShadowSound();
    shadowBreak(mouseX,mouseY);
  } else {
    // LIGHT CLICK: bridge creation
    playBridgeSound();
    holding=true; holdFrames=0;
    cumulativeEnergy+=20;
    let count=0;
    for(let b of bonds){
      let bx=(b.a.x+b.b.x)/2,by=(b.a.y+b.b.y)/2;
      if(dist(mouseX,mouseY,bx,by)<50){
        spawnSignal(bx,by,0.4+b.strength,false);
        b.strength=min(1,b.strength+0.15);b.life=min(1,b.life+0.12);
        count++;if(count>5)break;
      }
    }
    if(count===0){for(let k=0;k<2;k++)spawnSignal(mouseX+random(-5,5),mouseY+random(-5,5),0.2,false);}
  }
}

function mouseReleased(){holding=false;holdFrames=0;}
function keyPressed(){if(key==='s'||key==='S'){shadowMode=!shadowMode;document.getElementById('shadowBtn').classList.toggle('active',shadowMode);}}
function windowResized(){resizeCanvas(windowWidth,windowHeight);layoutField();}
